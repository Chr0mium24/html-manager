<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制袋公式实时计算</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px 40px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            line-height: 2.2;
            font-size: 1.1em;
        }
        input {
            width: 80px;
            padding: 4px 8px;
            border: none;
            border-bottom: 2px solid #1976d2;
            background-color: #f0f4f8;
            font-size: 1em;
            text-align: center;
            outline: none;
            color: #1976d2;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        input:focus {
            background-color: #e3f2fd;
            border-bottom-color: #1565c0;
        }
        input::placeholder {
            color: #999;
            font-weight: normal;
        }
        select {
            padding: 4px;
            font-size: 1em;
            border: none;
            border-bottom: 2px solid #1976d2;
            background-color: #f0f4f8;
            color: #1976d2;
            font-weight: bold;
            outline: none;
        }
        .result {
            color: #d32f2f;
            font-weight: bold;
            min-width: 60px;
            display: inline-block;
            border-bottom: 2px dashed #d32f2f;
            text-align: center;
            padding: 0 5px;
        }
        .var-text {
            color: #1565c0;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="calculator">
        <div>
            1. 布料长 = <input type="number" id="h" placeholder="高"> × 2 + <input type="number" id="side1" placeholder="侧边"> + 6.5 = <span class="result" id="resL"></span>
        </div>
        <div>
            2. 布料宽 = <input type="number" id="w" placeholder="横宽"> + <input type="number" id="side2" placeholder="侧边"> + 1.5 = <span class="result" id="resW"></span>
        </div>
        <div>
            3. 总面积 = (<span class="var-text">布料长</span> <span class="result" id="valL"></span> × <span class="var-text">布料宽</span> <span class="result" id="valW"></span>) = <span class="result" id="resArea"></span>
        </div>
        <div>
            4. 布料成本：单个袋子重量(kg) = <span class="var-text">总面积</span> <span class="result" id="valArea1"></span> × <input type="number" id="gsm" placeholder="克重"> × <input type="number" id="fabricPrice" placeholder="布料单价"> = <span class="result" id="resFabricCost"></span>
        </div>
        <div>
            5. 彩印成本：彩印面积(m²) = ((<span class="var-text">布料长</span> <span class="result" id="valL2"></span> - <input type="number" id="printDeduct" placeholder="彩印扣减">) × <span class="var-text">布料宽</span> <span class="result" id="valW2"></span>) × <input type="number" id="printPrice" placeholder="彩印单价"> = <span class="result" id="resPrintCost"></span>
        </div>
        <div>
            6. 最终单价 = (<span class="var-text">布料总价</span> <span class="result" id="valFabricCost"></span> + <span class="var-text">彩印总价</span> <span class="result" id="valPrintCost"></span> + <input type="number" id="processFee" placeholder="加工费"> + <input type="number" id="packFee" placeholder="打包费">) × 
            <select id="multiplier">
                <option value="" selected disabled>选择系数</option>
                <option value="1.01">1.01</option>
                <option value="1.075">1.075</option>
                <option value="1">1</option>
            </select>
             = <span class="result" id="resFinal" style="font-size: 1.3em;"></span>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('input, select');
        const side1 = document.getElementById('side1');
        const side2 = document.getElementById('side2');

        // 同步两个“侧边”输入框的值，提升体验
        side1.addEventListener('input', (e) => { side2.value = e.target.value; calculate(); });
        side2.addEventListener('input', (e) => { side1.value = e.target.value; calculate(); });

        // 监听所有输入变化
        inputs.forEach(input => {
            if(input.id !== 'side1' && input.id !== 'side2') {
                input.addEventListener('input', calculate);
            }
        });

        function calculate() {
            // 获取并校验值，如果为空则返回 NaN
            const getVal = (id) => {
                const val = document.getElementById(id).value;
                return val === '' ? NaN : parseFloat(val);
            };

            const h = getVal('h');
            const w = getVal('w');
            const side = getVal('side1');
            const gsm = getVal('gsm');
            const fabricPrice = getVal('fabricPrice');
            const printDeduct = getVal('printDeduct');
            const printPrice = getVal('printPrice');
            const processFee = getVal('processFee');
            const packFee = getVal('packFee');
            const multiplier = getVal('multiplier');

            // 1. 布料长
            let L = NaN;
            if (!isNaN(h) && !isNaN(side)) {
                L = h * 2 + side + 6.5;
                document.getElementById('resL').innerText = L;
                document.getElementById('valL').innerText = L;
                document.getElementById('valL2').innerText = L;
            } else {
                document.getElementById('resL').innerText = '';
                document.getElementById('valL').innerText = '';
                document.getElementById('valL2').innerText = '';
            }

            // 2. 布料宽
            let W = NaN;
            if (!isNaN(w) && !isNaN(side)) {
                W = w + side + 1.5;
                document.getElementById('resW').innerText = W;
                document.getElementById('valW').innerText = W;
                document.getElementById('valW2').innerText = W;
            } else {
                document.getElementById('resW').innerText = '';
                document.getElementById('valW').innerText = '';
                document.getElementById('valW2').innerText = '';
            }

            // 3. 总面积
            let Area = NaN;
            if (!isNaN(L) && !isNaN(W)) {
                Area = L * W;
                document.getElementById('resArea').innerText = Area;
                document.getElementById('valArea1').innerText = Area;
            } else {
                document.getElementById('resArea').innerText = '';
                document.getElementById('valArea1').innerText = '';
            }

            // 4. 布料成本
            let FabricCost = NaN;
            if (!isNaN(Area) && !isNaN(gsm) && !isNaN(fabricPrice)) {
                FabricCost = Area * gsm * fabricPrice;
                document.getElementById('resFabricCost').innerText = FabricCost;
                document.getElementById('valFabricCost').innerText = FabricCost;
            } else {
                document.getElementById('resFabricCost').innerText = '';
                document.getElementById('valFabricCost').innerText = '';
            }

            // 5. 彩印成本
            let PrintCost = NaN;
            if (!isNaN(L) && !isNaN(W) && !isNaN(printDeduct) && !isNaN(printPrice)) {
                PrintCost = ((L - printDeduct) * W) * printPrice;
                document.getElementById('resPrintCost').innerText = PrintCost;
                document.getElementById('valPrintCost').innerText = PrintCost;
            } else {
                document.getElementById('resPrintCost').innerText = '';
                document.getElementById('valPrintCost').innerText = '';
            }

            // 6. 最终单价
            let Final = NaN;
            if (!isNaN(FabricCost) && !isNaN(PrintCost) && !isNaN(processFee) && !isNaN(packFee) && !isNaN(multiplier)) {
                Final = (FabricCost + PrintCost + processFee + packFee) * multiplier;
                // 保留4位小数展示
                document.getElementById('resFinal').innerText = Final.toFixed(4); 
            } else {
                document.getElementById('resFinal').innerText = '';
            }
        }
    </script>
</body>
</html>
