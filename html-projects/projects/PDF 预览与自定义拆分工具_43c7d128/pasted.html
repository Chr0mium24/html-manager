<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 预览与自定义拆分工具</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --hover-color: #45a049;
            --bg-color: #f4f7f6;
            --border-color: #ddd;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #333;
        }
        .container {
            display: flex;
            gap: 20px;
            flex: 1;
            min-height: 0; /* 防止溢出 */
        }
        .left-panel, .right-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .left-panel {
            flex: 1;
            max-width: 400px;
        }
        .right-panel {
            flex: 2;
        }
        .control-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #555;
        }
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 8px;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            background: #fafafa;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            resize: vertical;
            font-family: monospace;
            box-sizing: border-box;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }
        button:hover {
            background-color: var(--hover-color);
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .info-text {
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        #page-info {
            font-weight: bold;
            color: #d9534f;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: #eee;
        }
        .status {
            margin-top: 15px;
            font-size: 14px;
            color: #2e7d32;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>📄 PDF 预览与自定义拆分工具</h2>

    <div class="container">
        <div class="left-panel">
            <div class="control-group">
                <label for="pdf-upload">1. 选择 PDF 文件</label>
                <input type="file" id="pdf-upload" accept="application/pdf">
                <div class="info-text" id="page-info">当前未加载文件</div>
            </div>

            <div class="control-group">
                <label for="ranges-input">2. 输入拆分范围 (每行生成一个新文件)</label>
                <textarea id="ranges-input" placeholder="例如：
1-3
4,5
6-10, 12"></textarea>
                <div class="info-text">
                    <strong>规则提示：</strong><br>
                    • 每写一行，就会导出一个独立的 PDF。<br>
                    • 支持连字符（如 <code>1-3</code> 表示第 1 到 3 页）。<br>
                    • 支持逗号（如 <code>1, 4, 5</code> 表示第 1、4、5 页）。<br>
                    • 可组合使用（如 <code>1-3, 5, 7-9</code>）。
                </div>
            </div>

            <button id="split-btn" disabled>拆分并导出</button>
            <div class="status" id="status-msg"></div>
        </div>

        <div class="right-panel">
            <label>PDF 预览</label>
            <iframe id="pdf-preview" src=""></iframe>
        </div>
    </div>

    <script>
        const { PDFDocument } = PDFLib;

        let currentPdfBytes = null;
        let totalPages = 0;
        let originalFilename = "document";

        const uploadInput = document.getElementById('pdf-upload');
        const previewIframe = document.getElementById('pdf-preview');
        const pageInfo = document.getElementById('page-info');
        const splitBtn = document.getElementById('split-btn');
        const rangesInput = document.getElementById('ranges-input');
        const statusMsg = document.getElementById('status-msg');

        // 1. 处理文件上传与预览
        uploadInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            originalFilename = file.name.replace(/\.[^/.]+$/, ""); // 移除后缀名
            statusMsg.innerText = "正在加载文件...";

            try {
                // 读取文件内容
                const arrayBuffer = await file.arrayBuffer();
                currentPdfBytes = new Uint8Array(arrayBuffer);

                // 使用 pdf-lib 加载文档以获取页数
                const pdfDoc = await PDFDocument.load(currentPdfBytes);
                totalPages = pdfDoc.getPageCount();
                pageInfo.innerText = `已加载: ${file.name} (共 ${totalPages} 页)`;

                // 使用 Blob URL 预览 PDF
                const blob = new Blob([currentPdfBytes], { type: 'application/pdf' });
                const blobUrl = URL.createObjectURL(blob);
                previewIframe.src = blobUrl;

                splitBtn.disabled = false;
                statusMsg.innerText = "";
            } catch (error) {
                console.error(error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "加载 PDF 失败，请确保文件未损坏且未加密。";
            }
        });

        // 2. 解析用户输入的页码范围
        // 输入: "1-3, 5", 输出: [0, 1, 2, 4] (转换为从 0 开始的索引，并去重排序)
        function parseRange(rangeStr, maxPages) {
            const pageIndices = new Set();
            const parts = rangeStr.split(',');

            for (let part of parts) {
                part = part.trim();
                if (!part) continue;

                if (part.includes('-')) {
                    const [startStr, endStr] = part.split('-');
                    const start = parseInt(startStr);
                    const end = parseInt(endStr);
                    
                    if (!isNaN(start) && !isNaN(end) && start <= end) {
                        for (let i = start; i <= end; i++) {
                            if (i >= 1 && i <= maxPages) {
                                pageIndices.add(i - 1);
                            }
                        }
                    }
                } else {
                    const num = parseInt(part);
                    if (!isNaN(num) && num >= 1 && num <= maxPages) {
                        pageIndices.add(num - 1);
                    }
                }
            }
            // 转换为数组并升序排序
            return Array.from(pageIndices).sort((a, b) => a - b);
        }

        // 3. 触发下载
        function downloadFile(bytes, filename) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 4. 执行拆分逻辑
        splitBtn.addEventListener('click', async () => {
            if (!currentPdfBytes) return;

            const text = rangesInput.value.trim();
            if (!text) {
                alert("请输入需要拆分的页码范围！");
                return;
            }

            const lines = text.split('\n');
            statusMsg.style.color = "#2e7d32";
            statusMsg.innerText = "正在拆分并导出...";
            splitBtn.disabled = true;

            try {
                // 加载原始文档
                const sourcePdf = await PDFDocument.load(currentPdfBytes);

                let exportedCount = 0;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (!line) continue;

                    const indicesToCopy = parseRange(line, totalPages);
                    
                    if (indicesToCopy.length === 0) {
                        console.warn(`跳过无效行: ${line}`);
                        continue;
                    }

                    // 创建新文档并拷贝指定页面
                    const newPdf = await PDFDocument.create();
                    const copiedPages = await newPdf.copyPages(sourcePdf, indicesToCopy);
                    
                    copiedPages.forEach((page) => newPdf.addPage(page));

                    // 保存并下载
                    const newPdfBytes = await newPdf.save();
                    const safeLineName = line.replace(/[^a-zA-Z0-9,-]/g, '_');
                    const newFilename = `${originalFilename}_${safeLineName}.pdf`;
                    
                    downloadFile(newPdfBytes, newFilename);
                    exportedCount++;
                }

                if (exportedCount > 0) {
                    statusMsg.innerText = `✅ 成功导出 ${exportedCount} 个 PDF 文件！`;
                } else {
                    statusMsg.style.color = "red";
                    statusMsg.innerText = "未找到有效的页码范围，请检查输入格式。";
                }

            } catch (error) {
                console.error(error);
                statusMsg.style.color = "red";
                statusMsg.innerText = "拆分过程中发生错误。";
            } finally {
                splitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
