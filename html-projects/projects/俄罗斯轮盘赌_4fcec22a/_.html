<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯轮盘赌</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 使用更适合游戏的字体 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+SC:wght@400;700&display=swap');
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
        /* contenteditable 元素的占位符样式 */
        [contenteditable="true"]:empty:before {
            content: attr(placeholder);
            pointer-events: none;
            display: block; /* For Firefox */
            color: #9ca3af; /* gray-400 */
        }
        /* 自定义动画，用于消息提示 */
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; transform: translateY(-20px); }
            10%, 90% { opacity: 1; transform: translateY(0); }
        }
        .toast-animation {
            animation: fadeInOut 4s ease-in-out forwards;
        }
    </style>
</head>
<body class="bg-gray-900 text-white p-4 sm:p-8 selection:bg-red-500 selection:text-white">

    <div id="app" class="max-w-7xl mx-auto">
        <!-- 新增的随机花色按钮 -->
        <div class="flex justify-center mb-6">
            <button id="random-suit-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform hover:scale-105 transition-all duration-300">
                抽取花色 (梅花, 方片, 红桃)
            </button>
        </div>

        <!-- 游戏标题 -->
        <header class="text-center mb-8">
            <h1 class="text-4xl sm:text-5xl font-bold text-red-500 tracking-wider">俄罗斯轮盘赌</h1>
            <p class="text-gray-400 mt-2">你敢扣动扳机吗？</p>
        </header>

        <!-- 控制按钮 -->
        <div class="flex justify-center mb-8">
            <button id="add-player-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transform hover:scale-105 transition-all duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 inline-block mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                </svg>
                添加玩家
            </button>
        </div>

        <!-- 玩家卡片容器 -->
        <div id="players-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- 玩家卡片将由 JavaScript 动态生成 -->
        </div>

        <!-- 消息提示区域 -->
        <div id="message-area" class="fixed top-5 right-5 z-50"></div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 获取主要的DOM元素
            const addPlayerBtn = document.getElementById('add-player-btn');
            const playersContainer = document.getElementById('players-container');
            const messageArea = document.getElementById('message-area');
            const randomSuitBtn = document.getElementById('random-suit-btn'); // 获取新按钮

            // 初始化玩家状态数组
            let players = [];
            let playerCount = 0;

            // --- 核心功能 ---

            /**
             * 创建一个新的玩家对象
             * @returns {object} 新玩家对象
             */
            const createNewPlayer = () => {
                playerCount++;
                const newPlayer = {
                    id: Date.now(), // 使用时间戳作为唯一ID
                    name: `玩家 ${playerCount}`,
                    isAlive: true,
                    bulletChamber: [], // 弹仓
                };
                resetPlayerState(newPlayer); // 初始化弹仓和状态
                return newPlayer;
            };
            /**
             * 使用 Fisher-Yates (Knuth) 算法打乱数组
             * @param {array} array - 需要被打乱的数组
             */
            function shuffle(array) {
                let currentIndex = array.length,  randomIndex;

                // 当还剩下元素可以打乱时...
                while (currentIndex !== 0) {

                    // 随机选择一个剩余的元素...
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;

                    // 并与当前元素交换
                    [array[currentIndex], array[randomIndex]] = [
                        array[randomIndex], array[currentIndex]];
                }

                return array;
            }

            /**
             * 重置玩家状态（装填子弹并复活）
             * @param {object} player - 玩家对象
             */
            const resetPlayerState = (player) => {
                player.isAlive = true;
                // 创建一个包含5个空包弹(0)和1个实弹(1)的弹仓
                const chamber = [0, 0, 0, 0, 0, 1];
                // 随机打乱弹仓顺序，模拟旋转弹轮
                player.bulletChamber = shuffle(chamber);
            };

            /**
             * 渲染所有玩家的卡片到页面上
             */
            const renderPlayers = () => {
                playersContainer.innerHTML = players.map(player => {
                    const isDead = !player.isAlive;
                    const canShoot = !isDead && player.bulletChamber.length > 0;

                    // 根据玩家状态设置不同样式
                    const cardBg = isDead ? 'bg-red-900/50 border-red-700' : 'bg-gray-800 border-gray-700';
                    const statusText = isDead ? '已淘汰' : '存活';
                    const statusColor = isDead ? 'text-red-500' : 'text-green-400';
                    const buttonDisabled = !canShoot ? 'disabled' : '';
                    const nameEditable = isDead ? 'false' : 'true';

                    return `
                        <div class="player-card border ${cardBg} rounded-lg p-5 flex flex-col items-center shadow-lg transition-all duration-300 ${isDead ? 'opacity-60 grayscale' : ''}" data-id="${player.id}">
                            <h2 class="player-name text-2xl font-semibold mb-3 w-full text-center bg-transparent focus:outline-none focus:bg-gray-700 rounded px-2 py-1"
                                contenteditable="${nameEditable}"
                                spellcheck="false"
                                placeholder="输入名称">${player.name}</h2>
                            
                            <p class="mb-4">状态: <span class="font-bold ${statusColor}">${statusText}</span></p>
                            
                            <!-- 子弹进度条 -->
                            <div class="w-full bg-gray-700 rounded-full h-2.5 mb-1">
                                <div class="bg-yellow-400 h-2.5 rounded-full transition-all duration-300" style="width: ${(player.bulletChamber.length / 6) * 100}%"></div>
                            </div>
                            <p class="mb-4 text-gray-300 text-sm">剩余子弹: <span class="font-mono text-lg">${player.bulletChamber.length}</span> / 6</p>
                            
                            <!-- 操作按钮 -->
                            <div class="flex space-x-2 mt-auto w-full">
                                <button class="shoot-btn flex-1 bg-red-600 hover:bg-red-700 disabled:bg-red-900/50 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded transition-colors" ${buttonDisabled}>
                                    开枪
                                </button>
                                <button class="reset-btn flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
                                    重置
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
            };
            
            /**
             * 显示一个短暂的消息提示
             * @param {string} message - 要显示的消息
             * @param {string} type - 'success' 或 'error'
             */
            const showMessage = (message, type = 'success') => {
                const bgColor = type === 'error' ? 'bg-red-500' : 'bg-green-500';
                const messageEl = document.createElement('div');
                messageEl.className = `toast-animation text-white ${bgColor} py-2 px-4 rounded-lg shadow-xl mb-2`;
                messageEl.textContent = message;
                messageArea.appendChild(messageEl);

                // 4秒后自动移除消息
                setTimeout(() => {
                    messageEl.remove();
                }, 4000);
            }

            // --- 事件处理 ---
            
            // 点击“抽取花色”按钮
            randomSuitBtn.addEventListener('click', () => {
                const suits = ['梅花', '方片', '红桃'];
                const randomIndex = Math.floor(Math.random() * suits.length);
                const selectedSuit = suits[randomIndex];
                showMessage(`您抽中了： ${selectedSuit}！`, 'success');
            });

            // 点击“添加玩家”按钮
            addPlayerBtn.addEventListener('click', () => {
                if (players.length >= 8) { // 限制最多8个玩家
                    showMessage('最多只能添加8位玩家。', 'error');
                    return;
                }
                const newPlayer = createNewPlayer();
                players.push(newPlayer);
                renderPlayers();
            });

            // 使用事件委托处理所有玩家卡片上的点击事件
            playersContainer.addEventListener('click', (e) => {
                const target = e.target;
                const card = target.closest('.player-card');
                if (!card) return;

                const playerId = Number(card.dataset.id);
                const player = players.find(p => p.id === playerId);
                if (!player) return;

                // 点击“开枪”按钮
                if (target.classList.contains('shoot-btn')) {
                    if (!player.isAlive || player.bulletChamber.length === 0) return;

                    // 从弹仓中取出一发子弹 (pop会移除并返回数组的最后一个元素)
                    const firedBullet = player.bulletChamber.pop();

                    if (firedBullet === 1) { // 1代表实弹
                        player.isAlive = false;
                        showMessage(`砰! ${player.name} 被淘汰了!`, 'error');
                    } else { // 0代表空包弹
                        showMessage(`咔. ${player.name} 幸存了下来!`, 'success');
                    }
                    renderPlayers();
                }

                // 点击“重置”按钮
                if (target.classList.contains('reset-btn')) {
                    resetPlayerState(player);
                    showMessage(`${player.name} 的弹仓已重置!`, 'success');
                    renderPlayers();
                }
            });
            
            // 使用事件委托处理玩家名称的编辑
            playersContainer.addEventListener('focusout', (e) => {
                const target = e.target;
                if (target.classList.contains('player-name')) {
                    const card = target.closest('.player-card');
                    if (!card) return;
                    
                    const playerId = Number(card.dataset.id);
                    const player = players.find(p => p.id === playerId);
                    if (player) {
                        const newName = target.textContent.trim();
                        // 如果名称为空，则恢复默认名称
                        player.name = newName ? newName : `玩家 ${players.indexOf(player) + 1}`;
                        // 重新渲染以确保数据和视图同步，特别是当名称为空时
                        renderPlayers();
                    }
                }
            });
            
            // 允许在编辑名称时按Enter键保存 (失去焦点)
            playersContainer.addEventListener('keydown', (e) => {
                 if (e.key === 'Enter' && e.target.classList.contains('player-name')) {
                    e.preventDefault(); // 阻止换行
                    e.target.blur(); // 触发 focusout 事件来保存
                }
            });


            // --- 初始化 ---
            // 游戏开始时默认添加一个玩家
            players.push(createNewPlayer());
            renderPlayers();
        });
    </script>

</body>
</html>
