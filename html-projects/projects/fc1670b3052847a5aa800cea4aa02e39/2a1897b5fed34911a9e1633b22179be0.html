<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab3 图片上传与打包</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --ok: #0f766e;
      --warn: #92400e;
      --line: #d1d5db;
      --accent: #0b69c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text);
      background: linear-gradient(150deg, #eef3f7 0%, #f9fafb 60%, #edf2f8 100%);
    }
    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 14px;
    }
    .card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      padding: 16px;
      margin-bottom: 14px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .muted { color: var(--muted); }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }
    button, .file-btn {
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #111827;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .file-btn.drag-hover {
      border-color: #0b69c7;
      background: #dbeafe;
      color: #0b3a73;
    }
    .file-btn.paste-hover {
      border-color: #0f766e;
      box-shadow: inset 0 0 0 1px #0f766e;
    }
    button.primary {
      border-color: #0b69c7;
      background: var(--accent);
      color: #fff;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 6px;
      vertical-align: top;
      text-align: left;
    }
    th { font-size: 13px; color: #374151; }
    .filename {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      color: #0f172a;
      word-break: break-all;
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      color: #334155;
    }
    .tag.optional {
      background: #fff7ed;
      border-color: #fed7aa;
      color: var(--warn);
    }
    .status.ok { color: var(--ok); font-weight: 600; }
    .status.missing { color: #9f1239; font-weight: 600; }
    .preview {
      width: 150px;
      height: 92px;
      border-radius: 8px;
      border: 1px solid #d1d5db;
      object-fit: cover;
      background: #f8fafc;
    }
    .small { font-size: 12px; color: #475569; }
    .hidden { display: none; }
    .tips li { margin-bottom: 6px; }
    .section-title {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .settings-table input[type="text"] {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
      background: #fff;
    }
    .settings-table .cell-required {
      text-align: center;
    }
    @media (max-width: 900px) {
      .preview { width: 120px; height: 74px; }
      th:nth-child(3), td:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Lab 3 图片上传与 ZIP 导出</h1>
      <div class="muted">
        按预设文件名上传图片，数据保存在浏览器 <code>localStorage</code>。关闭页面后再次打开仍可继续。
      </div>
      <div class="toolbar">
        <button id="downloadZipBtn" class="primary">下载 ZIP</button>
        <button id="openSettingsBtn">设置图片列表</button>
        <button id="clearAllBtn">清空全部图片</button>
        <button id="exportJsonBtn">导出本地备份(JSON)</button>
        <label class="file-btn" for="importJsonInput">导入备份(JSON)</label>
        <input id="importJsonInput" class="hidden" type="file" accept="application/json">
        <span id="summary" class="small"></span>
      </div>
    </div>

    <div class="card">
      <table id="fileTable">
        <thead>
          <tr>
            <th style="width:130px;">实验</th>
            <th style="width:280px;">目标文件名</th>
            <th>说明</th>
            <th style="width:170px;">预览</th>
            <th style="width:160px;">状态</th>
            <th style="width:220px;">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="settingsCard" class="card hidden">
      <h2 class="section-title">图片列表设置</h2>
      <div class="muted small">可添加、删除、修改每一行。保存后主列表会立即更新并持久化。</div>
      <table id="settingsTable" class="settings-table">
        <thead>
          <tr>
            <th style="width:90px;">实验</th>
            <th style="width:80px;">必需</th>
            <th style="width:360px;">文件名</th>
            <th>说明</th>
            <th style="width:100px;">操作</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="toolbar">
        <button id="addSettingRowBtn">新增一项</button>
        <button id="saveSettingsBtn" class="primary">保存设置</button>
        <button id="cancelSettingsBtn">取消</button>
        <button id="resetSettingsBtn">恢复默认列表</button>
      </div>
    </div>

    <div class="card">
      <ul class="tips">
        <li>建议截图尺寸控制在 1920px 宽以内，避免 <code>localStorage</code> 超限。</li>
        <li>如果你替换了图片，ZIP 中会自动使用最新版本。</li>
        <li>ZIP 中文件名会严格按“目标文件名”输出。</li>
        <li>支持把图片拖到“上传/替换”按钮，或鼠标悬停该按钮后按 <code>Ctrl+V</code> 粘贴上传。</li>
      </ul>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "lab3_image_store_v1";
    const MANIFEST_STORAGE_KEY = "lab3_manifest_v1";
    const DEFAULT_MANIFEST = [
      { exp: "4.1", required: true,  filename: "lab3_e41_01_gate_schematic_multisim.png", note: "门级 Multisim 电路图" },
      { exp: "4.1", required: true,  filename: "lab3_e41_02_chip_schematic_multisim.png", note: "芯片级 Multisim 电路图" },
      { exp: "4.1", required: true,  filename: "lab3_e41_03_waveform_logic_analyzer_multisim.png", note: "4.1 第 3 步逻辑分析仪波形" },
      { exp: "4.1", required: false, filename: "lab3_e41_04_hardware_wiring_hardware.jpg", note: "硬件连线照片（建议）" },
      { exp: "4.2", required: true,  filename: "lab3_e42_01_kmap_hazard_marked_handdrawn.png", note: "标注 hazard 的 Karnaugh 图" },
      { exp: "4.2", required: true,  filename: "lab3_e42_02_original_schematic_multisim.png", note: "消除前原始电路" },
      { exp: "4.2", required: true,  filename: "lab3_e42_03_waveform_glitch_multisim.png", note: "glitch 波形（消除前）" },
      { exp: "4.2", required: true,  filename: "lab3_e42_04_fixed_schematic_multisim.png", note: "加入额外项后的电路" },
      { exp: "4.2", required: true,  filename: "lab3_e42_05_waveform_no_glitch_multisim.png", note: "消除后无 glitch 波形" },
      { exp: "4.2", required: true,  filename: "lab3_e42_06_hardware_verification_hardware.jpg", note: "硬件验证照片/截图" },
      { exp: "4.3", required: true,  filename: "lab3_e43_01_kmap_multiplier_handdrawn.png", note: "乘法器 Karnaugh 图" },
      { exp: "4.3", required: true,  filename: "lab3_e43_02_logic_schematic_multisim.png", note: "乘法器逻辑电路图" },
      { exp: "4.3", required: true,  filename: "lab3_e43_03_waveform_logic_analyzer_multisim.png", note: "乘法器逻辑分析仪波形" },
      { exp: "4.3", required: true,  filename: "lab3_e43_04_hardware_wiring_hardware.jpg", note: "乘法器硬件连线照片" },
      { exp: "4.3", required: true,  filename: "lab3_e43_05_hardware_result_logic_analyzer_hardware.png", note: "乘法器硬件结果截图" }
    ];

    let manifest = loadManifest();
    let store = loadStore();
    const tbody = document.querySelector("#fileTable tbody");
    const settingsCard = document.getElementById("settingsCard");
    const settingsTbody = document.querySelector("#settingsTable tbody");
    let itemByFilename = new Map();
    let settingsDraft = [];
    let hoverPasteFilename = null;

    function loadStore() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      } catch {
        return {};
      }
    }

    function cloneManifest(arr) {
      return arr.map((x) => ({ exp: x.exp, required: Boolean(x.required), filename: x.filename, note: x.note || "" }));
    }

    function normalizeManifestEntry(entry) {
      return {
        exp: String(entry.exp || "").trim() || "4.x",
        required: Boolean(entry.required),
        filename: String(entry.filename || "").trim(),
        note: String(entry.note || "").trim()
      };
    }

    function loadManifest() {
      try {
        const raw = JSON.parse(localStorage.getItem(MANIFEST_STORAGE_KEY));
        if (!Array.isArray(raw) || !raw.length) return cloneManifest(DEFAULT_MANIFEST);
        const normalized = raw.map(normalizeManifestEntry).filter((x) => x.filename);
        return normalized.length ? normalized : cloneManifest(DEFAULT_MANIFEST);
      } catch {
        return cloneManifest(DEFAULT_MANIFEST);
      }
    }

    function saveManifest() {
      localStorage.setItem(MANIFEST_STORAGE_KEY, JSON.stringify(manifest));
    }

    function saveStore() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(store));
    }

    function formatSize(n) {
      if (!n) return "-";
      if (n < 1024) return `${n} B`;
      if (n < 1024 * 1024) return `${(n / 1024).toFixed(1)} KB`;
      return `${(n / 1024 / 1024).toFixed(2)} MB`;
    }

    function getStoreUsageBytes() {
      let total = 0;
      for (const [k, v] of Object.entries(localStorage)) {
        total += (k.length + String(v).length) * 2;
      }
      return total;
    }

    function render() {
      tbody.innerHTML = "";
      itemByFilename = new Map();
      for (const [idx, item] of manifest.entries()) {
        itemByFilename.set(item.filename, item);
        const rec = store[item.filename];
        const inputId = `file_${idx}`;
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <div>${item.exp}</div>
            <span class="tag ${item.required ? "" : "optional"}">${item.required ? "必需" : "可选"}</span>
          </td>
          <td><div class="filename">${item.filename}</div></td>
          <td>${item.note}</td>
          <td>
            ${rec ? `<img class="preview" src="${rec.dataUrl}" alt="${item.filename}">` : `<div class="small">未上传</div>`}
          </td>
          <td>
            <div class="status ${rec ? "ok" : "missing"}">${rec ? "已上传" : "缺失"}</div>
            <div class="small">${rec ? `${formatSize(rec.size)} · ${new Date(rec.updatedAt).toLocaleString()}` : "-"}</div>
          </td>
          <td>
            <input id="${inputId}" type="file" accept="image/*" class="hidden">
            <label
              for="${inputId}"
              class="file-btn upload-btn"
              data-filename="${item.filename}"
              title="拖拽图片到此处，或鼠标悬停后按 Ctrl+V"
            >上传/替换</label>
            <button data-remove="${item.filename}">清除</button>
          </td>
        `;
        tbody.appendChild(tr);

        const fileInput = tr.querySelector(`#${inputId}`);
        const uploadLabel = tr.querySelector("label.upload-btn");

        fileInput.addEventListener("change", async (ev) => {
          const file = ev.target.files && ev.target.files[0];
          if (!file) return;
          await saveImageForItem(item, file);
          ev.target.value = "";
        });

        uploadLabel.addEventListener("mouseenter", () => {
          hoverPasteFilename = item.filename;
          uploadLabel.classList.add("paste-hover");
        });
        uploadLabel.addEventListener("mouseleave", () => {
          if (hoverPasteFilename === item.filename) hoverPasteFilename = null;
          uploadLabel.classList.remove("paste-hover");
        });

        uploadLabel.addEventListener("dragenter", (ev) => {
          ev.preventDefault();
          uploadLabel.classList.add("drag-hover");
        });
        uploadLabel.addEventListener("dragover", (ev) => {
          ev.preventDefault();
          uploadLabel.classList.add("drag-hover");
        });
        uploadLabel.addEventListener("dragleave", () => {
          uploadLabel.classList.remove("drag-hover");
        });
        uploadLabel.addEventListener("drop", async (ev) => {
          ev.preventDefault();
          ev.stopPropagation();
          uploadLabel.classList.remove("drag-hover");
          const file = getImageFileFromDataTransfer(ev.dataTransfer);
          if (!file) {
            alert("拖拽内容不是图片文件。");
            return;
          }
          await saveImageForItem(item, file);
        });
      }

      document.querySelectorAll("button[data-remove]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const name = btn.getAttribute("data-remove");
          delete store[name];
          saveStore();
          render();
        });
      });

      updateSummary();
    }

    function openSettings() {
      settingsDraft = manifest.map((item) => ({
        exp: item.exp,
        required: item.required,
        filename: item.filename,
        note: item.note || "",
        originalFilename: item.filename
      }));
      renderSettingsDraft();
      settingsCard.classList.remove("hidden");
    }

    function closeSettings() {
      settingsCard.classList.add("hidden");
    }

    function renderSettingsDraft() {
      settingsTbody.innerHTML = "";
      for (const [idx, row] of settingsDraft.entries()) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input type="text" data-key="exp" data-idx="${idx}" value="${escapeHtml(row.exp)}"></td>
          <td class="cell-required"><input type="checkbox" data-key="required" data-idx="${idx}" ${row.required ? "checked" : ""}></td>
          <td><input type="text" data-key="filename" data-idx="${idx}" value="${escapeHtml(row.filename)}"></td>
          <td><input type="text" data-key="note" data-idx="${idx}" value="${escapeHtml(row.note)}"></td>
          <td><button data-del-idx="${idx}">删除</button></td>
        `;
        settingsTbody.appendChild(tr);
      }

      settingsTbody.querySelectorAll("input[data-key]").forEach((el) => {
        el.addEventListener("input", (ev) => {
          const target = ev.target;
          const idx = Number(target.getAttribute("data-idx"));
          const key = target.getAttribute("data-key");
          if (!settingsDraft[idx]) return;
          if (key === "required") {
            settingsDraft[idx].required = target.checked;
          } else {
            settingsDraft[idx][key] = target.value;
          }
        });
      });

      settingsTbody.querySelectorAll("button[data-del-idx]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.getAttribute("data-del-idx"));
          settingsDraft.splice(idx, 1);
          renderSettingsDraft();
        });
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;");
    }

    function addSettingsRow() {
      settingsDraft.push({
        exp: "4.x",
        required: true,
        filename: `new_image_${settingsDraft.length + 1}.png`,
        note: "",
        originalFilename: ""
      });
      renderSettingsDraft();
    }

    function saveSettings() {
      const cleanedWithSource = settingsDraft
        .map((row) => ({ ...normalizeManifestEntry(row), originalFilename: row.originalFilename || "" }))
        .filter((x) => x.filename);
      const cleaned = cleanedWithSource.map(({ exp, required, filename, note }) => ({ exp, required, filename, note }));

      if (!cleaned.length) {
        alert("图片列表不能为空，至少保留一项。");
        return;
      }

      const nameSet = new Set();
      for (const row of cleaned) {
        if (nameSet.has(row.filename)) {
          alert(`文件名重复：${row.filename}`);
          return;
        }
        nameSet.add(row.filename);
      }

      for (const row of cleanedWithSource) {
        const oldName = row.originalFilename;
        const newName = row.filename;
        if (oldName && newName && oldName !== newName && store[oldName] && !store[newName]) {
          store[newName] = store[oldName];
          delete store[oldName];
        }
      }

      manifest = cleaned;
      saveManifest();
      saveStore();
      closeSettings();
      render();
    }

    async function saveImageForItem(item, file) {
      if (!file || !String(file.type || "").startsWith("image/")) {
        alert("请选择图片文件。");
        return;
      }
      try {
        const dataUrl = await readFileAsDataURL(file);
        store[item.filename] = {
          dataUrl,
          originalName: file.name || "pasted-image",
          type: file.type || "image/png",
          size: file.size || dataUrl.length,
          updatedAt: Date.now()
        };
        saveStore();
        render();
      } catch (err) {
        console.error(err);
        alert("保存失败。可能是 localStorage 空间不足，请压缩图片后重试。");
      }
    }

    function updateSummary() {
      const required = manifest.filter(x => x.required).length;
      const requiredDone = manifest.filter(x => x.required && store[x.filename]).length;
      const totalDone = manifest.filter(x => store[x.filename]).length;
      const usage = getStoreUsageBytes();
      document.getElementById("summary").textContent =
        `必需完成: ${requiredDone}/${required} · 已上传总数: ${totalDone}/${manifest.length} · 浏览器占用: ${formatSize(usage)}`;
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(file);
      });
    }

    function dataUrlToUint8Array(dataUrl) {
      const base64 = dataUrl.split(",")[1] || "";
      const binary = atob(base64);
      const out = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) out[i] = binary.charCodeAt(i);
      return out;
    }

    function getImageFileFromDataTransfer(dt) {
      if (!dt) return null;
      if (dt.files && dt.files.length) {
        for (const file of dt.files) {
          if (String(file.type || "").startsWith("image/")) return file;
        }
      }
      if (dt.items && dt.items.length) {
        for (const it of dt.items) {
          if (it.kind === "file" && String(it.type || "").startsWith("image/")) {
            const f = it.getAsFile();
            if (f) return f;
          }
        }
      }
      return null;
    }

    function getImageFileFromClipboard(clipboardData) {
      if (!clipboardData) return null;
      if (clipboardData.files && clipboardData.files.length) {
        for (const file of clipboardData.files) {
          if (String(file.type || "").startsWith("image/")) return file;
        }
      }
      if (clipboardData.items && clipboardData.items.length) {
        for (const it of clipboardData.items) {
          if (it.kind === "file" && String(it.type || "").startsWith("image/")) {
            const blob = it.getAsFile();
            if (blob) {
              const type = blob.type || "image/png";
              const ext = type.split("/")[1] || "png";
              return new File([blob], `pasted-${Date.now()}.${ext}`, { type });
            }
          }
        }
      }
      return null;
    }

    function makeCrcTable() {
      const table = new Uint32Array(256);
      for (let n = 0; n < 256; n++) {
        let c = n;
        for (let k = 0; k < 8; k++) {
          c = (c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1);
        }
        table[n] = c >>> 0;
      }
      return table;
    }
    const CRC_TABLE = makeCrcTable();

    function crc32(bytes) {
      let c = 0xffffffff;
      for (let i = 0; i < bytes.length; i++) {
        c = CRC_TABLE[(c ^ bytes[i]) & 0xff] ^ (c >>> 8);
      }
      return (c ^ 0xffffffff) >>> 0;
    }

    function dosDateTime(ts) {
      const d = new Date(ts || Date.now());
      const year = Math.max(1980, d.getFullYear());
      const dosTime = (d.getHours() << 11) | (d.getMinutes() << 5) | ((d.getSeconds() / 2) | 0);
      const dosDate = ((year - 1980) << 9) | ((d.getMonth() + 1) << 5) | d.getDate();
      return { dosTime, dosDate };
    }

    function u16(n) {
      return [n & 0xff, (n >>> 8) & 0xff];
    }

    function u32(n) {
      return [n & 0xff, (n >>> 8) & 0xff, (n >>> 16) & 0xff, (n >>> 24) & 0xff];
    }

    function encodeUtf8(str) {
      return new TextEncoder().encode(str);
    }

    function buildZip(entries) {
      const out = [];
      const central = [];
      let offset = 0;

      for (const e of entries) {
        const nameBytes = encodeUtf8(e.name);
        const data = e.bytes;
        const crc = crc32(data);
        const { dosTime, dosDate } = dosDateTime(e.time);

        const local = [
          ...u32(0x04034b50),
          ...u16(20),
          ...u16(0x0800),
          ...u16(0),
          ...u16(dosTime),
          ...u16(dosDate),
          ...u32(crc),
          ...u32(data.length),
          ...u32(data.length),
          ...u16(nameBytes.length),
          ...u16(0)
        ];
        out.push(new Uint8Array(local), nameBytes, data);

        const centralHeader = [
          ...u32(0x02014b50),
          ...u16(20),
          ...u16(20),
          ...u16(0x0800),
          ...u16(0),
          ...u16(dosTime),
          ...u16(dosDate),
          ...u32(crc),
          ...u32(data.length),
          ...u32(data.length),
          ...u16(nameBytes.length),
          ...u16(0),
          ...u16(0),
          ...u16(0),
          ...u16(0),
          ...u32(0),
          ...u32(offset)
        ];
        central.push(new Uint8Array(centralHeader), nameBytes);

        offset += local.length + nameBytes.length + data.length;
      }

      let centralSize = 0;
      for (const chunk of central) centralSize += chunk.length;

      out.push(...central);
      const eocd = new Uint8Array([
        ...u32(0x06054b50),
        ...u16(0),
        ...u16(0),
        ...u16(entries.length),
        ...u16(entries.length),
        ...u32(centralSize),
        ...u32(offset),
        ...u16(0)
      ]);
      out.push(eocd);

      return new Blob(out, { type: "application/zip" });
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    document.getElementById("downloadZipBtn").addEventListener("click", () => {
      const entries = [];
      const missingRequired = [];
      for (const item of manifest) {
        const rec = store[item.filename];
        if (!rec && item.required) missingRequired.push(item.filename);
        if (!rec) continue;
        entries.push({
          name: item.filename,
          bytes: dataUrlToUint8Array(rec.dataUrl),
          time: rec.updatedAt
        });
      }
      if (!entries.length) {
        alert("还没有上传任何图片。");
        return;
      }
      if (missingRequired.length) {
        const goOn = confirm(
          `还有 ${missingRequired.length} 个必需图片未上传。是否仍然导出已上传文件？`
        );
        if (!goOn) return;
      }
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const zipBlob = buildZip(entries);
      downloadBlob(zipBlob, `lab3_images_${y}${m}${d}.zip`);
    });

    document.getElementById("clearAllBtn").addEventListener("click", () => {
      if (!confirm("确认清空全部图片？此操作会覆盖 localStorage 中当前页面保存的数据。")) return;
      store = {};
      saveStore();
      render();
    });

    document.getElementById("exportJsonBtn").addEventListener("click", () => {
      const payload = {
        version: 1,
        exportedAt: new Date().toISOString(),
        manifest,
        files: store
      };
      const blob = new Blob([JSON.stringify(payload)], { type: "application/json" });
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      downloadBlob(blob, `lab3_images_backup_${y}${m}${d}.json`);
    });

    document.getElementById("importJsonInput").addEventListener("change", async (ev) => {
      const file = ev.target.files && ev.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!parsed || typeof parsed !== "object" || !parsed.files || typeof parsed.files !== "object") {
          throw new Error("invalid backup");
        }
        if (Array.isArray(parsed.manifest) && parsed.manifest.length) {
          manifest = parsed.manifest.map(normalizeManifestEntry).filter((x) => x.filename);
          if (!manifest.length) manifest = cloneManifest(DEFAULT_MANIFEST);
          saveManifest();
        }
        store = parsed.files;
        saveStore();
        render();
      } catch (err) {
        console.error(err);
        alert("导入失败：备份文件格式不正确。");
      } finally {
        ev.target.value = "";
      }
    });

    document.addEventListener("paste", async (ev) => {
      if (!hoverPasteFilename) return;
      const item = itemByFilename.get(hoverPasteFilename);
      if (!item) return;
      const file = getImageFileFromClipboard(ev.clipboardData);
      if (!file) return;
      ev.preventDefault();
      await saveImageForItem(item, file);
    });

    document.getElementById("openSettingsBtn").addEventListener("click", openSettings);
    document.getElementById("addSettingRowBtn").addEventListener("click", addSettingsRow);
    document.getElementById("saveSettingsBtn").addEventListener("click", saveSettings);
    document.getElementById("cancelSettingsBtn").addEventListener("click", closeSettings);
    document.getElementById("resetSettingsBtn").addEventListener("click", () => {
      if (!confirm("确认恢复默认图片列表？当前设置会被覆盖。")) return;
      settingsDraft = cloneManifest(DEFAULT_MANIFEST).map((x) => ({ ...x, originalFilename: x.filename }));
      renderSettingsDraft();
    });

    render();
  </script>
</body>
</html>
