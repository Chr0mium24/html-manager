<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简本地 AI 助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        /* 简单的滚动条美化 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .masked-msg { opacity: 0.5; filter: grayscale(100%); text-decoration: line-through; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 h-screen overflow-hidden flex">
    <div id="app" class="flex w-full h-full">
        
        <div class="w-64 bg-white border-r flex flex-col h-full z-10 shadow-sm">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="font-bold text-lg text-gray-700">会话列表</h2>
                <button @click="createNewSession" class="text-blue-500 hover:bg-blue-50 p-1 rounded">+</button>
            </div>
            <div class="flex-1 overflow-y-auto p-2 space-y-2">
                <div v-for="session in sessions" :key="session.id" 
                     @click="currentSessionId = session.id"
                     class="p-3 rounded cursor-pointer flex justify-between items-center transition-colors"
                     :class="currentSessionId === session.id ? 'bg-blue-100 text-blue-700' : 'hover:bg-gray-50'">
                    <span class="truncate text-sm flex-1" v-text="session.title"></span>
                    <button @click.stop="deleteSession(session.id)" class="text-red-400 hover:text-red-600 ml-2 text-xs">删</button>
                </div>
            </div>
            <div class="p-4 border-t">
                <button @click="showSettings = true" class="w-full py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 text-sm font-medium transition-colors">⚙️ 设置</button>
            </div>
        </div>

        <div class="flex-1 flex flex-col h-full bg-gray-50 relative">
            <div v-if="!currentSession" class="flex-1 flex items-center justify-center text-gray-400">
                请选择或创建左侧会话
            </div>
            
            <template v-else>
                <div class="flex-1 overflow-y-auto p-6 space-y-6" id="chat-box">
                    <div v-for="(msg, index) in currentSession.messages" :key="msg.id" 
                         class="flex flex-col max-w-3xl mx-auto"
                         :class="msg.role === 'user' ? 'items-end' : 'items-start'">
                        
                        <div class="relative group p-4 rounded-lg max-w-[80%] shadow-sm"
                             :class="[
                                msg.role === 'user' ? 'bg-blue-500 text-white rounded-br-none' : 'bg-white border rounded-bl-none',
                                msg.disabled ? 'masked-msg' : ''
                             ]">
                            <p class="whitespace-pre-wrap break-words text-sm leading-relaxed" v-text="msg.content"></p>
                            
                            <div class="absolute top-0 right-0 -mt-3 -mr-2 flex space-x-1 opacity-0 group-hover:opacity-100 transition-opacity bg-white border rounded shadow-md p-1 text-xs text-gray-600 z-10">
                                <button @click="toggleMask(msg)" class="hover:bg-gray-100 px-1 rounded" :title="msg.disabled ? '取消屏蔽' : '屏蔽此轮'">
                                    {{ msg.disabled ? '👀' : '🙈' }}
                                </button>
                                <button @click="editMessage(msg)" class="hover:bg-gray-100 px-1 rounded" title="编辑">✏️</button>
                                <button @click="deleteMessage(index)" class="hover:text-red-500 px-1 rounded" title="删除">🗑️</button>
                            </div>
                        </div>
                        <span class="text-xs text-gray-400 mt-1 px-1">{{ msg.role === 'user' ? '你' : 'AI' }} {{ msg.disabled ? '(已屏蔽)' : '' }}</span>
                    </div>
                </div>

                <div class="p-4 bg-white border-t">
                    <div class="max-w-4xl mx-auto flex space-x-4">
                        <textarea v-model="inputText" @keydown.ctrl.enter="sendMessage" 
                                  class="flex-1 border rounded-lg p-3 outline-none focus:ring-2 focus:ring-blue-300 resize-none h-20 text-sm" 
                                  placeholder="输入消息，Ctrl+Enter 发送..."></textarea>
                        <button @click="sendMessage" :disabled="isGenerating"
                                class="bg-blue-500 text-white px-6 rounded-lg font-bold hover:bg-blue-600 disabled:opacity-50 transition-colors">
                            {{ isGenerating ? '生成中...' : '发送' }}
                        </button>
                    </div>
                </div>
            </template>
        </div>

        <div v-if="showSettings" class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 backdrop-blur-sm">
            <div class="bg-white p-6 rounded-xl w-96 shadow-2xl">
                <h3 class="text-lg font-bold mb-4">系统设置</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">MiniMax API Key</label>
                        <input type="password" v-model="settings.apiKey" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Gemini API Key (用于自动生成文案)</label>
                        <input type="password" v-model="settings.geminiKey" class="w-full border p-2 rounded text-sm focus:ring-2 focus:ring-blue-300 outline-none">
                    </div>
                    <div class="pt-4 border-t flex flex-col space-y-2">
                        <button @click="generateHardcodedData" class="w-full bg-purple-100 text-purple-700 py-2 rounded hover:bg-purple-200 text-sm transition-colors">
                            ✨ 使用 Gemini 生成默认话术
                        </button>
                        <button @click="clearCache" class="w-full bg-red-100 text-red-600 py-2 rounded hover:bg-red-200 text-sm transition-colors">
                            清除所有本地缓存 (对话及设置)
                        </button>
                    </div>
                </div>
                <div class="mt-6 flex justify-end">
                    <button @click="saveSettings" class="bg-blue-500 text-white px-4 py-2 rounded text-sm hover:bg-blue-600">保存并关闭</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    settings: {
                        apiKey: '',
                        geminiKey: ''
                    },
                    sessions: [],
                    currentSessionId: null,
                    inputText: '',
                    showSettings: false,
                    isGenerating: false,
                    defaultGreeting: '你好！我是你的本地 AI 助手，请问有什么可以帮你？'
                }
            },
            computed: {
                currentSession() {
                    return this.sessions.find(s => s.id === this.currentSessionId);
                }
            },
            mounted() {
                this.loadData();
                if (this.sessions.length === 0) {
                    this.createNewSession();
                }
            },
            methods: {
                generateId() {
                    return Math.random().toString(36).substring(2, 10);
                },
                loadData() {
                    const savedSettings = localStorage.getItem('chat_settings');
                    const savedSessions = localStorage.getItem('chat_sessions');
                    if (savedSettings) this.settings = JSON.parse(savedSettings);
                    if (savedSessions) this.sessions = JSON.parse(savedSessions);
                    
                    const savedGreeting = localStorage.getItem('chat_greeting');
                    if (savedGreeting) this.defaultGreeting = savedGreeting;
                },
                saveData() {
                    localStorage.setItem('chat_sessions', JSON.stringify(this.sessions));
                },
                saveSettings() {
                    localStorage.setItem('chat_settings', JSON.stringify(this.settings));
                    this.showSettings = false;
                },
                clearCache() {
                    if(confirm('确定要清除所有数据吗？这无法恢复。')) {
                        localStorage.clear();
                        location.reload();
                    }
                },
                createNewSession() {
                    const newSession = {
                        id: this.generateId(),
                        title: '新会话 ' + new Date().toLocaleTimeString(),
                        messages: [{ id: this.generateId(), role: 'assistant', content: this.defaultGreeting, disabled: false }]
                    };
                    this.sessions.unshift(newSession);
                    this.currentSessionId = newSession.id;
                    this.saveData();
                },
                deleteSession(id) {
                    if(confirm('删除此会话？')) {
                        this.sessions = this.sessions.filter(s => s.id !== id);
                        if(this.currentSessionId === id) {
                            this.currentSessionId = this.sessions.length > 0 ? this.sessions[0].id : null;
                        }
                        this.saveData();
                    }
                },
                toggleMask(msg) {
                    msg.disabled = !msg.disabled;
                    this.saveData();
                },
                editMessage(msg) {
                    const newContent = prompt('修改消息内容：', msg.content);
                    if (newContent !== null && newContent.trim() !== '') {
                        msg.content = newContent;
                        this.saveData();
                    }
                },
                deleteMessage(index) {
                    if(confirm('删除此条消息？')) {
                        this.currentSession.messages.splice(index, 1);
                        this.saveData();
                    }
                },
                scrollToBottom() {
                    setTimeout(() => {
                        const box = document.getElementById('chat-box');
                        if (box) box.scrollTop = box.scrollHeight;
                    }, 50);
                },
                async sendMessage() {
                    if (!this.inputText.trim() || !this.settings.apiKey) {
                        if (!this.settings.apiKey) alert('请先在设置中填写 MiniMax API Key');
                        return;
                    }

                    const userMsg = { id: this.generateId(), role: 'user', content: this.inputText.trim(), disabled: false };
                    this.currentSession.messages.push(userMsg);
                    this.inputText = '';
                    this.isGenerating = true;
                    this.scrollToBottom();

                    // 核心：过滤掉被屏蔽的消息，不发给接口
                    const payloadMessages = this.currentSession.messages
                        .filter(m => !m.disabled)
                        .map(m => ({ role: m.role, content: m.content }));

                    try {
                        const response = await fetch('https://api.edgefn.net/v1/chat/completions', {
                            method: 'POST',
                            headers: {
                                'Authorization': `Bearer ${this.settings.apiKey}`,
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({
                                model: "MiniMax-M2.5",
                                messages: payloadMessages
                            })
                        });

                        const data = await response.json();
                        if (data.choices && data.choices[0]) {
                            this.currentSession.messages.push({
                                id: this.generateId(),
                                role: 'assistant',
                                content: data.choices[0].message.content,
                                disabled: false
                            });
                            
                            // 动态更新标题
                            if (this.currentSession.messages.length === 3) {
                                this.currentSession.title = payloadMessages[1].content.substring(0, 10) + '...';
                            }
                        } else {
                            throw new Error(data.error?.message || '未知错误');
                        }
                    } catch (error) {
                        this.currentSession.messages.push({
                            id: this.generateId(),
                            role: 'assistant',
                            content: `[请求出错]: ${error.message}`,
                            disabled: false
                        });
                    } finally {
                        this.isGenerating = false;
                        this.saveData();
                        this.scrollToBottom();
                    }
                },

                // ==========================================
                // 依据你的习惯：利用 gemini-flash-latest 替换硬编码
                // ==========================================
                async generateHardcodedData() {
                    if (!this.settings.geminiKey) {
                        alert('请先填写 Gemini API Key');
                        return;
                    }
                    
                    try {
                        // AI 编写的提示词：要求 Gemini 根据应用场景生成高质量的初始占位文案
                        const geminiPrompt = `
                            你现在是一个产品文案专家。我正在开发一个极简、私密的本地 AI 对话工具。
                            请为这个应用生成一句亲切、专业、简短的"首次欢迎语"（作为系统硬编码的初始占位符）。
                            要求：不带引号，纯文本返回，字数在30字以内，体现"本地安全"和"高效"的特点。
                        `;

                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${this.settings.geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: geminiPrompt }] }]
                            })
                        });

                        const data = await response.json();
                        const generatedText = data.candidates[0].content.parts[0].text.trim();
                        
                        this.defaultGreeting = generatedText;
                        localStorage.setItem('chat_greeting', generatedText);
                        alert(`已成功使用 Gemini 生成新的硬编码文案并替换：\n\n"${generatedText}"\n\n新创建的会话将应用此欢迎语。`);
                        
                    } catch (error) {
                        alert('Gemini 请求失败，请检查网络或 API Key。');
                        console.error(error);
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
