<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fingerdance Minimal Demo</title>
    <style>
        :root {
            --bg-color: #222;
            --text-color: #eee;
            --key-inactive: #444;
            --key-target-border: #00b7ff; /* 目标需要的颜色：蓝色边框 */
            --key-pressed-wrong: #ff4757; /* 按错的颜色：红色 */
            --key-pressed-correct: #2ed573; /* 按对的颜色：绿色 */
            --key-size: 80px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none; /* 防止快速按键时选中文本 */
        }

        h1 { margin-bottom: 10px; }
        p.intro { color: #aaa; margin-bottom: 30px; }

        #game-container {
            text-align: center;
        }

        #progress-display {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .keys-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }

        /* 单个按键的样式基础 */
        .key-box {
            width: var(--key-size);
            height: var(--key-size);
            background-color: var(--key-inactive);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            color: rgba(255,255,255,0.5);
            border: 4px solid transparent; /* 默认透明边框 */
            transition: all 0.1s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* 状态类 - 顺序很重要，CSS优先级 */

        /* 1. 目标状态：游戏要求你按这个键，显示蓝色边框 */
        .key-box.is-target {
            border-color: var(--key-target-border);
            color: rgba(255,255,255,0.9);
            box-shadow: 0 0 15px var(--key-target-border);
        }

        /* 2. 玩家按下状态：玩家按下了这个键 */
        .key-box.is-pressed {
             background-color: var(--key-pressed-wrong); /* 默认按着是错的(红) */
             color: white;
             transform: translateY(2px);
             box-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }

        /* 3. 正确按下状态：是目标键，且玩家按下了，变绿 */
        .key-box.is-target.is-pressed {
            background-color: var(--key-pressed-correct);
            border-color: var(--key-pressed-correct); /* 边框也变绿 */
        }

        /* 空格键特殊样式，宽一点 */
        .key-box[data-key-code="Space"] {
            width: calc(var(--key-size) * 1.5);
            font-size: 1.5rem;
        }

        #win-message {
            display: none;
            color: var(--key-pressed-correct);
            font-size: 2rem;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

    </style>
</head>
<body>

    <div id="game-container">
        <h1>Fingerdance Demo</h1>
        <p class="intro">使用键盘: A, S, D, F, 空格键</p>
        
        <div id="progress-display">Loading...</div>

        <div class="keys-container">
            <div class="key-box" id="key-A" data-key-code="KeyA">A</div>
            <div class="key-box" id="key-S" data-key-code="KeyS">S</div>
            <div class="key-box" id="key-D" data-key-code="KeyD">D</div>
            <div class="key-box" id="key-F" data-key-code="KeyF">F</div>
            <div class="key-box" id="key-Space" data-key-code="Space">Space</div>
        </div>

        <h2 id="win-message">🎉 通关! 全部完成! 🎉</h2>
    </div>


<script>
    // ==========================================
    // 1. 游戏数据配置 (Gemini 生成的谱面)
    // ==========================================
    // 这是一个包含每一关目标按键组合的数组。
    // 使用 'code' (如 KeyA, Space) 而不是 'key' (如 a, ' ') 以确保跨输入法和大小写的稳定性。
    const levelData = [
        ['KeyA'], // 第1关：单键
        ['KeyS'],
        ['KeyD'],
        ['KeyF'],
        ['Space'],
        ['KeyA', 'KeyS'], // 第6关：简单的双键组合
        ['KeyD', 'KeyF'],
        ['KeyS', 'KeyD'],
        ['KeyA', 'Space'], // 跨度开始变大
        ['KeyF', 'Space'],
        ['KeyA', 'KeyF'], // 考验食指和小指独立性
        ['KeyA', 'KeyS', 'KeyD'], // 第12关：三键组合
        ['KeyS', 'KeyD', 'KeyF'],
        ['KeyA', 'KeyD', 'Space'], // 略微别手
        ['KeyS', 'KeyF', 'Space'],
        ['KeyA', 'KeyS', 'KeyD', 'KeyF'], // 第16关：四指
        ['KeyA', 'KeyF', 'Space', 'KeyS'], // 混乱组合
        ['KeyA', 'KeyS', 'KeyD', 'KeyF', 'Space'] // 终极挑战：全按住
    ];

    // 定义游戏用到的所有有效按键集合，用于快速过滤无关按键
    const validGameKeys = new Set(['KeyA', 'KeyS', 'KeyD', 'KeyF', 'Space']);

    // ==========================================
    // 2. 游戏状态管理
    // ==========================================
    let currentLevelIndex = 0;
    // 使用 Set 来存储当前玩家正按住的键，Set 能自动去重，非常适合处理并发按键
    let pressedKeys = new Set();
    // 当前关卡需要按住的目标键集合
    let currentTargetKeys = new Set();
    let isGameFinished = false;

    // DOM 元素引用
    const progressDisplay = document.getElementById('progress-display');
    const winMessage = document.getElementById('win-message');
    const keyElements = {
        'KeyA': document.getElementById('key-A'),
        'KeyS': document.getElementById('key-S'),
        'KeyD': document.getElementById('key-D'),
        'KeyF': document.getElementById('key-F'),
        'Space': document.getElementById('key-Space'),
    };

    // ==========================================
    // 3. 核心逻辑函数
    // ==========================================

    // 初始化或加载下一关
    function loadLevel(index) {
        if (index >= levelData.length) {
            finishGame();
            return;
        }
        currentLevelIndex = index;
        // 从数据数组加载当前关卡的目标键，转为 Set 方便比对
        currentTargetKeys = new Set(levelData[currentLevelIndex]);
        progressDisplay.textContent = `进度: ${currentLevelIndex + 1} / ${levelData.length}`;
        updateUI();
    }

    // 游戏通关处理
    function finishGame() {
        isGameFinished = true;
        progressDisplay.textContent = "完成!";
        winMessage.style.display = 'block';
        currentTargetKeys.clear(); // 清除目标，让界面回到平静状态
        updateUI();
    }

    // 核心：检查当前按键状态是否符合过关条件并更新UI
    function checkState() {
        if (isGameFinished) return;

        // 1. 判断是否过关
        // 过关条件：按下的键数量必须等于目标键数量，且所有目标键都在按下的键中
        let isMatch = false;
        if (pressedKeys.size === currentTargetKeys.size) {
            isMatch = true;
            for (let targetKey of currentTargetKeys) {
                if (!pressedKeys.has(targetKey)) {
                    isMatch = false;
                    break;
                }
            }
        }

        // 2. 更新UI显示 (无论是否过关都要更新视觉反馈)
        updateUI();

        // 3. 如果完美匹配，短暂延迟后进入下一关
        if (isMatch) {
            // 使用一个小延迟让玩家看到全绿的成功状态，体验更好
            setTimeout(() => {
                // 再次检查以防在延迟期间玩家松开了手
                if (pressedKeys.size === currentTargetKeys.size && [...currentTargetKeys].every(k => pressedKeys.has(k))) {
                     loadLevel(currentLevelIndex + 1);
                }
            }, 150); // 150ms 的确认延迟
        }
    }

    // 根据状态更新 DOM 元素的 CSS 类
    function updateUI() {
        // 遍历我们定义的5个游戏按键
        validGameKeys.forEach(keyCode => {
            const element = keyElements[keyCode];
            const isTarget = currentTargetKeys.has(keyCode);
            const isPressed = pressedKeys.has(keyCode);

            // 切换 CSS 类来改变样式
            // toggle('class-name', boolean) 第二个参数决定是添加还是移除
            element.classList.toggle('is-target', isTarget);
            element.classList.toggle('is-pressed', isPressed);
        });
    }


    // ==========================================
    // 4. 事件监听 (输入处理)
    // ==========================================

    // 监听键盘按下
    document.addEventListener('keydown', (e) => {
        if (isGameFinished) return;
        // 如果按下的键是我们游戏需要的键
        if (validGameKeys.has(e.code)) {
            // 防止空格键滚动页面的默认行为
            if (e.code === 'Space') e.preventDefault();
            
            // 如果这个键还没被记录为按下，且不是长按重复触发
            if (!pressedKeys.has(e.code) && !e.repeat) {
                pressedKeys.add(e.code);
                checkState(); // 状态改变，立即检查
            }
        }
    });

    // 监听键盘松开
    document.addEventListener('keyup', (e) => {
        if (isGameFinished) return;
        if (validGameKeys.has(e.code)) {
            pressedKeys.delete(e.code);
            checkState(); // 状态改变，立即检查
        }
    });
    
    // 窗口失去焦点时（比如 Alt+Tab），清空所有按键状态，防止卡键
    window.addEventListener('blur', () => {
        pressedKeys.clear();
        updateUI();
    });


    // ==========================================
    // 5. 游戏入口
    // ==========================================
    // 启动游戏，加载第一关
    loadLevel(0);

</script>
</body>
</html>
