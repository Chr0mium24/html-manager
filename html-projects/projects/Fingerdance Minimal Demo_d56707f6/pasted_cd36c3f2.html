<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Fingerdance Web MVP</title> <style> body { background-color: #1a1a1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; } .header { text-align: center; margin-bottom: 30px; } .fingers { display: flex; gap: 15px; margin-top: 20px; } .finger { width: 70px; height: 90px; border: 3px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; background-color: #2a2a2a; transition: all 0.05s ease-out; color: #666; } /* 目标按键：发光提示 */ .finger.target { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); color: #fff; } /* 按下状态 */ .finger.pressed { background-color: #555; transform: translateY(6px); } /* 按对目标 */ .finger.pressed.target { background-color: #00ffcc; color: #000; box-shadow: 0 0 25px rgba(0, 255, 204, 0.8); } /* 按错（不是目标却按了） */ .finger.pressed.wrong { background-color: #ff3366; border-color: #ff3366; color: #fff; box-shadow: 0 0 25px rgba(255, 51, 102, 0.8); } #status { margin-top: 30px; font-size: 20px; color: #ccc; font-weight: bold; } #api-setup { background: #2b2b2b; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); } input[type="text"] { padding: 10px; width: 300px; border-radius: 6px; border: 1px solid #555; background: #111; color: #fff; margin-bottom: 15px; } button { padding: 10px 20px; background: #00ffcc; border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.2s; } button:hover { background: #00cca3; } </style> </head> <body> <div class="header"> <h1>Fingerdance 网页版</h1> <p>右手按键映射：<b>Space</b> (拇指) | <b>L</b> (食指) | <b>;</b> (中指) | <b>'</b> (无名指) | <b>Shift</b> (小指)</p> </div> <div id="api-setup"> <p>AI 驱动关卡生成</p> <input type="text" id="apiKey" placeholder="输入 Gemini API Key"><br> <button onclick="start-btn">生成谱面并开始</button> </div> <div class="fingers" id="fingers-container" style="display:none;"> <div class="finger" id="finger-0">Space</div> <div class="finger" id="finger-1">L</div> <div class="finger" id="finger-2">;</div> <div class="finger" id="finger-3">'</div> <div class="finger" id="finger-4">Shift</div> </div> <div id="status"></div> <script> let currentLevel = 0; let levels = []; let currentPressed = [false, false, false, false, false]; let isTransitioning = false; const statusDiv = document.getElementById('status'); const fingersContainer = document.getElementById('fingers-container'); const apiSetupDiv = document.getElementById('api-setup'); // 按键映射转换 function getFingerIndex(code) { if (code === 'Space') return 0; if (code === 'KeyL') return 1; if (code === 'Semicolon') return 2; if (code === 'Quote') return 3; if (code === 'ShiftRight' || code === 'ShiftLeft') return 4; return -1; } // 渲染当前状态判定 function render() { if (!levels.length || currentLevel >= levels.length) return; const targetPattern = levels[currentLevel]; let allCorrect = true; for (let i = 0; i < 5; i++) { const div = document.getElementById('finger-' + i); const isTarget = targetPattern[i]; const isPressed = currentPressed[i]; // 重置类名 div.className = 'finger'; if (isTarget) div.classList.add('target'); if (isPressed) { div.classList.add('pressed'); if (!isTarget) { div.classList.add('wrong'); allCorrect = false; // 误触 } } else { if (isTarget) allCorrect = false; // 漏按 } } // 只有当完全匹配且未在过场时，才进入下一关 if (allCorrect && !isTransitioning) { isTransitioning = true; setTimeout(() => { currentLevel++; if (currentLevel >= levels.length) { statusDiv.innerText = "🎉 完美通关所有 AI 生成的谱面！"; document.removeEventListener('keydown', handleKeyDown); document.removeEventListener('keyup', handleKeyUp); } else { statusDiv.innerText = \`当前进度: \${currentLevel + 1} / \${levels.length}\`; render(); } isTransitioning = false; }, 150); // 留出 150ms 的延迟，让玩家感受到过关的视觉反馈 } } function handleKeyDown(e) { const index = getFingerIndex(e.code); if (index !== -1) { e.preventDefault(); // 防止按空格引起页面滚动 if (!currentPressed[index]) { currentPressed[index] = true; render(); } } } function handleKeyUp(e) { const index = getFingerIndex(e.code); if (index !== -1) { e.preventDefault(); if (currentPressed[index]) { currentPressed[index] = false; render(); } } } // ==== 核心：使用 Gemini-flash-latest 自动生成硬编码关卡 ==== async function generateLevelsWithGemini() { const apiKey = document.getElementById('apiKey').value.trim(); if (!apiKey) { alert("请提供 API Key 以生成关卡。"); return false; } statusDiv.innerText = "正在请求 gemini-flash-latest 生成指尖扭曲序列，请稍候..."; // AI 提示词（Prompt）约束 const prompt = \` 你是一个为节奏动作游戏《Fingerdance》设计关卡的 AI。 游戏按键有 5 个（拇指到小指）。请自动生成 20 个关卡的数据。 要求： 1. 返回一个长度为 20 的 JSON 二维数组。 2. 内部每个数组包含 5 个布尔值 (true/false)，代表这 5 个按键是否需要同时按下。 3. 全为 false 的组合是无效的，必须剔除。 4. 难度平滑递增：前几关为单键或双键，后期加入需要按住 3-4 个键的复杂组合。 5. 相邻的两关指序不能完全相同。 请仅输出纯 JSON 数组文本，不要包含任何 markdown 代码块标记或其他描述文本。 \`; const requestBody = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { response_mime_type: "application/json" } }; try { const response = await fetch(\`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=\${apiKey}\`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) }); if (!response.ok) throw new Error(\`API 错误: \${response.status}\`); const data = await response.json(); const rawText = data.candidates[0].content.parts[0].text; levels = JSON.parse(rawText); console.log("成功获取自动生成的关卡数据：", levels); return true; } catch (error) { console.error(error); alert("关卡生成失败，请检查 API Key 或开发者控制台的报错信息。"); statusDiv.innerText = "生成失败，请重试。"; return false; } } async function startGame() { const success = await generateLevelsWithGemini(); if (success) { apiSetupDiv.style.display = 'none'; fingersContainer.style.display = 'flex'; document.addEventListener('keydown', handleKeyDown, { passive: false }); document.addEventListener('keyup', handleKeyUp, { passive: false }); currentLevel = 0; statusDiv.innerText = \`当前进度: 1 / \${levels.length}\`; render(); } } document.getElementById('start-btn').addEventListener('click', startGame); </script> </body> </html>
