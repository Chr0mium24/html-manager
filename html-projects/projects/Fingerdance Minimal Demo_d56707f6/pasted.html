<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Fingerdance Web MVP</title> <style> body { background-color: #1a1a1a; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; } .header { text-align: center; margin-bottom: 30px; } .fingers { display: flex; gap: 15px; margin-top: 20px; } .finger { width: 70px; height: 90px; border: 3px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: bold; background-color: #2a2a2a; color: #666; transition: all 0.05s ease-out; } /* 目标按键：发光提示 */ .finger.target { border-color: #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.4); color: #fff; } /* 按下状态 */ .finger.pressed { background-color: #555; transform: translateY(6px); } /* 按对目标 */ .finger.pressed.target { background-color: #00ffcc; color: #000; box-shadow: 0 0 25px rgba(0, 255, 204, 0.8); } /* 按错 */ .finger.pressed.wrong { background-color: #ff3366; border-color: #ff3366; color: #fff; box-shadow: 0 0 25px rgba(255, 51, 102, 0.8); } #status { margin-top: 20px; font-size: 20px; color: #ccc; font-weight: bold; } #timer { margin-top: 10px; font-size: 18px; color: #ffcc00; font-family: monospace; } #api-setup { background: #2b2b2b; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); } input[type="text"] { padding: 10px; width: 300px; border-radius: 6px; border: 1px solid #555; background: #111; color: #fff; margin-bottom: 15px; } button { padding: 10px 20px; background: #00ffcc; border: none; color: #000; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 16px; transition: background 0.2s; } button:hover { background: #00cca3; } </style> </head> <body> <div class="header"> <h1>Fingerdance 网页版</h1> <p>映射：<b>Space</b>(拇指) | <b>L</b>(食指) | <b>;</b>(中指) | <b>'</b>(无名指) | <b>Shift</b>(小指)</p> </div> <div id="api-setup"> <p>AI 驱动关卡生成</p> <input type="text" id="apiKey" placeholder="输入 Gemini API Key"><br> <button id="start-btn">生成谱面并开始</button> </div> <div class="fingers" id="fingers-container" style="display:none;"> <div class="finger" id="finger-0">Space</div> <div class="finger" id="finger-1">L</div> <div class="finger" id="finger-2">;</div> <div class="finger" id="finger-3">'</div> <div class="finger" id="finger-4">Shift</div> </div> <div id="status"></div> <div id="timer"></div> <script> let currentLevel = 0; let levels = []; let currentPressed = [false, false, false, false, false]; let isTransitioning = false; let startTime = 0; let timerInterval = null; const statusDiv = document.getElementById('status'); const timerDiv = document.getElementById('timer'); const fingersContainer = document.getElementById('fingers-container'); const apiSetupDiv = document.getElementById('api-setup'); const startBtn = document.getElementById('start-btn'); function getFingerIndex(code) { if (code === 'Space') return 0; if (code === 'KeyL') return 1; if (code === 'Semicolon') return 2; if (code === 'Quote') return 3; if (code === 'ShiftRight' || code === 'ShiftLeft') return 4; return -1; } function updateTimer() { const now = Date.now(); const diff = new Date(now - startTime); const m = String(diff.getMinutes()).padStart(2, '0'); const s = String(diff.getSeconds()).padStart(2, '0'); const ms = String(Math.floor(diff.getMilliseconds() / 10)).padStart(2, '0'); timerDiv.innerText = `耗时: ${m}:${s}:${ms}`; } function render() { if (!levels.length || currentLevel >= levels.length) return; const targetPattern = levels[currentLevel]; let allCorrect = true; for (let i = 0; i < 5; i++) { const div = document.getElementById('finger-' + i); const isTarget = targetPattern[i]; const isPressed = currentPressed[i]; div.className = 'finger'; if (isTarget) div.classList.add('target'); if (isPressed) { div.classList.add('pressed'); if (!isTarget) { div.classList.add('wrong'); allCorrect = false; } } else { if (isTarget) allCorrect = false; } } if (allCorrect && !isTransitioning) { isTransitioning = true; setTimeout(() => { currentLevel++; if (currentLevel >= levels.length) { clearInterval(timerInterval); statusDiv.innerText = "🎉 完美通关！"; document.removeEventListener('keydown', handleKeyDown); document.removeEventListener('keyup', handleKeyUp); } else { statusDiv.innerText = `当前进度: ${currentLevel + 1} / ${levels.length}`; render(); } isTransitioning = false; }, 150); } } function handleKeyDown(e) { const index = getFingerIndex(e.code); if (index !== -1) { e.preventDefault(); if (!currentPressed[index]) { currentPressed[index] = true; render(); } } } function handleKeyUp(e) { const index = getFingerIndex(e.code); if (index !== -1) { e.preventDefault(); if (currentPressed[index]) { currentPressed[index] = false; render(); } } } async function generateLevelsWithGemini() { const apiKey = document.getElementById('apiKey').value.trim(); if (!apiKey) { alert("请提供 API Key 以生成关卡。"); return false; } startBtn.disabled = true; startBtn.innerText = "生成中..."; statusDiv.innerText = "正在请求 gemini-flash-latest 生成谱面..."; const prompt = ` 你是一个为节奏动作游戏设计关卡的 AI。游戏按键有 5 个。请自动生成 10 个关卡的数据。 要求：返回一个长度为 10 的 JSON 二维数组。内部每个数组包含 5 个布尔值 (true/false)，代表这 5 个按键是否需要同时按下。 全为 false 的组合是无效的。难度平滑递增。请仅输出纯 JSON 数组文本。 `; const requestBody = { contents: [{ parts: [{ text: prompt }] }], generationConfig: { response_mime_type: "application/json" } }; try { const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(requestBody) }); if (!response.ok) throw new Error(`API 错误: ${response.status}`); const data = await response.json(); const rawText = data.candidates[0].content.parts[0].text; levels = JSON.parse(rawText); return true; } catch (error) { console.error(error); alert("关卡生成失败，请检查 API Key。"); startBtn.disabled = false; startBtn.innerText = "生成谱面并开始"; statusDiv.innerText = ""; return false; } } async function start() { const success = await generateLevelsWithGemini(); if (success) { apiSetupDiv.style.display = 'none'; fingersContainer.style.display = 'flex'; document.addEventListener('keydown', handleKeyDown, { passive: false }); document.addEventListener('keyup', handleKeyUp, { passive: false }); currentLevel = 0; statusDiv.innerText = `当前进度: 1 / ${levels.length}`; startTime = Date.now(); timerInterval = setInterval(updateTimer, 10); render(); } } // 核心修复点：使用 addEventListener 彻底解决作用域丢失问题 startBtn.addEventListener('click', start); </script> </body> </html>
