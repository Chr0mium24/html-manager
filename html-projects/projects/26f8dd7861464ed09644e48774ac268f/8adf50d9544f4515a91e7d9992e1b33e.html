<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静电平衡模拟 (Electrostatic Equilibrium Demo)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h2 { margin-bottom: 10px; }
        .controls {
            margin-bottom: 15px;
            background: #333;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.9em;
        }
        canvas {
            background-color: #000;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        .legend {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #aaa;
        }
        .item span {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 5px;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <h2>静电平衡可视化 (Electrostatic Equilibrium)</h2>
    
    <div class="controls">
        请用鼠标 <strong>拖动红色的点电荷</strong> 观察导体表面电场的变化。
    </div>

    <canvas id="simCanvas" width="600" height="400"></canvas>

    <div class="legend">
        <div class="item"><span style="background:gray;"></span>导体 (等势体)</div>
        <div class="item"><span style="background:red;"></span>外部电荷</div>
        <div class="item"><span style="background:yellow;"></span>电场线 (E)</div>
        <div class="item"><span style="border: 1px solid white;"></span>等势线 (V)</div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        // 模拟参数
        const GRID_SIZE = 60; // 物理网格大小 (计算用)
        const ITERATIONS_PER_FRAME = 40; // 每帧松弛迭代次数
        const width = canvas.width;
        const height = canvas.height;
        const scaleX = width / GRID_SIZE;
        const scaleY = height / GRID_SIZE;

        // 势场网格
        let potential = [];
        let isConductor = [];
        
        // 场景物体
        const conductor = { x: GRID_SIZE / 2, y: GRID_SIZE / 2, r: 10, voltage: 0 };
        const charge = { x: GRID_SIZE / 4, y: GRID_SIZE / 2, strength: 1000 };

        // 鼠标交互
        let isDragging = false;

        // 初始化网格
        function initGrid() {
            potential = new Array(GRID_SIZE).fill(0).map(() => new Array(GRID_SIZE).fill(0));
            isConductor = new Array(GRID_SIZE).fill(false).map(() => new Array(GRID_SIZE).fill(false));

            // 定义导体形状 (圆形)
            for (let x = 0; x < GRID_SIZE; x++) {
                for (let y = 0; y < GRID_SIZE; y++) {
                    const dist = Math.hypot(x - conductor.x, y - conductor.y);
                    if (dist <= conductor.r) {
                        isConductor[x][y] = true;
                        potential[x][y] = conductor.voltage;
                    }
                }
            }
        }

        // 求解拉普拉斯方程 (松弛法)
        function solvePhysics() {
            for (let k = 0; k < ITERATIONS_PER_FRAME; k++) {
                for (let x = 1; x < GRID_SIZE - 1; x++) {
                    for (let y = 1; y < GRID_SIZE - 1; y++) {
                        
                        // 边界条件 1: 导体内部电势固定 (静电平衡: 整个导体是等势体)
                        if (isConductor[x][y]) {
                            potential[x][y] = conductor.voltage;
                            continue;
                        }

                        // 边界条件 2: 点电荷位置
                        // 为了简单，我们不将点电荷设为固定值，而是叠加一个源项，
                        // 或者简单地在计算平均值后强制修正电荷位置附近的值。
                        // 这里采用简化的叠加法：先计算拉普拉斯平滑，再根据距离强制设置电荷影响
                        
                        // 标准拉普拉斯平滑 (平均周围4点)
                        let avg = (potential[x+1][y] + potential[x-1][y] + potential[x][y+1] + potential[x][y-1]) * 0.25;
                        potential[x][y] = avg;
                    }
                }
                
                // 强制施加点电荷的影响 (作为边界条件的一种近似)
                // 在非常靠近点电荷的地方，电势由库仑定律主导
                let cx = Math.floor(charge.x);
                let cy = Math.floor(charge.y);
                if (cx > 0 && cx < GRID_SIZE-1 && cy > 0 && cy < GRID_SIZE-1) {
                    potential[cx][cy] = charge.strength; // 简单的点源强制
                    potential[cx+1][cy] = charge.strength * 0.8;
                    potential[cx-1][cy] = charge.strength * 0.8;
                    potential[cx][cy+1] = charge.strength * 0.8;
                    potential[cx][cy-1] = charge.strength * 0.8;
                }
            }
        }

        // 获取某点的电场矢量 E = -grad(V)
        function getElectricField(x, y) {
            // 双线性插值获取梯度会更平滑，这里简化为最近邻网格差分
            let ix = Math.floor(x);
            let iy = Math.floor(y);
            
            if (ix < 0 || ix >= GRID_SIZE - 1 || iy < 0 || iy >= GRID_SIZE - 1) return { x: 0, y: 0 };
            if (isConductor[ix][iy]) return { x: 0, y: 0 }; // 导体内部场强为0

            // E = -dV/dx, -dV/dy
            let Ex = -(potential[ix+1][iy] - potential[ix-1][iy]) / 2;
            let Ey = -(potential[ix][iy+1] - potential[ix][iy-1]) / 2;
            
            // 归一化还是保持幅度？为了画流线，我们需要方向
            let len = Math.hypot(Ex, Ey);
            if (len === 0) return { x: 0, y: 0 };
            return { x: Ex, y: Ey, len: len };
        }

        function draw() {
            // 1. 绘制背景势能热力图
            let imgData = ctx.createImageData(width, height);
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    let gx = Math.floor(px / scaleX);
                    let gy = Math.floor(py / scaleY);
                    
                    let v = potential[gx][gy];
                    
                    // 简单的热力图颜色映射 (蓝 -> 黑 -> 红)
                    let r = 0, g = 0, b = 0;
                    let intensity = Math.min(255, Math.abs(v) * 2); 
                    
                    // 简单的蓝色背景作为基调
                    b = 40; 
                    
                    if (v > 0) { r = intensity; } // 正电势偏红
                    else { b = Math.min(255, 40 + intensity); } // 负电势偏亮蓝

                    if (isConductor[gx][gy]) {
                        r = 100; g = 100; b = 100; // 导体灰色
                    }

                    let idx = (py * width + px) * 4;
                    imgData.data[idx] = r;
                    imgData.data[idx+1] = g;
                    imgData.data[idx+2] = b;
                    imgData.data[idx+3] = 255;
                }
            }
            ctx.putImageData(imgData, 0, 0);

            // 2. 绘制等势线 (Equipotential Lines)
            ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            // 简单的等高线算法：检查相邻像素是否跨越了阈值
            const thresholds = [-100, -50, -20, -10, 10, 20, 50, 100, 150, 200, 300, 500];
            for (let x = 0; x < GRID_SIZE - 1; x++) {
                for (let y = 0; y < GRID_SIZE - 1; y++) {
                    let v1 = potential[x][y];
                    let v2 = potential[x+1][y];
                    let v3 = potential[x][y+1];
                    
                    // 忽略导体内部
                    if (isConductor[x][y]) continue;

                    thresholds.forEach(th => {
                        // 横向跨越
                        if ((v1 < th && v2 >= th) || (v1 >= th && v2 < th)) {
                            ctx.moveTo(x * scaleX, y * scaleY);
                            ctx.lineTo((x+1) * scaleX, y * scaleY);
                        }
                        // 纵向跨越
                        if ((v1 < th && v3 >= th) || (v1 >= th && v3 < th)) {
                            ctx.moveTo(x * scaleX, y * scaleY);
                            ctx.lineTo(x * scaleX, (y+1) * scaleY);
                        }
                    });
                }
            }
            ctx.stroke();

            // 3. 绘制电场线 (Streamlines)
            ctx.strokeStyle = "rgba(255, 255, 0, 0.7)";
            ctx.lineWidth = 1.5;
            
            // 从一些种子点开始追踪
            const seeds = [];
            // 在电荷周围产生种子
            for(let a=0; a<Math.PI*2; a+=Math.PI/6) {
                seeds.push({
                    x: charge.x + Math.cos(a)*2, 
                    y: charge.y + Math.sin(a)*2
                });
            }
            // 也在画布边缘产生一些种子，捕捉远场
            for(let i=0; i<GRID_SIZE; i+=10) {
                 seeds.push({x: i, y: 1});
                 seeds.push({x: i, y: GRID_SIZE-2});
            }

            seeds.forEach(seed => {
                ctx.beginPath();
                let currX = seed.x;
                let currY = seed.y;
                ctx.moveTo(currX * scaleX, currY * scaleY);

                let steps = 0;
                while(steps < 200) {
                    let field = getElectricField(currX, currY);
                    if (field.len < 0.1) break; // 场太弱停止
                    
                    // 沿着场方向移动
                    let dx = (field.x / field.len) * 0.5; // 步长
                    let dy = (field.y / field.len) * 0.5;

                    currX += dx;
                    currY += dy;

                    // 检查边界
                    if (currX < 0 || currX >= GRID_SIZE || currY < 0 || currY >= GRID_SIZE) break;
                    
                    // 检查是否进入导体
                    if (isConductor[Math.floor(currX)][Math.floor(currY)]) {
                        // 画到表面为止
                        ctx.lineTo(currX * scaleX, currY * scaleY);
                        break;
                    }

                    ctx.lineTo(currX * scaleX, currY * scaleY);
                    steps++;
                }
                ctx.stroke();
            });

            // 绘制导体轮廓
            ctx.beginPath();
            ctx.arc(conductor.x * scaleX, conductor.y * scaleY, conductor.r * scaleX, 0, Math.PI * 2);
            ctx.fillStyle = "#888";
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.fillStyle = "#000";
            ctx.font = "12px Arial";
            ctx.textAlign = "center";
            ctx.fillText("E = 0", conductor.x * scaleX, conductor.y * scaleY + 4);

            // 绘制电荷
            ctx.beginPath();
            ctx.arc(charge.x * scaleX, charge.y * scaleY, 8, 0, Math.PI * 2);
            ctx.fillStyle = "#ff4444";
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.fillText("+", charge.x * scaleX, charge.y * scaleY + 4);

            requestAnimationFrame(() => {
                solvePhysics();
                draw();
            });
        }

        // 交互逻辑
        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (evt.clientX - rect.left) / scaleX,
                y: (evt.clientY - rect.top) / scaleY
            };
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            const dist = Math.hypot(pos.x - charge.x, pos.y - charge.y);
            if (dist < 3) isDragging = true;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const pos = getMousePos(e);
                // 简单的碰撞检测，不让电荷进入导体内部
                const distToConductor = Math.hypot(pos.x - conductor.x, pos.y - conductor.y);
                if (distToConductor > conductor.r + 2) {
                    charge.x = pos.x;
                    charge.y = pos.y;
                }
            }
        });

        canvas.addEventListener('mouseup', () => isDragging = false);

        // 启动
        initGrid();
        solvePhysics(); // 预热几次
        solvePhysics();
        draw();

    </script>
</body>
</html>
