<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>制袋公式实时计算 - 增强版</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            max-width: 950px;
            margin: 40px auto;
            padding: 30px 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            line-height: 2.4;
            font-size: 1.15em;
        }
        
        .c-dim { color: #1976d2; font-weight: bold; }   /* 蓝色：尺寸 */
        .c-area { color: #8e24aa; font-weight: bold; }  /* 紫色：面积/重量 */
        .c-price { color: #f57c00; font-weight: bold; } /* 橙色：单价/成本 */
        .c-fee { color: #00897b; font-weight: bold; }   /* 青色：杂费/系数 */
        .c-final { color: #d32f2f; font-weight: bold; } /* 红色：最终/强调 */

        input, select {
            width: 70px;
            padding: 2px 5px;
            margin: 0 4px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fafafa;
            font-size: 1em;
            text-align: center;
            outline: none;
            color: #333;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            background-color: #fff;
            border-color: #1976d2;
            box-shadow: 0 0 5px rgba(25,118,210,0.2);
        }
        input::placeholder {
            color: #bbb;
            font-weight: normal;
        }
        select {
            width: auto;
            cursor: pointer;
        }
        .result {
            color: #d32f2f;
            font-weight: bold;
            min-width: 60px;
            display: inline-block;
            border-bottom: 2px dashed #ffcdd2;
            text-align: center;
            padding: 0 5px;
            margin: 0 5px;
        }
        .formula-row {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .formula-row:last-child {
            border-bottom: none;
            background-color: #fffde7;
            padding: 15px;
            border-radius: 6px;
        }
        
        /* 清空按钮样式 */
        .action-row {
            text-align: center;
            margin-top: 25px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        #clearBtn {
            background-color: #f5f5f5;
            color: #555;
            border: 1px solid #ccc;
            padding: 8px 25px;
            font-size: 0.9em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        #clearBtn:hover {
            background-color: #e0e0e0;
            color: #d32f2f;
            border-color: #d32f2f;
        }
    </style>
</head>
<body>
    <div id="calculator">
        <div class="formula-row">
            1. 布料长 = <span class="c-dim">高</span><input type="number" id="h" placeholder="30"> × 2 + <span class="c-dim">侧边</span><input type="number" id="side1" placeholder="10"> + 
            <select id="lengthOffset">
                <option value="3">3</option>
                <option value="6.5" selected>6.5</option>
                <option value="7">7</option>
                <option value="11.5">11.5</option>
            </select>
            = <span class="result" id="resL"></span>
        </div>
        
        <div class="formula-row">
            2. 布料宽 = <span class="c-dim">横宽</span><input type="number" id="w" placeholder="40"> + <span class="c-dim">侧边</span><input type="number" id="side2" placeholder="10"> + 1.5 = <span class="result" id="resW"></span>
        </div>
        
        <div class="formula-row">
            3. 总面积 = (<span class="c-dim">布料长</span> <span class="result" id="valL"></span> × <span class="c-dim">布料宽</span> <span class="result" id="valW"></span>) = <span class="result c-area" id="resArea"></span>
        </div>
        
        <div class="formula-row">
            4. 布料成本：单个袋子重量(g) = <span class="c-area">总面积</span> <span class="result" id="valArea1"></span> × <span class="c-price">克重</span><input type="number" id="gsm" placeholder="80"> × <span class="c-price">布料单价</span><input type="number" id="fabricPrice" placeholder="7000"> = <span class="result c-price" id="resFabricCost"></span>
        </div>
        
        <div class="formula-row">
            5. 彩印成本：彩印面积(m²) = ((<span class="c-dim">布料长</span> <span class="result" id="valL2"></span> - <span class="c-dim">彩印扣减</span><input type="number" id="printDeduct" placeholder="2">) × <span class="c-dim">布料宽</span> <span class="result" id="valW2"></span>) × <span class="c-price">彩印单价</span><input type="number" id="printPrice" placeholder="0.8"> = <span class="result c-price" id="resPrintCost"></span>
        </div>
        
        <div class="formula-row" style="font-size: 1.1em;">
            6. 最终单价 = (<span class="c-price">布料</span> <span class="result" id="valFabricCost"></span> + <span class="c-price">彩印</span> <span class="result" id="valPrintCost"></span> + <span class="c-fee">加工</span><input type="number" id="processFee" placeholder="0.2"> + <span class="c-fee">打包</span><input type="number" id="packFee" placeholder="0.05"> + <span class="c-fee">其他</span><input type="number" id="otherFee" placeholder="0">) × 
            <span class="c-fee">系数</span><select id="multiplier">
                <option value="" selected disabled>选系数</option>
                <option value="1">1</option>
                <option value="1.01">1.01</option>
                <option value="1.075">1.075</option>
            </select>
             = <span class="result c-final" id="resFinal" style="font-size: 1.4em;"></span>
        </div>

        <div class="action-row">
            <button id="clearBtn">清空全部数据</button>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('input, select');
        const side1 = document.getElementById('side1');
        const side2 = document.getElementById('side2');
        const clearBtn = document.getElementById('clearBtn');
        const STORAGE_PREFIX = 'bagCalc_';

        // 页面加载时读取 LocalStorage 数据
        function loadData() {
            inputs.forEach(input => {
                const savedVal = localStorage.getItem(STORAGE_PREFIX + input.id);
                if (savedVal !== null) {
                    input.value = savedVal;
                }
            });
            calculate();
        }

        // 保存单项数据到 LocalStorage
        function saveData(id, value) {
            localStorage.setItem(STORAGE_PREFIX + id, value);
        }

        // 侧边联动逻辑及保存
        side1.addEventListener('input', (e) => { 
            side2.value = e.target.value; 
            saveData('side1', e.target.value);
            saveData('side2', e.target.value);
            calculate(); 
        });
        side2.addEventListener('input', (e) => { 
            side1.value = e.target.value; 
            saveData('side2', e.target.value);
            saveData('side1', e.target.value);
            calculate(); 
        });

        // 监听其他所有输入和下拉框变化并保存
        inputs.forEach(input => {
            if(input.id !== 'side1' && input.id !== 'side2') {
                // 使用 'input' 事件可以同时监听 input 和 select 元素的内容改变
                input.addEventListener('input', (e) => {
                    saveData(e.target.id, e.target.value);
                    calculate();
                });
            }
        });

        // 清空按钮逻辑
        clearBtn.addEventListener('click', () => {
            inputs.forEach(input => {
                localStorage.removeItem(STORAGE_PREFIX + input.id);
                // 恢复默认状态
                if (input.id === 'lengthOffset') {
                    input.value = '6.5';
                } else if (input.id === 'multiplier') {
                    input.value = '';
                } else {
                    input.value = '';
                }
            });
            calculate();
        });

        const formatOutput = (num) => isNaN(num) ? '' : num.toFixed(4);

        function calculate() {
            const getVal = (id) => {
                const val = document.getElementById(id).value;
                if(id === 'otherFee' && val === '') return 0;
                return val === '' ? NaN : parseFloat(val);
            };

            const h = getVal('h');
            const w = getVal('w');
            const side = getVal('side1');
            const lengthOffset = getVal('lengthOffset'); // 获取新的布料长偏移量
            const gsm = getVal('gsm');
            const fabricPrice = getVal('fabricPrice');
            const printDeduct = getVal('printDeduct');
            const printPrice = getVal('printPrice');
            const processFee = getVal('processFee');
            const packFee = getVal('packFee');
            const otherFee = getVal('otherFee'); 
            const multiplier = getVal('multiplier');

            // 1. 布料长
            let L = NaN;
            if (!isNaN(h) && !isNaN(side) && !isNaN(lengthOffset)) {
                L = h * 2 + side + lengthOffset;
                document.getElementById('resL').innerText = formatOutput(L);
                document.getElementById('valL').innerText = formatOutput(L);
                document.getElementById('valL2').innerText = formatOutput(L);
            } else {
                ["resL", "valL", "valL2"].forEach(id => document.getElementById(id).innerText = '');
            }

            // 2. 布料宽
            let W = NaN;
            if (!isNaN(w) && !isNaN(side)) {
                W = w + side + 1.5;
                document.getElementById('resW').innerText = formatOutput(W);
                document.getElementById('valW').innerText = formatOutput(W);
                document.getElementById('valW2').innerText = formatOutput(W);
            } else {
                ["resW", "valW", "valW2"].forEach(id => document.getElementById(id).innerText = '');
            }

            // 3. 总面积
            let Area = NaN;
            if (!isNaN(L) && !isNaN(W)) {
                Area = L * W / 10000;
                document.getElementById('resArea').innerText = formatOutput(Area);
                document.getElementById('valArea1').innerText = formatOutput(Area);
            } else {
                document.getElementById('resArea').innerText = '';
                document.getElementById('valArea1').innerText = '';
            }

            // 4. 布料成本
            let FabricCost = NaN;
            if (!isNaN(Area) && !isNaN(gsm) && !isNaN(fabricPrice)) {
                FabricCost = Area * gsm * fabricPrice / 1000000;
                document.getElementById('resFabricCost').innerText = formatOutput(FabricCost);
                document.getElementById('valFabricCost').innerText = formatOutput(FabricCost);
            } else {
                document.getElementById('resFabricCost').innerText = '';
                document.getElementById('valFabricCost').innerText = '';
            }

            // 5. 彩印成本
            let PrintCost = NaN;
            if (!isNaN(L) && !isNaN(W) && !isNaN(printDeduct) && !isNaN(printPrice)) {
                PrintCost = ((L - printDeduct) * W) * printPrice / 10000;
                document.getElementById('resPrintCost').innerText = formatOutput(PrintCost);
                document.getElementById('valPrintCost').innerText = formatOutput(PrintCost);
            } else {
                document.getElementById('resPrintCost').innerText = '';
                document.getElementById('valPrintCost').innerText = '';
            }

            // 6. 最终单价
            let Final = NaN;
            if (!isNaN(FabricCost) && !isNaN(PrintCost) && !isNaN(processFee) && !isNaN(packFee) && !isNaN(multiplier)) {
                Final = (FabricCost + PrintCost + processFee + packFee + otherFee) * multiplier;
                document.getElementById('resFinal').innerText = formatOutput(Final); 
            } else {
                document.getElementById('resFinal').innerText = '';
            }
        }

        // 初始化执行
        loadData();
    </script>
</body>
</html>
