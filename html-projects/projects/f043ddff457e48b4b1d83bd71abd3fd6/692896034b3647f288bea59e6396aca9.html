<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天式局域网剪贴板</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #f4f7f6; --primary: #075e54; --msg-bg: #dcf8c6; --msg-other: #fff; }
        body { font-family: system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--primary); color: white; padding: 1rem; display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        header input { padding: 5px; border-radius: 4px; border: none; }
        header button { background: #25d366; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        #chat-container { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { max-width: 75%; padding: 10px; border-radius: 8px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; }
        .msg-self { align-self: flex-end; background: var(--msg-bg); border-bottom-right-radius: 0; }
        .msg-other { align-self: flex-start; background: var(--msg-other); border-bottom-left-radius: 0; }
        .msg-time { font-size: 0.7em; color: #666; text-align: right; margin-top: 5px; }
        .ai-summary { font-size: 0.85em; color: #0056b3; font-weight: bold; margin-bottom: 5px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; cursor: pointer;}
        .long-text { display: none; margin-top: 5px; white-space: pre-wrap; font-family: monospace; font-size: 0.9em; }
        .long-text.show { display: block; }
        #input-area { background: white; padding: 10px; display: flex; gap: 10px; border-top: 1px solid #ccc; }
        #input-area textarea { flex: 1; height: 50px; resize: none; border-radius: 20px; padding: 10px 15px; border: 1px solid #ccc; font-family: inherit;}
        #input-area button { background: var(--primary); color: white; border: none; border-radius: 50%; width: 50px; height: 50px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div>
            <span>房间号:</span>
            <input type="text" id="room-id" placeholder="例如: my-home-lan" value="my-home-lan">
            <button onclick="joinRoom()">连接同步</button>
        </div>
        <span id="status">🔴 离线 (仅本地)</span>
    </header>

    <div id="chat-container"></div>

    <div id="input-area">
        <textarea id="msg-input" placeholder="输入或粘贴要同步的内容..."></textarea>
        <button onclick="handleSend()">发送</button>
    </div>

    <script>
        // 核心数据结构：存放在 localStorage
        let messages = JSON.parse(localStorage.getItem('clipboard_chat')) || [];
        let peer = null;
        let conn = null;
        const myPeerId = 'peer_' + Math.random().toString(36).substr(2, 9); // 生成随机的客户端身份

        // 初始化渲染历史记录
        renderMessages();

        // 1. 发送逻辑与 AI 处理过长文本
        async function handleSend() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = ''; // 清空输入框
            let msgObj = {
                id: Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                text: text,
                timestamp: Date.now(),
                sender: myPeerId,
                summary: '' // 用于存放 AI 生成的摘要
            };

            // 如果文本过长(例如超过 150 字符)，调用 Gemini AI 生成摘要，替代硬编码截断逻辑
            if (text.length > 150) {
                msgObj.summary = 'AI 处理中...';
                saveAndRender(msgObj); // 先展示
                msgObj.summary = await generateAISummary(text);
            }

            saveAndRender(msgObj);
            broadcast(msgObj); // 同步给局域网其他设备
        }

        // 2. 数据存储与渲染
        function saveAndRender(newMsg) {
            // 查重并更新（用于覆盖 AI 处理中状态或合并局域网数据）
            const index = messages.findIndex(m => m.id === newMsg.id);
            if (index > -1) {
                messages[index] = newMsg;
            } else {
                messages.push(newMsg);
            }
            // 按时间线排序并保留最近 100 条
            messages.sort((a, b) => a.timestamp - b.timestamp);
            if (messages.length > 100) messages = messages.slice(messages.length - 100);
            
            localStorage.setItem('clipboard_chat', JSON.stringify(messages));
            renderMessages();
        }

        function renderMessages() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            messages.forEach(msg => {
                const isSelf = msg.sender === myPeerId;
                const bubble = document.createElement('div');
                bubble.className = `msg-bubble ${isSelf ? 'msg-self' : 'msg-other'}`;
                
                let contentHTML = '';
                // 如果有 AI 摘要，默认折叠原文本
                if (msg.summary) {
                    contentHTML += `<div class="ai-summary" onclick="toggleText('${msg.id}')">✨ [AI 摘要] ${msg.summary} (点击展开/折叠)</div>`;
                    contentHTML += `<div class="long-text" id="text_${msg.id}">${escapeHTML(msg.text)}</div>`;
                } else {
                    contentHTML += `<div>${escapeHTML(msg.text)}</div>`;
                }

                const timeStr = new Date(msg.timestamp).toLocaleTimeString();
                contentHTML += `<div class="msg-time">${timeStr}</div>`;
                
                bubble.innerHTML = contentHTML;
                container.appendChild(bubble);
            });
            container.scrollTop = container.scrollHeight;
        }

        function toggleText(id) {
            const el = document.getElementById(`text_${id}`);
            if(el) el.classList.toggle('show');
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        // 3. WebRTC (PeerJS) 房间互连与合并逻辑
        // 3. WebRTC (PeerJS) 房间互连与合并逻辑
        function joinRoom() {
            const roomName = document.getElementById('room-id').value;
            if (!roomName) return alert('请输入房间号');
            
            const statusEl = document.getElementById('status');
            statusEl.innerText = '🟡 尝试抢占房间(Host)...';
            
            if (peer) peer.destroy();

            // 尝试作为主机注册
            peer = new Peer(roomName); 
            
            peer.on('open', (id) => {
                statusEl.innerText = '🟢 房间创建成功，等待接入...';
                
                peer.on('connection', (incomingConn) => {
                    statusEl.innerText = '🟡 发现设备，建立数据通道中...';
                    
                    // 【核心修复】主机端必须等待数据通道真正打开！
                    incomingConn.on('open', () => {
                        conn = incomingConn;
                        statusEl.innerText = '🟢 设备已连接';
                        setupSync();
                    });
                });
            });

            // 抢占失败，降级为客户端加入
            peer.on('error', (err) => {
                if (err.type === 'unavailable-id' || err.message.includes('taken')) {
                    statusEl.innerText = '🟡 房间存在，作为客户端加入中...';
                    peer.destroy(); 
                    
                    // 稍微延迟 500ms，确保 PeerJS 彻底释放上一轮的资源
                    setTimeout(() => {
                        peer = new Peer(myPeerId);
                        
                        peer.on('open', () => {
                            conn = peer.connect(roomName);
                            
                            conn.on('open', () => {
                                statusEl.innerText = '🟢 已加入房间';
                                setupSync();
                            });
                            
                            conn.on('error', (e) => {
                                statusEl.innerText = '🔴 连接房间失败';
                            });
                        });
                        
                        // 捕获目标主机成为“幽灵”断开的情况
                        peer.on('error', (e) => {
                            if (e.type === 'peer-unavailable') {
                                statusEl.innerText = '🔴 房间主机已掉线，请刷新重试';
                            }
                        });
                    }, 500); 
                } else {
                    statusEl.innerText = '🔴 网络或信令错误: ' + err.type;
                }
            });
        }
        function setupSync() {
            // 连接成功后，发送自己的全部 localStorage 数据给对方进行历史合并
            conn.send({ type: 'sync_history', data: messages });

            conn.on('data', (payload) => {
                if (payload.type === 'sync_history') {
                    // 合并对方的历史记录
                    let remoteMessages = payload.data;
                    remoteMessages.forEach(rm => {
                        if (!messages.find(m => m.id === rm.id)) {
                            saveAndRender(rm);
                        }
                    });
                } else if (payload.type === 'new_msg') {
                    // 接收新消息
                    saveAndRender(payload.data);
                    // 尝试写入系统剪贴板
                    navigator.clipboard.writeText(payload.data.text).catch(e => console.log('自动写入剪贴板忽略'));
                }
            });
        }

        function broadcast(msgObj) {
            if (conn && conn.open) {
                conn.send({ type: 'new_msg', data: msgObj });
            }
        }

        /* ====================================================================
           AI 模块：代替硬编码的截断与类型判断
           ==================================================================== */
        async function generateAISummary(rawText) {
            // TODO: 填入你的 Gemini API Key
            const apiKey = 'YOUR_GEMINI_API_KEY'; 
            
            const promptText = `
                你是一个剪贴板消息助手。用户刚刚复制了一段长文本。
                请不要做任何多余解释，严格遵守以下规则返回一句话摘要：
                1. 如果是代码，返回：代码片段 | [编程语言名称] | [核心功能简述]
                2. 如果是报错日志，返回：报错日志 | [核心错误信息]
                3. 如果是普通长文，返回：长文本 | [提取最核心的一句话概括内容]
                4. 如果是包含多链接的文本，返回：链接集合 | 包含 [X] 个链接 | [主要领域]
                
                原始文本：
                ${rawText.substring(0, 1000)} // 截取前1000字避免 Token 浪费
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: promptText }] }]
                    })
                });
                const data = await response.json();
                if (data.candidates && data.candidates.length > 0) {
                    return data.candidates[0].content.parts[0].text.trim();
                }
            } catch (error) {
                console.error("AI 摘要生成失败", error);
            }
            return "长文本 (点击展开)"; // 降级处理
        }
    </script>
</body>
</html>
