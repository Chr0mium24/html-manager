<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>静电平衡电场与等势面演示</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        canvas { display: block; }
        .controls { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; pointer-events: auto; }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #4af; }
        p { font-size: 12px; color: #ccc; line-height: 1.5; }
    </style>
</head>
<body>

<div class="controls">
    <h2>静电平衡演示</h2>
    <p>• <b>橙色点</b>：感应电荷（分布在表面）<br>
       • <b>青色线</b>：电场线（垂直于表面）<br>
       • <b>虚线圈</b>：等势面（外部环绕）<br>
       • <b>内部区域</b>：场强 $E=0$，电势相等</p>
    <p>拖动鼠标移动导体位置</p>
</div>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let conductor = { x: 0, y: 0, r: 100 };

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    conductor.x = width / 2;
    conductor.y = height / 2;
}

window.addEventListener('resize', resize);
resize();

// 简单的鼠标交互
canvas.addEventListener('mousemove', (e) => {
    conductor.x = e.clientX;
    conductor.y = e.clientY;
});

function draw() {
    ctx.clearRect(0, 0, width, height);

    const { x, y, r } = conductor;

    // 1. 绘制等势面 (Equipotential Surfaces)
    ctx.setLineDash([5, 5]);
    for (let i = 1; i <= 5; i++) {
        ctx.beginPath();
        ctx.arc(x, y, r + i * 40, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.4 - i * 0.07})`;
        ctx.stroke();
    }
    ctx.setLineDash([]);

    // 2. 绘制电场线 (Electric Field Lines)
    // 静电平衡下，电场线必须垂直于导体表面
    const lineCount = 24;
    ctx.strokeStyle = '#0ff';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < lineCount; i++) {
        const angle = (i / lineCount) * Math.PI * 2;
        const startX = x + Math.cos(angle) * r;
        const startY = y + Math.sin(angle) * r;
        const endX = x + Math.cos(angle) * (r + 150);
        const endY = y + Math.sin(angle) * (r + 150);

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        // 绘制箭头代表方向
        const arrowX = x + Math.cos(angle) * (r + 40);
        const arrowY = y + Math.sin(angle) * (r + 40);
        ctx.save();
        ctx.translate(arrowX, arrowY);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-10, -5);
        ctx.lineTo(-10, 5);
        ctx.fillStyle = '#0ff';
        ctx.fill();
        ctx.restore();
    }

    // 3. 绘制导体
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#333';
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 4. 绘制表面电荷 (Charges on surface)
    for (let i = 0; i < lineCount; i++) {
        const angle = (i / lineCount) * Math.PI * 2;
        const cx = x + Math.cos(angle) * r;
        const cy = y + Math.sin(angle) * r;
        ctx.beginPath();
        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
        ctx.fillStyle = '#ff9900';
        ctx.fill();
    }

    // 5. 内部标注
    ctx.fillStyle = 'white';
    ctx.textAlign = 'center';
    ctx.font = '16px Arial';
    ctx.fillText("导体 (E = 0)", x, y);

    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
