<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Agent 大脑核心</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen p-6">
    <div class="max-w-5xl mx-auto space-y-6">
        <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4">⚙️ 系统配置</h2>
            <div class="grid grid-cols-2 gap-4">
                <input type="password" id="apiKey" placeholder="Gemini API Key" class="bg-gray-700 p-2 rounded text-sm w-full outline-none focus:ring-2 focus:ring-blue-500">
                <input type="text" id="backendUrl" placeholder="http://127.0.0.1:9961" value="http://127.0.0.1:9961" class="bg-gray-700 p-2 rounded text-sm w-full outline-none">
                <input type="password" id="backendToken" placeholder="Backend Token" class="bg-gray-700 p-2 rounded text-sm w-full outline-none">
                <select id="riskThreshold" class="bg-gray-700 p-2 rounded text-sm w-full outline-none">
                    <option value="3">严格限制 (风险得分 > 3 需确认)</option>
                    <option value="6" selected>中等限制 (风险得分 > 6 需确认)</option>
                    <option value="10">无限制 (自动执行所有)</option>
                </select>
            </div>
            <div class="mt-4 flex space-x-4">
                <button onclick="saveConfig()" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm font-bold transition">保存配置</button>
                <button onclick="checkBackend()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm font-bold transition">测试后端连通性</button>
                <button onclick="shutdownBackend()" class="bg-red-600 hover:bg-red-500 px-4 py-2 rounded text-sm font-bold transition">远程关闭后端</button>
            </div>
            <p id="statusMsg" class="mt-2 text-sm text-gray-400"></p>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold mb-4">🚀 发起任务</h2>
            <textarea id="taskInput" rows="3" placeholder="例如：帮我获取当前系统的公网IP，并保存到本地 ip.txt 文件中" class="bg-gray-700 p-3 rounded text-sm w-full outline-none focus:ring-2 focus:ring-blue-500 mb-4"></textarea>
            <button onclick="startNewTask()" class="bg-purple-600 hover:bg-purple-500 w-full py-2 rounded text-md font-bold transition">执行指令 (支持多开)</button>
        </div>

        <div id="tasksContainer" class="space-y-4"></div>
    </div>

    <script>
        // --- 初始化与存储 ---
        function saveConfig() {
            localStorage.setItem('geminiKey', document.getElementById('apiKey').value);
            localStorage.setItem('backendUrl', document.getElementById('backendUrl').value);
            localStorage.setItem('backendToken', document.getElementById('backendToken').value);
            localStorage.setItem('riskThreshold', document.getElementById('riskThreshold').value);
            showStatus('配置已保存到 LocalStorage', 'text-green-400');
        }

        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('geminiKey') || '';
            document.getElementById('backendUrl').value = localStorage.getItem('backendUrl') || 'http://127.0.0.1:9961';
            document.getElementById('backendToken').value = localStorage.getItem('backendToken') || '';
            document.getElementById('riskThreshold').value = localStorage.getItem('riskThreshold') || '6';
        };

        function showStatus(msg, colorClass) {
            const el = document.getElementById('statusMsg');
            el.className = `mt-2 text-sm ${colorClass}`;
            el.innerText = msg;
            setTimeout(() => el.innerText = '', 3000);
        }

        // --- 后端通信 API ---
        async function reqBackend(path, payload = {}) {
            const url = document.getElementById('backendUrl').value;
            const token = document.getElementById('backendToken').value;
            const res = await fetch(`${url}${path}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify(payload)
            });
            if (!res.ok) throw new Error(`HTTP Error ${res.status}`);
            return await res.json();
        }

        async function checkBackend() {
            try { await reqBackend('/execute', {code: 'print("pong")'}); showStatus('后端连接成功！', 'text-green-400'); } 
            catch (e) { showStatus('后端连接失败，请检查 URL 和 Token', 'text-red-400'); }
        }

        async function shutdownBackend() {
            try { await reqBackend('/shutdown'); } catch(e){}
            showStatus('已发送关闭指令', 'text-yellow-400');
        }

        // --- Gemini API 调用 ---
        async function callGemini(messages) {
            const apiKey = document.getElementById('apiKey').value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            
            const contents = messages.map(m => ({ role: m.role, parts: [{ text: m.content }] }));
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: contents })
            });
            const data = await res.json();
            if(data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        }

        // --- 风险评估 AI ---
        async function evaluateRisk(code) {
            const prompt = `请作为一个安全专家，评估以下Python代码在本地执行的破坏性风险得分（1-10分）。
1分=完全安全(如打印文本)，10分=极度危险(如删库、格式化、反弹shell)。
只允许回复一个纯数字。代码如下：\n\n${code}`;
            const res = await callGemini([{role: "user", content: prompt}]);
            return parseInt(res.trim().match(/\d+/)[0]) || 10; // 解析失败默认最高风险
        }

        // --- 核心 ReAct Agent 循环 ---
        let taskIdCounter = 0;
        
        async function startNewTask() {
            const taskText = document.getElementById('taskInput').value;
            if(!taskText) return;
            
            const taskId = ++taskIdCounter;
            createTaskUI(taskId, taskText);
            document.getElementById('taskInput').value = ''; // 清空输入框

            const systemPrompt = `你是一个强大的本地 Python 自动化 Agent。你当前运行在一个带有完整 Python 解释器的环境中。
你的目标是通过编写和执行 Python 代码来满足用户的需求。
规则：
1. 如果你需要第三方库，必须在代码块顶部显式安装它！例如：
   import subprocess, sys
   subprocess.check_call([sys.executable, "-m", "pip", "install", "requests"])
2. 每一步思考后，如果你需要执行代码，请提供一个包含 \`\`\`python 的代码块。
3. 如果任务已经完全解决，请直接输出 "FINAL_ANSWER: 任务已完成"，并附带结果总结。`;

            let messages = [
                { role: "user", content: systemPrompt + "\n\n用户任务: " + taskText }
            ];

            const logArea = document.getElementById(`log-${taskId}`);
            const log = (msg) => { logArea.innerHTML += `<div>${msg}</div>`; logArea.scrollTop = logArea.scrollHeight; };

            log(`<span class="text-blue-400">[System] 任务开始...</span>`);

            let step = 0;
            while(step++ < 10) { // 最大循环限制
                try {
                    log(`<span class="text-gray-400">[Agent] 正在思考...</span>`);
                    const response = await callGemini(messages);
                    messages.push({ role: "model", content: response });
                    
                    // 解析代码块
                    const codeMatch = response.match(/```python\n([\s\S]*?)```/);
                    
                    if (response.includes("FINAL_ANSWER")) {
                        log(`<span class="text-green-400 font-bold">[Success] ${response}</span>`);
                        break;
                    }

                    if (codeMatch) {
                        const code = codeMatch[1];
                        log(`<span class="text-yellow-400">[Plan] 准备执行代码:</span><pre class="bg-black p-2 rounded text-xs overflow-x-auto text-gray-300 mt-1 mb-2">${code}</pre>`);
                        
                        // 1. 风险打分
                        const score = await evaluateRisk(code);
                        const threshold = parseInt(document.getElementById('riskThreshold').value);
                        log(`<span class="text-pink-400">[Sec] AI风险评估得分: ${score}/10 (阈值: ${threshold})</span>`);

                        // 2. 阈值拦截
                        if (score > threshold) {
                            const userPermit = confirm(`任务 #${taskId} 触发安全拦截！\n风险得分: ${score}\n\n代码:\n${code}\n\n是否允许执行？`);
                            if (!userPermit) {
                                log(`<span class="text-red-400">[Sec] 用户拒绝执行，任务中止。</span>`);
                                break;
                            }
                        }

                        // 3. 后端执行
                        log(`<span class="text-gray-400">[Backend] 发送代码至执行器...</span>`);
                        const execRes = await reqBackend('/execute', {code});
                        
                        const obs = `Stdout:\n${execRes.stdout}\nStderr:\n${execRes.stderr}\nTraceback:\n${execRes.traceback}`;
                        log(`<span class="text-cyan-400">[Observation] 返回结果:</span><pre class="bg-gray-700 p-2 rounded text-xs overflow-x-auto text-gray-300 mt-1 mb-2">${obs}</pre>`);
                        
                        // 反馈给 Agent
                        messages.push({ role: "user", content: `执行结果:\n${obs}\n请基于此结果继续，如果完成请输出 FINAL_ANSWER。`});

                    } else {
                        log(`<span class="text-gray-400">[Agent] 未提供代码，试图直接回复: ${response}</span>`);
                        messages.push({ role: "user", content: `你没有提供有效的 \`\`\`python 代码块，也没有输出 FINAL_ANSWER。请纠正格式。`});
                    }

                } catch(e) {
                    log(`<span class="text-red-500">[Error] 异常中断: ${e.message}</span>`);
                    break;
                }
            }
        }

        // --- 动态 UI 生成 ---
        function createTaskUI(id, title) {
            const div = document.createElement('div');
            div.className = "bg-gray-800 p-4 rounded-lg shadow border border-gray-700";
            div.innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-bold text-sm text-blue-300">📌 任务 #${id}: ${title}</h3>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-gray-500 hover:text-red-500">✖</button>
                </div>
                <div id="log-${id}" class="bg-gray-900 font-mono text-sm p-3 rounded h-64 overflow-y-auto space-y-1"></div>
            `;
            document.getElementById('tasksContainer').prepend(div);
        }
    </script>
</body>
</html>
