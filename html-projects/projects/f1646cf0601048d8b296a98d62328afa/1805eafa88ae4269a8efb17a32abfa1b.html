        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 单词高亮交互样式 */
        .gre-word {
            color: #2563eb;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px solid #dbeafe;
            transition: all 0.2s;
            padding-bottom: 1px;
        }
        .gre-word:hover {
            background-color: #eff6ff;
            border-bottom-color: #2563eb;
        }

        /* 动画 */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    async function callGemini(apiKey, prompt, systemPrompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
        };
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (e) {
            console.error("API Error:", e);
            throw e;
        }
    }

            toastTimerRef.current = setTimeout(() => setToast(null), 3000);
        };

        const enqueueArticle = (article) => {
            setArticleQueue(prev => {
                if (prev.length >= MAX_QUEUE) return prev;
                return [...prev, article];
            });
        };
        
        const normalizeWord = (word) => word.replace(/[.,!?;:]/g, "").toLowerCase();
        const normalizeRoot = (root) => {
            const cleaned = stripHtml(String(root || ''))
                .toLowerCase()
                .replace(/root[:：]?\s*/g, '')
                .replace(/\(.*?\)/g, ' ')
                .replace(/\[.*?\]/g, ' ')
                .replace(/[^a-z/ ]+/g, ' ')
                .trim();
            if (!cleaned) return '';
            if (cleaned.includes('/')) return cleaned.split('/')[0].trim();
            if (cleaned.includes(' ')) return cleaned.split(' ')[0].trim();
            return cleaned;
        };
        const stripHtml = (html) => {
            const tmp = document.createElement('div');
            tmp.innerHTML = html || '';
            return (tmp.textContent || '').trim();
        };
        const includesQuery = (text, query) => {
            if (!query) return true;
            return String(text || '').toLowerCase().includes(query.toLowerCase());
        };
        const extractWordsFromHtml = (html) => {
            const matches = html.matchAll(/data-word="([^"]+)"/g);
            const words = [];
            for (const m of matches) words.push(normalizeWord(m[1]));
            return Array.from(new Set(words));
        };
        const hasEtymologyArticle = (word) => {
            const target = normalizeWord(word);
            return articlesRef.current.some(a =>
                a.type === 'new_word' &&
                a.targetWords.some(tw => normalizeWord(tw) === target)
            );
        };

        const preloadEtymologies = async (words) => {
            const unique = Array.from(new Set(words.map(normalizeWord))).filter(Boolean);
            for (const w of unique) {
                if (preloadingRef.current.has(w)) continue;
                if (hasEtymologyArticle(w)) continue;
                if (wordsDataRef.current[w]) continue;
                preloadingRef.current.add(w);
                try {
                    await generateEtymology(w, { preload: true });
                } catch (e) {
                    console.error(e);
                } finally {
                    preloadingRef.current.delete(w);
                }
            }
        };

        const exportAllData = () => {
            const payload = {
                version: 1,
                exportedAt: new Date().toISOString(),
                articles,
                wordsData,
                rootsData,
                wordsSinceLastStory
            };
            const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `gre_flow_data_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('已导出数据');
        };

        const handleImportFile = (e) => {
            const file = e.target.files && e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                try {
                    const parsed = JSON.parse(reader.result);
                    if (!parsed || !Array.isArray(parsed.articles) || typeof parsed.wordsData !== 'object' || typeof parsed.rootsData !== 'object') {
                        throw new Error('invalid');
                    }
                    setArticles(parsed.articles || []);
                    setWordsData(parsed.wordsData || {});
                    setRootsData(parsed.rootsData || {});
                    setWordsSinceLastStory(parseInt(parsed.wordsSinceLastStory, 10) || 0);
                    setArticleQueue([]);
                    setCurrentArticle((parsed.articles && parsed.articles.length > 0) ? parsed.articles[parsed.articles.length - 1] : null);
                    setModalArticle(null);
                    showToast('导入成功');
                } catch (err) {
                    console.error(err);
                    showToast('导入失败：文件格式不正确');
                } finally {
                    e.target.value = '';
                }
            };
            reader.readAsText(file);
        };

        const deleteArticle = (id) => {
            if (!confirm('确定删除这篇文章吗？')) return;
            setArticles(prev => prev.filter(a => a.id !== id));
            setArticleQueue(prev => prev.filter(a => a.id !== id));
            setCurrentArticle(prev => (prev && prev.id === id ? null : prev));
            setModalArticle(prev => (prev && prev.id === id ? null : prev));
        };
        
        // 生成内容逻辑 (复用之前的逻辑，但修改 Prompt 以适配 HTML 结构)
        const generateContent = async () => {
            if (loading || articleQueue.length >= MAX_QUEUE) return;
            setLoading(true);
            try {
                // 简单决策逻辑
                let plan = { type: 'new_word' };
                if (wordsSinceLastStory >= 8) plan = { type: 'review_story' };
                
                // 找词
                const availableWords = GRE_WORDS.filter(w => !wordsData[w] && !hasEtymologyArticle(w));
                if (plan.type === 'new_word' && availableWords.length > 0) {
                    const word = availableWords[Math.floor(Math.random() * availableWords.length)];
                    await generateEtymology(word);
                } else if (plan.type === 'review_story' && Object.keys(wordsData).length >= 5) {
                    await generateReviewStory();
                } else if (availableWords.length === 0) {
                    alert("词库已刷完！");
                } else {
                     // Fallback
                     const word = availableWords[Math.floor(Math.random() * availableWords.length)];
                     await generateEtymology(word);
                }
            } catch (e) {
                console.error(e);
                showToast("API 访问失败，请检查 Key 或网络后重试。");
            } finally {
                setLoading(false);
            }
        };

        const generateEtymology = async (word, options = {}) => {
            const { preload = false } = options;
            // Prompt: 关键在于要求输出带 class 的 span
            const systemPrompt = `You are an expert GRE vocabulary tutor. Respond in JSON.
            Task: Explain the etymology of "${word}".
            IMPORTANT: The "title" MUST be plain text only. Do NOT include any HTML tags in the title.
            IMPORTANT HTML FORMATTING:
            When you mention the word "${word}" or any other GRE word you want to highlight, DO NOT use <strong>.
            INSTEAD, use this EXACT format: <span class="gre-word" data-word="word_here">word_here</span>.
            
            JSON Schema:
            {
                "title": "Title (e.g. 'The Roots of ${word}')",
                "root": "Main root ONLY, plain text, lowercase letters only (e.g. 'bene'). No explanations, no extra words.",
                "definition": "Short definition",
                "content": "HTML string. 2-3 paragraphs. Explain origin, memory aid, and usage. Use the span format defined above for the target word."
            }`;

            const data = await callGemini(apiKey, `Explain "${word}"`, systemPrompt);
            const normalizedRoot = normalizeRoot(data.root);
            const newArticle = {
                id: generateId(),
                type: 'new_word',
                title: stripHtml(data.title),
                content: data.content,
                relatedRoot: normalizedRoot,
                targetWords: [word],
                previewText: data.definition,
                timestamp: Date.now(),
                seen: false
            };
            if (preload) {
                setArticles(prev => [...prev, newArticle]);
            } else {
                updateData(newArticle, [word], normalizedRoot);
                const extraWords = extractWordsFromHtml(data.content).filter(w => w !== normalizeWord(word));
                if (extraWords.length) preloadEtymologies(extraWords);
            }
        };

        const generateReviewStory = async () => {
            const learned = Object.keys(wordsData);
            const selected = [];
            while(selected.length < 5) {
                const w = learned[Math.floor(Math.random() * learned.length)];
                if(!selected.includes(w)) selected.push(w);
            }

            const systemPrompt = `You are a writer. Respond in JSON.
            Task: Write a short story (150 words) using: ${selected.join(', ')}.
            IMPORTANT: The "title" MUST be plain text only. Do NOT include any HTML tags in the title.
            IMPORTANT HTML FORMATTING:
            Wrap EACH occurrence of these words in: <span class="gre-word" data-word="word_here">word_here</span>.
            
            JSON Schema:
            {
                "title": "Story Title",
                "content": "HTML string. The story.",
                "used_words": ["list", "of", "words"]
            }`;

            const data = await callGemini(apiKey, `Story using: ${selected.join(', ')}`, systemPrompt);
            const newArticle = {
                id: generateId(),
                type: 'review_story',
                title: stripHtml(data.title),
                content: data.content,
                targetWords: data.used_words || selected,
                previewText: "Story review...",
                timestamp: Date.now(),
                seen: false
            };
            
            // Story 不重置词根，只加到列表
            setArticles(prev => [...prev, newArticle]);
            enqueueArticle(newArticle);
            setWordsSinceLastStory(0);
            preloadEtymologies(data.used_words || selected);
        };

        const updateData = (article, words, root) => {
            setWordsData(prev => ({ ...prev, [words[0]]: { status: 'learned', root, timestamp: Date.now() } }));
            if (root) {
                setRootsData(prev => {
                    const list = prev[root] || [];
                    return list.includes(words[0]) ? prev : { ...prev, [root]: [...list, words[0]] };
                });
            }
            setWordsSinceLastStory(prev => prev + 1);
            setArticles(prev => [...prev, article]);
            enqueueArticle(article);
        };

        // --- Interaction Handlers ---

        useEffect(() => {
            if (apiKey && articleQueue.length < MAX_QUEUE) generateContent();
        }, [articleQueue, apiKey]);

        useEffect(() => {
            if (!currentArticle && articleQueue.length > 0) {
                setCurrentArticle(articleQueue[0]);
                setArticleQueue(q => q.slice(1));
            }
        }, [articleQueue]);

        useEffect(() => {
            if (!currentArticle || currentArticle.seen !== false) return;
            setArticles(prev => prev.map(a => a.id === currentArticle.id ? { ...a, seen: true } : a));
            setCurrentArticle(prev => prev && prev.id === currentArticle.id ? { ...prev, seen: true } : prev);
        }, [currentArticle]);

        const handleWordClick = (word) => {
            // 查找该词的 type='new_word' 文章
            const cleanWord = normalizeWord(word);
            const found = articles.slice().reverse().find(a => 
                a.type === 'new_word' && 
                a.targetWords.some(tw => tw.toLowerCase() === cleanWord)
            );
            
            if (found) {
                setModalArticle(found);
            } else {
                // 如果没有找到文章，可能是还没学，或者是复习故事里的词但没有单独的词源文章
                // 这里可以扩展为：如果没学，现场生成一个 rapid-definition
                showToast(`"${cleanWord}" 的词源文章尚未生成，已开始预加载...`);
                preloadEtymologies([cleanWord]);
            }
        };

        if (!apiKey) return <WelcomeScreen onSaveKey={setApiKey} />;

        // --- Main Render ---
        return (
            <div className="flex justify-center h-full bg-slate-100">
                <div className="w-full max-w-md bg-slate-50 h-full shadow-2xl overflow-hidden flex flex-col relative border-x border-slate-200">
                    
                    {/* Top Bar */}
                    <header className="flex-none bg-white/95 border-b border-slate-100 h-14 px-4 flex items-center justify-between z-10">
                        <div className="flex items-center gap-2">
                            <i data-lucide="layers" className="w-5 h-5 text-brand-600"></i>
                            <span className="font-bold text-slate-800 tracking-tight">GRE Flow</span>
                        </div>
                        <div className="flex items-center gap-3">
                             <div className="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-md">
                                <span className="text-xs font-semibold text-slate-500">Queue</span>
                                <span className="text-xs font-bold text-slate-900">{articleQueue.length}</span>
                            </div>
                            {loading && <div className="w-4 h-4 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>}
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 min-h-0 overflow-hidden relative bg-slate-50">
                        {view === 'feed' && (
                            <div className="h-full p-3 sm:p-4">
                                <ArticleCard 
                                    article={currentArticle} 
                                    onNext={() => {
                                        if(articleQueue.length > 0) {
                                            setCurrentArticle(articleQueue[0]);
                                            setArticleQueue(q => q.slice(1));
                                        } else {
                                            generateContent(); 
                                            // 临时置空等待
                                            setCurrentArticle(null);
                                        }
                                    }}
                                    onWordClick={handleWordClick}
                                />
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="h-full overflow-y-auto p-4 hide-scrollbar">
                                <h2 className="text-xl font-bold text-slate-900 mb-4 px-1">学习足迹</h2>
                                <div className="mb-4">
                                    <input
                                        type="text"
                                        placeholder="搜索单词/故事标题..."
                                        value={historyQuery}
                                        onChange={(e) => setHistoryQuery(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition bg-white"
                                    />
                                </div>
                                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-4">
                                    <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">数据管理</div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button
                                            className="w-full bg-slate-900 text-white text-sm font-semibold py-2.5 rounded-xl hover:bg-slate-800 transition"
                                            onClick={exportAllData}
                                        >
                                            导出全部数据
                                        </button>
                                        <button
                                            className="w-full bg-slate-100 text-slate-700 text-sm font-semibold py-2.5 rounded-xl hover:bg-slate-200 transition"
                                            onClick={() => importInputRef.current && importInputRef.current.click()}
                                        >
                                            导入数据
                                        </button>
                                    </div>
                                    <input
                                        ref={importInputRef}
                                        type="file"
                                        accept="application/json"
                                        className="hidden"
                                        onChange={handleImportFile}
                                    />
                                </div>
                                <div className="space-y-3">
                                    {articles.slice().reverse().filter(art => {
                                        if (art.seen === false) return false;
                                        const titleText = stripHtml(art.title);
                                        const wordText = art.targetWords && art.targetWords[0];
                                        return (
                                            includesQuery(titleText, historyQuery) ||
                                            includesQuery(wordText, historyQuery) ||
                                            includesQuery(art.previewText, historyQuery)
                                        );
                                    }).map(art => (
                                        <div key={art.id} 
                                            onClick={() => setModalArticle(art)}
                                            className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 active:scale-[0.98] transition cursor-pointer"
                                        >
                                            <div className="flex justify-between items-start mb-1 gap-2">
                                                <div className="flex items-center gap-2 flex-1 min-w-0">
                                                    <span className={`text-[10px] font-bold uppercase tracking-wide px-2 py-1 rounded-full ${
                                                        art.type === 'new_word' ? 'bg-indigo-50 text-indigo-700' : 'bg-amber-50 text-amber-700'
                                                    }`}>
                                                        {art.type === 'new_word' ? 'Word' : 'Story'}
                                                    </span>
                                                    <h3 className="font-bold text-slate-800 truncate">
                                                        {art.type === 'new_word' ? (art.targetWords && art.targetWords[0]) : stripHtml(art.title)}
                                                    </h3>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-[10px] text-slate-400 bg-slate-50 px-2 py-1 rounded">{new Date(art.timestamp).toLocaleDateString()}</span>
                                                    <button
                                                        className="p-1.5 rounded-md hover:bg-red-50 text-red-500"
                                                        onClick={(e) => { e.stopPropagation(); deleteArticle(art.id); }}
                                                        title="删除"
                                                    >
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <p className="text-sm text-slate-500 truncate">{art.previewText}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="h-full overflow-y-auto p-4 hide-scrollbar">
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Words</div>
                                        <div className="text-3xl font-bold text-brand-600">{Object.keys(wordsData).length}</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Stories</div>
                                        <div className="text-3xl font-bold text-amber-500">{articles.length}</div>
                                    </div>
                                </div>
                                <h3 className="text-lg font-bold text-slate-900 mb-3">词根网络</h3>
                                <div className="mb-4">
                                    <input
                                        type="text"
                                        placeholder="搜索词根或单词..."
                                        value={rootsQuery}
                                        onChange={(e) => setRootsQuery(e.target.value)}
                                        className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition bg-white"
                                    />
                                </div>
                                <div className="space-y-3">
                                    {Object.entries(rootsData).filter(([root, words]) => {
                                        if (!rootsQuery) return true;
                                        if (includesQuery(root, rootsQuery)) return true;
                                        return (words || []).some(w => includesQuery(w, rootsQuery));
                                    }).map(([root, words]) => (
                                        <div key={root} className="bg-white rounded-xl border border-slate-100 overflow-hidden">
                                            <div className="px-4 py-3 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                                                <span className="font-mono text-brand-700 font-bold">{root}</span>
                                                <span className="text-xs text-slate-400">{words.length} words</span>
                                            </div>
                                            <div className="p-3 flex flex-wrap gap-2">
                                                {words.map(w => (
                                                    <span key={w} onClick={() => handleWordClick(w)} className="px-2 py-1 bg-white border border-slate-200 text-slate-600 text-xs rounded-md cursor-pointer hover:border-brand-300 hover:text-brand-600 transition">
                                                        {w}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Toast */}
                    {toast && (
                        <div className="absolute left-4 right-4 bottom-20 z-30">
                            <div className="bg-slate-900 text-white text-sm px-4 py-3 rounded-xl shadow-lg shadow-slate-900/20">
                                {toast}
                            </div>
                        </div>
                    )}

                    {/* Bottom Nav */}
                    <nav className="flex-none bg-white border-t border-slate-100 h-16 flex justify-around items-center px-2 z-20 pb-safe">
                        {[
                            { id: 'feed', icon: 'zap', label: 'Feed' },
                            { id: 'history', icon: 'history', label: 'History' },
                            { id: 'stats', icon: 'bar-chart-2', label: 'Stats' },
                        ].map(tab => (
                            <button 
                                key={tab.id}
                                onClick={() => setView(tab.id)}
                                className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${
                                    view === tab.id ? 'text-brand-600' : 'text-slate-400 hover:text-slate-600'
                                }`}
                            >
                                <i data-lucide={tab.icon} className={`w-6 h-6 ${view === tab.id ? 'fill-current opacity-20' : ''}`}></i>
                                <span className="text-[10px] font-medium">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* Word Detail Modal */}
                    {modalArticle && (
                        <WordDetailModal 
                            article={modalArticle} 
                            onClose={() => setModalArticle(null)} 
                        />
                    )}
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
</body>
</html>
