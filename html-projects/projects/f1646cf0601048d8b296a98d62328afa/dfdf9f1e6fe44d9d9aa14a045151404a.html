<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GRE Flow - 现代化背词</title>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        serif: ['Merriweather', 'Georgia', 'serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* 自定义样式补充 */
        html, body, #root { height: 100%; }
        body { -webkit-font-smoothing: antialiased; }
        
        /* 隐藏滚动条但保留功能 */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 单词高亮交互样式 */
        .gre-word {
            color: #2563eb;
            font-weight: 700;
            cursor: pointer;
            border-bottom: 2px solid #dbeafe;
            transition: all 0.2s;
            padding-bottom: 1px;
        }
        .gre-word:hover {
            background-color: #eff6ff;
            border-bottom-color: #2563eb;
        }

        /* 动画 */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen overflow-hidden selection:bg-brand-100 selection:text-brand-900">

<div id="root"></div>

<script type="text/babel">

    // --- 内置 GRE 词库 (部分) ---
    const GRE_WORDS = [
        "abate", "aberrant", "abeyance", "abscond", "abstemious", "admonish", "adulterate", "aesthetic", "aggrandize", "alacrity",
        "alleviate", "amalgamate", "ambiguous", "ambivalence", "ameliorate", "anachronism", "analogous", "anarchy", "anomalous", "antipathy",
        "apathy", "appease", "apprise", "approbation", "appropriate", "arduous", "artless", "ascetic", "assiduous", "assuage",
        "attenuate", "audacious", "austere", "autonomous", "aver", "banal", "belie", "beneficent", "bolster", "bombastic",
        "boorish", "burgeon", "burnish", "buttress", "cacophony", "capricious", "castigate", "catalyst", "caustic", "chicanery",
        "coagulate", "coda", "cogent", "commensurate", "compendium", "complaisant", "compliant", "conciliatory", "condone", "confound"
    ];

    const { useState, useEffect, useRef, useMemo } = React;

    // --- 工具函数 ---
    const generateId = () => Math.random().toString(36).substr(2, 9);

    async function callGemini(apiKey, prompt, systemPrompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const payload = {
            contents: [{ parts: [{ text: prompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
        };
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.error) throw new Error(data.error.message);
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (e) {
            console.error("API Error:", e);
            throw e;
        }
    }

    // --- 组件 ---

    // 1. 设置/欢迎页面
    const WelcomeScreen = ({ onSaveKey }) => {
        const [key, setKey] = useState('');
        return (
            <div className="flex flex-col items-center justify-center min-h-screen bg-white p-6">
                <div className="max-w-sm w-full space-y-8 slide-up">
                    <div className="text-center">
                        <div className="w-16 h-16 bg-brand-50 text-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-sm">
                            <i data-lucide="book-open" className="w-8 h-8"></i>
                        </div>
                        <h1 className="text-3xl font-bold text-slate-900 tracking-tight">GRE Flow</h1>
                        <p className="mt-2 text-slate-500">AI 驱动的沉浸式词源记忆流</p>
                    </div>
                    
                    <div className="space-y-4">
                        <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">Gemini API Key</label>
                            <input 
                                type="password" 
                                placeholder="输入 key 开始..." 
                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition"
                                value={key}
                                onChange={(e) => setKey(e.target.value)}
                            />
                        </div>
                        <button 
                            className="w-full bg-brand-600 text-white font-semibold py-3.5 rounded-xl shadow-lg shadow-brand-500/30 hover:bg-brand-700 hover:shadow-brand-500/40 transition active:scale-[0.98]"
                            onClick={() => onSaveKey(key)} 
                            disabled={!key}
                        >
                            开始探索
                        </button>
                        <p className="text-xs text-center text-slate-400">Key 仅存储在本地浏览器中，安全无虞。</p>
                    </div>
                </div>
            </div>
        );
    };

    // 2. 单词详情弹窗 (Modal)
    const WordDetailModal = ({ article, onClose }) => {
        if (!article) return null;
        return (
            <div className="absolute inset-0 z-50 flex items-end sm:items-center justify-center pointer-events-none">
                {/* Backdrop */}
                <div className="absolute inset-0 pointer-events-none"></div>
                
                {/* Modal Content */}
                <div className="bg-white w-full max-w-md max-h-[85vh] overflow-y-auto rounded-t-3xl sm:rounded-3xl shadow-2xl pointer-events-auto slide-up flex flex-col">
                    <div className="sticky top-0 bg-white/95 z-10 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                        <span className="text-xs font-bold tracking-wider text-slate-400 uppercase">词汇回顾</span>
                        <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full transition">
                            <i data-lucide="x" className="w-5 h-5 text-slate-500"></i>
                        </button>
                    </div>
                    
                    <div className="p-6 pb-10">
                        <h2 className="text-3xl font-bold font-serif text-slate-900 mb-2">{article.targetWords[0]}</h2>
                        <div className="inline-block bg-brand-50 text-brand-700 px-2 py-1 rounded text-xs font-mono mb-6">
                            Root: {article.relatedRoot || 'N/A'}
                        </div>
                        <div 
                            className="prose prose-slate prose-lg max-w-none prose-headings:font-serif prose-p:text-slate-600 prose-p:leading-7"
                            dangerouslySetInnerHTML={{ __html: article.content }} 
                        />
                    </div>
                </div>
            </div>
        );
    };

    // 3. 文章卡片
    const ArticleCard = ({ article, onNext, onWordClick }) => {
        const contentRef = useRef(null);

        // 处理点击事件，实现跳转
        const handleContentClick = (e) => {
            const target = e.target.closest('[data-word]');
            if (target) {
                const word = target.getAttribute('data-word');
                onWordClick(word);
            }
        };

        if (!article) return (
            <div className="flex flex-col items-center justify-center h-full space-y-4 fade-in">
                <div className="w-12 h-12 border-4 border-brand-200 border-t-brand-600 rounded-full animate-spin"></div>
                <p className="text-slate-400 text-sm font-medium animate-pulse">AI 正在编织故事...</p>
            </div>
        );

        return (
            <div className="flex flex-col h-full min-h-0 bg-white sm:rounded-3xl shadow-sm overflow-hidden slide-up">
                {/* Scrollable Content */}
                <div className="flex-1 overflow-y-auto p-6 sm:p-8 hide-scrollbar">
                    {/* Header */}
                    <div className="flex items-center gap-2 mb-6">
                        <span className={`px-3 py-1 rounded-full text-xs font-bold tracking-wide uppercase ${
                            article.type === 'new_word' ? 'bg-indigo-50 text-indigo-700' : 'bg-amber-50 text-amber-700'
                        }`}>
                            {article.type === 'new_word' ? 'New Word' : 'Review Story'}
                        </span>
                        <span className="text-slate-300 text-xs">•</span>
                        <span className="text-slate-400 text-xs font-medium">
                            {new Date(article.timestamp).toLocaleDateString()}
                        </span>
                    </div>

                    {/* Title */}
                    <h2 className="text-2xl sm:text-3xl font-bold font-serif text-slate-900 mb-6 leading-tight">
                        {article.title}
                    </h2>

                    {/* Content */}
                    <div 
                        ref={contentRef}
                        onClick={handleContentClick}
                        className="prose prose-slate prose-lg max-w-none 
                                   prose-headings:font-serif prose-headings:text-slate-800 
                                   prose-p:text-slate-600 prose-p:leading-8 prose-p:font-serif
                                   prose-strong:text-brand-700 prose-strong:font-semibold"
                        dangerouslySetInnerHTML={{ __html: article.content }}
                    />

                    {/* Footer Actions */}
                    <div className="mt-12 mb-4">
                        <button 
                            className="w-full group relative flex items-center justify-center gap-2 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-xl shadow-slate-900/10 hover:shadow-slate-900/20 hover:-translate-y-0.5 transition-all duration-300" 
                            onClick={onNext}
                        >
                            <span className="font-semibold">Next Card</span>
                            <i data-lucide="arrow-right" className="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                        </button>
                    </div>
                </div>
            </div>
        );
    };

    // 4. 主界面
    const App = () => {
        const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_key') || '');
        const [view, setView] = useState('feed'); // feed, history, stats
        const [loading, setLoading] = useState(false);
        
        // Data Store
        const [wordsData, setWordsData] = useState(() => JSON.parse(localStorage.getItem('words_data')) || {});
        const [rootsData, setRootsData] = useState(() => JSON.parse(localStorage.getItem('roots_data')) || {});
        const [articles, setArticles] = useState(() => JSON.parse(localStorage.getItem('articles')) || []);
        const [wordsSinceLastStory, setWordsSinceLastStory] = useState(() => parseInt(localStorage.getItem('words_since_story')) || 0);
        
        const [articleQueue, setArticleQueue] = useState([]);
        const [currentArticle, setCurrentArticle] = useState(null);
        
        // Modal State
        const [modalArticle, setModalArticle] = useState(null);
        const [toast, setToast] = useState(null);
        const toastTimerRef = useRef(null);

        // --- Effects ---
        useEffect(() => localStorage.setItem('gemini_key', apiKey), [apiKey]);
        useEffect(() => localStorage.setItem('words_data', JSON.stringify(wordsData)), [wordsData]);
        useEffect(() => localStorage.setItem('roots_data', JSON.stringify(rootsData)), [rootsData]);
        useEffect(() => localStorage.setItem('articles', JSON.stringify(articles)), [articles]);
        useEffect(() => localStorage.setItem('words_since_story', wordsSinceLastStory), [wordsSinceLastStory]);
        useEffect(() => window.lucide && window.lucide.createIcons(), [view, currentArticle, modalArticle, toast]);
        useEffect(() => () => toastTimerRef.current && clearTimeout(toastTimerRef.current), []);

        // --- Logic ---
        const showToast = (message) => {
            setToast(message);
            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
            toastTimerRef.current = setTimeout(() => setToast(null), 3000);
        };
        
        // 生成内容逻辑 (复用之前的逻辑，但修改 Prompt 以适配 HTML 结构)
        const generateContent = async () => {
            if (loading || articleQueue.length > 1) return;
            setLoading(true);
            try {
                // 简单决策逻辑
                let plan = { type: 'new_word' };
                if (wordsSinceLastStory >= 8) plan = { type: 'review_story' };
                
                // 找词
                const availableWords = GRE_WORDS.filter(w => !wordsData[w]);
                if (plan.type === 'new_word' && availableWords.length > 0) {
                    const word = availableWords[Math.floor(Math.random() * availableWords.length)];
                    await generateEtymology(word);
                } else if (plan.type === 'review_story' && Object.keys(wordsData).length >= 5) {
                    await generateReviewStory();
                } else if (availableWords.length === 0) {
                    alert("词库已刷完！");
                } else {
                     // Fallback
                     const word = availableWords[Math.floor(Math.random() * availableWords.length)];
                     await generateEtymology(word);
                }
            } catch (e) {
                console.error(e);
                showToast("API 访问失败，请检查 Key 或网络后重试。");
            } finally {
                setLoading(false);
            }
        };

        const generateEtymology = async (word) => {
            // Prompt: 关键在于要求输出带 class 的 span
            const systemPrompt = `You are an expert GRE vocabulary tutor. Respond in JSON.
            Task: Explain the etymology of "${word}".
            IMPORTANT HTML FORMATTING:
            When you mention the word "${word}" or any other GRE word you want to highlight, DO NOT use <strong>.
            INSTEAD, use this EXACT format: <span class="gre-word" data-word="word_here">word_here</span>.
            
            JSON Schema:
            {
                "title": "Title (e.g. 'The Roots of ${word}')",
                "root": "Main root (e.g. 'bene')",
                "definition": "Short definition",
                "content": "HTML string. 2-3 paragraphs. Explain origin, memory aid, and usage. Use the span format defined above for the target word."
            }`;

            const data = await callGemini(apiKey, `Explain "${word}"`, systemPrompt);
            const newArticle = {
                id: generateId(),
                type: 'new_word',
                title: data.title,
                content: data.content,
                relatedRoot: data.root,
                targetWords: [word],
                previewText: data.definition,
                timestamp: Date.now()
            };

            updateData(newArticle, [word], data.root);
        };

        const generateReviewStory = async () => {
            const learned = Object.keys(wordsData);
            const selected = [];
            while(selected.length < 5) {
                const w = learned[Math.floor(Math.random() * learned.length)];
                if(!selected.includes(w)) selected.push(w);
            }

            const systemPrompt = `You are a writer. Respond in JSON.
            Task: Write a short story (150 words) using: ${selected.join(', ')}.
            IMPORTANT HTML FORMATTING:
            Wrap EACH occurrence of these words in: <span class="gre-word" data-word="word_here">word_here</span>.
            
            JSON Schema:
            {
                "title": "Story Title",
                "content": "HTML string. The story.",
                "used_words": ["list", "of", "words"]
            }`;

            const data = await callGemini(apiKey, `Story using: ${selected.join(', ')}`, systemPrompt);
            const newArticle = {
                id: generateId(),
                type: 'review_story',
                title: data.title,
                content: data.content,
                targetWords: data.used_words || selected,
                previewText: "Story review...",
                timestamp: Date.now()
            };
            
            // Story 不重置词根，只加到列表
            setArticles(prev => [...prev, newArticle]);
            setArticleQueue(prev => [...prev, newArticle]);
            setWordsSinceLastStory(0);
        };

        const updateData = (article, words, root) => {
            setWordsData(prev => ({ ...prev, [words[0]]: { status: 'learned', root, timestamp: Date.now() } }));
            if (root) {
                setRootsData(prev => {
                    const list = prev[root] || [];
                    return list.includes(words[0]) ? prev : { ...prev, [root]: [...list, words[0]] };
                });
            }
            setWordsSinceLastStory(prev => prev + 1);
            setArticles(prev => [...prev, article]);
            setArticleQueue(prev => [...prev, article]);
        };

        // --- Interaction Handlers ---

        useEffect(() => {
            if (apiKey && articleQueue.length < 2) generateContent();
        }, [articleQueue, apiKey]);

        useEffect(() => {
            if (!currentArticle && articleQueue.length > 0) {
                setCurrentArticle(articleQueue[0]);
                setArticleQueue(q => q.slice(1));
            }
        }, [articleQueue]);

        const handleWordClick = (word) => {
            // 查找该词的 type='new_word' 文章
            const cleanWord = word.replace(/[.,!?;:]/g, "").toLowerCase();
            const found = articles.slice().reverse().find(a => 
                a.type === 'new_word' && 
                a.targetWords.some(tw => tw.toLowerCase() === cleanWord)
            );
            
            if (found) {
                setModalArticle(found);
            } else {
                // 如果没有找到文章，可能是还没学，或者是复习故事里的词但没有单独的词源文章
                // 这里可以扩展为：如果没学，现场生成一个 rapid-definition
                alert(`"${cleanWord}" 的词源文章尚未生成或已被清理。`);
            }
        };

        if (!apiKey) return <WelcomeScreen onSaveKey={setApiKey} />;

        // --- Main Render ---
        return (
            <div className="flex justify-center h-full bg-slate-100">
                <div className="w-full max-w-md bg-slate-50 h-full shadow-2xl overflow-hidden flex flex-col relative border-x border-slate-200">
                    
                    {/* Top Bar */}
                    <header className="flex-none bg-white/95 border-b border-slate-100 h-14 px-4 flex items-center justify-between z-10">
                        <div className="flex items-center gap-2">
                            <i data-lucide="layers" className="w-5 h-5 text-brand-600"></i>
                            <span className="font-bold text-slate-800 tracking-tight">GRE Flow</span>
                        </div>
                        <div className="flex items-center gap-3">
                             <div className="flex items-center gap-1 bg-slate-100 px-2 py-1 rounded-md">
                                <span className="text-xs font-semibold text-slate-500">Queue</span>
                                <span className="text-xs font-bold text-slate-900">{articleQueue.length}</span>
                            </div>
                            {loading && <div className="w-4 h-4 border-2 border-brand-500 border-t-transparent rounded-full animate-spin"></div>}
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 min-h-0 overflow-hidden relative bg-slate-50">
                        {view === 'feed' && (
                            <div className="h-full p-3 sm:p-4">
                                <ArticleCard 
                                    article={currentArticle} 
                                    onNext={() => {
                                        if(articleQueue.length > 0) {
                                            setCurrentArticle(articleQueue[0]);
                                            setArticleQueue(q => q.slice(1));
                                        } else {
                                            generateContent(); 
                                            // 临时置空等待
                                            setCurrentArticle(null);
                                        }
                                    }}
                                    onWordClick={handleWordClick}
                                />
                            </div>
                        )}

                        {view === 'history' && (
                            <div className="h-full overflow-y-auto p-4 hide-scrollbar">
                                <h2 className="text-xl font-bold text-slate-900 mb-4 px-1">学习足迹</h2>
                                <div className="space-y-3">
                                    {articles.slice().reverse().map(art => (
                                        <div key={art.id} 
                                            onClick={() => setModalArticle(art)}
                                            className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 active:scale-[0.98] transition cursor-pointer"
                                        >
                                            <div className="flex justify-between items-start mb-1">
                                                <h3 className="font-bold text-slate-800">{art.title}</h3>
                                                <span className="text-[10px] text-slate-400 bg-slate-50 px-2 py-1 rounded">{new Date(art.timestamp).toLocaleDateString()}</span>
                                            </div>
                                            <p className="text-sm text-slate-500 truncate">{art.previewText}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="h-full overflow-y-auto p-4 hide-scrollbar">
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Words</div>
                                        <div className="text-3xl font-bold text-brand-600">{Object.keys(wordsData).length}</div>
                                    </div>
                                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
                                        <div className="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Stories</div>
                                        <div className="text-3xl font-bold text-amber-500">{articles.length}</div>
                                    </div>
                                </div>
                                <h3 className="text-lg font-bold text-slate-900 mb-4">词根网络</h3>
                                <div className="space-y-3">
                                    {Object.entries(rootsData).map(([root, words]) => (
                                        <div key={root} className="bg-white rounded-xl border border-slate-100 overflow-hidden">
                                            <div className="px-4 py-3 bg-slate-50/50 border-b border-slate-100 flex justify-between items-center">
                                                <span className="font-mono text-brand-700 font-bold">{root}</span>
                                                <span className="text-xs text-slate-400">{words.length} words</span>
                                            </div>
                                            <div className="p-3 flex flex-wrap gap-2">
                                                {words.map(w => (
                                                    <span key={w} onClick={() => handleWordClick(w)} className="px-2 py-1 bg-white border border-slate-200 text-slate-600 text-xs rounded-md cursor-pointer hover:border-brand-300 hover:text-brand-600 transition">
                                                        {w}
                                                    </span>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Toast */}
                    {toast && (
                        <div className="absolute left-4 right-4 bottom-20 z-30">
                            <div className="bg-slate-900 text-white text-sm px-4 py-3 rounded-xl shadow-lg shadow-slate-900/20">
                                {toast}
                            </div>
                        </div>
                    )}

                    {/* Bottom Nav */}
                    <nav className="flex-none bg-white border-t border-slate-100 h-16 flex justify-around items-center px-2 z-20 pb-safe">
                        {[
                            { id: 'feed', icon: 'zap', label: 'Feed' },
                            { id: 'history', icon: 'history', label: 'History' },
                            { id: 'stats', icon: 'bar-chart-2', label: 'Stats' },
                        ].map(tab => (
                            <button 
                                key={tab.id}
                                onClick={() => setView(tab.id)}
                                className={`flex flex-col items-center justify-center w-full h-full space-y-1 transition-colors ${
                                    view === tab.id ? 'text-brand-600' : 'text-slate-400 hover:text-slate-600'
                                }`}
                            >
                                <i data-lucide={tab.icon} className={`w-6 h-6 ${view === tab.id ? 'fill-current opacity-20' : ''}`}></i>
                                <span className="text-[10px] font-medium">{tab.label}</span>
                            </button>
                        ))}
                    </nav>

                    {/* Word Detail Modal */}
                    {modalArticle && (
                        <WordDetailModal 
                            article={modalArticle} 
                            onClose={() => setModalArticle(null)} 
                        />
                    )}
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

</script>
