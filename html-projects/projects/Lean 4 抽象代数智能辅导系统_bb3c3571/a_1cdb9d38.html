<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lean 4 抽象代数智能辅导系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/languages/lean.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lean: {
                            bg: '#1e1e1e',
                            sidebar: '#252526',
                            active: '#37373d',
                            text: '#d4d4d4',
                            accent: '#007acc'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #1e1e1e; color: #d4d4d4; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body pre { background: #2d2d2d; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        .loader { border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #3498db; width: 20px; height: 20px; -webkit-animation: spin 1s linear infinite; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        textarea:focus { outline: none; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="apiKeyModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-96 border border-gray-700">
            <h2 class="text-xl font-bold mb-4 text-white"><i class="fas fa-key mr-2"></i>配置 API Key</h2>
            <p class="text-gray-400 text-sm mb-4">请输入您的 Google Gemini API Key 以启用题目生成和模拟运行功能。Key 将仅存储在您的本地浏览器中。</p>
            <input type="password" id="apiKeyInput" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white mb-4 focus:border-blue-500 outline-none" placeholder="sk-...">
            <button onclick="saveApiKey()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                开始学习
            </button>
        </div>
    </div>

    <header class="h-12 bg-lean-sidebar border-b border-black flex items-center px-4 justify-between shrink-0">
        <div class="flex items-center">
            <span class="text-blue-400 font-bold text-lg mr-2">∀</span>
            <span class="font-semibold text-gray-200">Lean 4 Abstract Algebra Tutor</span>
        </div>
        <div class="text-xs text-gray-500 flex gap-4">
            <button onclick="clearLocalStorage()" class="hover:text-red-400 transition"><i class="fas fa-trash mr-1"></i> 清除本地缓存</button>
            <button onclick="resetApiKey()" class="hover:text-yellow-400 transition"><i class="fas fa-key mr-1"></i> 重置 Key</button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 bg-lean-sidebar flex flex-col border-r border-black overflow-y-auto">
            <div class="p-4 text-xs font-bold text-gray-400 uppercase tracking-wider">目录 (Catalog)</div>
            <div id="curriculumList" class="flex-1">
                </div>
        </aside>

        <main class="flex-1 flex flex-col bg-lean-bg min-w-0">
            
            <div class="h-1/3 border-b border-black flex flex-col">
                <div class="bg-gray-800 px-4 py-2 flex justify-between items-center select-none">
                    <span id="currentTopicDisplay" class="font-bold text-sm text-blue-300">请选择左侧章节</span>
                    <button id="regenBtn" onclick="regenerateProblem()" class="text-xs bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded hidden">
                        <i class="fas fa-sync-alt mr-1"></i> 重新生成
                    </button>
                </div>
                <div id="problemContainer" class="flex-1 p-6 overflow-y-auto markdown-body text-sm text-gray-300">
                    <div class="flex flex-col items-center justify-center h-full text-gray-500">
                        <i class="fas fa-book-open text-4xl mb-4"></i>
                        <p>选择一个子章节开始 Lean 证明练习</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 flex flex-col min-h-0 relative">
                <div class="bg-gray-800 px-4 py-2 text-xs text-gray-400 flex justify-between items-center border-t border-gray-900">
                    <span><i class="fas fa-code mr-2"></i>Main.lean</span>
                    <div class="flex gap-2">
                         <button onclick="runSimulation()" id="runBtn" class="bg-green-700 hover:bg-green-600 text-white px-3 py-1 rounded flex items-center transition disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fas fa-play mr-2"></i> 模拟运行
                        </button>
                    </div>
                </div>
                <div class="relative flex-1 bg-[#1e1e1e]">
                    <textarea id="codeEditor" class="w-full h-full bg-[#1e1e1e] text-gray-300 font-mono text-sm p-4 resize-none leading-relaxed border-none" spellcheck="false" placeholder="-- Lean 代码将显示在这里..."></textarea>
                </div>
            </div>

            <div class="h-1/4 bg-black border-t border-gray-700 flex flex-col">
                <div class="px-4 py-1 bg-gray-900 text-xs text-gray-400 font-mono border-b border-gray-800">
                    TERMINAL / INFOPVIEW (AI SIMULATION)
                </div>
                <div id="outputConsole" class="flex-1 p-4 font-mono text-sm overflow-y-auto text-gray-300 whitespace-pre-wrap">
                    等待运行...
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- Configuration & Data ---
        const DB_KEY = 'lean_tutor_db';
        const API_KEY_STORAGE = 'gemini_api_key';
        
        // 抽象代数目录结构 (硬编码)
        const curriculum = [
            {
                title: "1. 群论基础 (Group Theory Basics)",
                chapters: [
                    "群的定义 (Definition of a Group)",
                    "子群 (Subgroups)",
                    "阿贝尔群 (Abelian Groups)",
                    "循环群 (Cyclic Groups)"
                ]
            },
            {
                title: "2. 群同态与同构 (Homomorphisms)",
                chapters: [
                    "同态的定义 (Group Homomorphisms)",
                    "核与像 (Kernel and Image)",
                    "群同构 (Group Isomorphism)",
                    "凯莱定理 (Cayley's Theorem)"
                ]
            },
            {
                title: "3. 环论基础 (Ring Theory)",
                chapters: [
                    "环的定义 (Definition of a Ring)",
                    "整环与域 (Integral Domains and Fields)",
                    "理想与商环 (Ideals and Quotient Rings)",
                    "多项式环 (Polynomial Rings)"
                ]
            },
            {
                title: "4. 域扩张 (Field Extensions)",
                chapters: [
                    "代数扩张 (Algebraic Extensions)",
                    "分裂域 (Splitting Fields)",
                    "有限域 (Finite Fields)"
                ]
            }
        ];

        // --- State Management ---
        let currentTopic = null;
        let currentSubTopic = null;
        
        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            checkApiKey();
            renderSidebar();
            
            // Allow tab in textarea
            document.getElementById('codeEditor').addEventListener('keydown', function(e) {
                if (e.key == 'Tab') {
                    e.preventDefault();
                    var start = this.selectionStart;
                    var end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 2;
                }
            });
        });

        // --- Logic: Sidebar & Navigation ---
        function renderSidebar() {
            const list = document.getElementById('curriculumList');
            list.innerHTML = '';

            curriculum.forEach((section, sIndex) => {
                const details = document.createElement('details');
                details.className = 'group';
                details.open = sIndex === 0; // Open first section by default

                const summary = document.createElement('summary');
                summary.className = 'cursor-pointer p-3 hover:bg-lean-active text-sm font-semibold text-gray-300 list-none flex justify-between items-center border-b border-gray-800 outline-none';
                summary.innerHTML = `<span>${section.title}</span><i class="fas fa-chevron-down text-xs transition-transform group-open:rotate-180"></i>`;
                
                const ul = document.createElement('ul');
                ul.className = 'bg-[#1a1a1a]';

                section.chapters.forEach(chapter => {
                    const li = document.createElement('li');
                    li.className = 'pl-8 pr-4 py-2 text-sm text-gray-400 hover:text-white hover:bg-lean-active cursor-pointer border-l-2 border-transparent hover:border-blue-500 transition-colors';
                    li.textContent = chapter;
                    li.onclick = () => loadChapter(section.title, chapter);
                    ul.appendChild(li);
                });

                details.appendChild(summary);
                details.appendChild(ul);
                list.appendChild(details);
            });
        }

        async function loadChapter(topic, subTopic) {
            currentTopic = topic;
            currentSubTopic = subTopic;
            
            document.getElementById('currentTopicDisplay').textContent = `${topic} > ${subTopic}`;
            document.getElementById('regenBtn').classList.remove('hidden');

            // Try to load from local storage first
            const localData = getFromLocalStorage(topic, subTopic);
            
            if (localData && localData.problem) {
                renderProblem(localData.problem);
                // Only set code if it's empty to avoid overwriting user progress too aggressively, 
                // but since we switch chapters, we typically want the template for that chapter.
                // Here we simply load what was saved or the template from the problem.
                document.getElementById('codeEditor').value = localData.userCode || extractCodeTemplate(localData.problem);
                document.getElementById('outputConsole').textContent = localData.lastOutput || "准备就绪。";
            } else {
                await fetchProblemFromAI(topic, subTopic);
            }
        }

        // --- Logic: API Interaction ---

        async function fetchProblemFromAI(topic, subTopic) {
            const apiKey = localStorage.getItem(API_KEY_STORAGE);
            if (!apiKey) return showModal();

            showLoader(true);
            const prompt = `
                你是一位 Lean 4 专家和抽象代数老师。
                请为“${topic} - ${subTopic}”这一主题生成一个 Lean 4 的练习题。
                
                要求：
                1. 使用 Lean 4 语法。
                2. 包含必要的 import 语句（例如 import Mathlib.Algebra.Group.Basic）。
                3. 定义一个 theorem 或 example，但将证明部分留空，使用 'sorry' 代替。
                4. 题目难度适中，适合初学者练习该概念。
                5. 输出格式必须包含两部分：
                   - 第一部分：用 Markdown 解释数学命题的含义。
                   - 第二部分：用 \`\`\`lean ... \`\`\` 包裹的代码模板。
                6. 只有 Lean 代码，不要多余的寒暄。
            `;

            try {
                const response = await callGeminiAPI(prompt, apiKey);
                const problemText = response.candidates[0].content.parts[0].text;
                
                // Save and Render
                saveToLocalStorage(topic, subTopic, { problem: problemText, userCode: extractCodeTemplate(problemText), lastOutput: "" });
                renderProblem(problemText);
                document.getElementById('codeEditor').value = extractCodeTemplate(problemText);
                document.getElementById('outputConsole').textContent = "题目已生成，请在编辑器中完成证明。";
                
            } catch (error) {
                document.getElementById('problemContainer').innerHTML = `<div class="text-red-500 p-4">生成失败: ${error.message}</div>`;
            } finally {
                showLoader(false);
            }
        }

        async function runSimulation() {
            const apiKey = localStorage.getItem(API_KEY_STORAGE);
            if (!apiKey) return showModal();

            const code = document.getElementById('codeEditor').value;
            const problemContext = document.getElementById('problemContainer').innerText;
            
            const btn = document.getElementById('runBtn');
            const consoleDiv = document.getElementById('outputConsole');
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 编译中...';
            consoleDiv.textContent = "正在调用 Lean 4 模拟器 (Gemini)...";

            const prompt = `
                你现在扮演 Lean 4 编译器和证明助手 (Infoview)。
                
                上下文题目背景：
                ${problemContext}

                用户编写的代码：
                \`\`\`lean
                ${code}
                \`\`\`

                请执行以下操作：
                1. 检查代码是否是一个有效的 Lean 4 证明。
                2. 如果证明正确且完整（没有 sorry），请输出 "Goals accomplished! 🎉"。
                3. 如果证明有误、逻辑不通或语法错误，请模拟编译器的报错信息，指出具体哪一行、哪个 tactic 有问题。
                4. 如果使用了 'sorry'，请提示 "Proof contains sorry"。
                5. 在报错后，用自然语言简要提示用户应该如何修改（就像一个乐于助人的助教），并给出建议的 Tactic 序列。
                
                请保持输出像一个终端界面，不需要 Markdown 标题，直接给出结果。
            `;

            try {
                const response = await callGeminiAPI(prompt, apiKey);
                const result = response.candidates[0].content.parts[0].text;
                
                consoleDiv.textContent = result;
                
                // Update local storage with latest code and output
                saveToLocalStorage(currentTopic, currentSubTopic, { 
                    problem: getFromLocalStorage(currentTopic, currentSubTopic).problem,
                    userCode: code,
                    lastOutput: result
                });

            } catch (error) {
                consoleDiv.textContent = `Error: ${error.message}`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-play mr-2"></i> 模拟运行';
            }
        }

        async function callGeminiAPI(promptText, key) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }]
            };

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const errData = await res.json();
                throw new Error(errData.error?.message || 'API Request Failed');
            }

            return await res.json();
        }

        // --- Helpers ---

        function extractCodeTemplate(markdown) {
            const match = markdown.match(/```lean([\s\S]*?)```/);
            return match ? match[1].trim() : "-- 未能提取代码模板，请检查生成内容";
        }

        function renderProblem(markdownText) {
            const container = document.getElementById('problemContainer');
            container.innerHTML = marked.parse(markdownText);
            hljs.highlightAll();
        }

        function showLoader(show) {
            const container = document.getElementById('problemContainer');
            if (show) {
                container.innerHTML = '<div class="flex flex-col items-center justify-center h-full"><div class="loader mb-4"></div><p class="text-gray-400">正在咨询 AI 生成题目...</p></div>';
            }
        }

        function regenerateProblem() {
            if (currentTopic && currentSubTopic) {
                if(confirm('确定要重新生成题目吗？当前代码将丢失。')) {
                    fetchProblemFromAI(currentTopic, currentSubTopic);
                }
            }
        }

        // --- Local Storage Implementation ---

        function getFromLocalStorage(topic, subTopic) {
            const db = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
            const key = `${topic}::${subTopic}`;
            return db[key] || {};
        }

        function saveToLocalStorage(topic, subTopic, data) {
            const db = JSON.parse(localStorage.getItem(DB_KEY) || '{}');
            const key = `${topic}::${subTopic}`;
            db[key] = { ...db[key], ...data };
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        function clearLocalStorage() {
            if(confirm('确定删除所有学习进度？')) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        }

        // --- API Key Management ---

        function checkApiKey() {
            if (!localStorage.getItem(API_KEY_STORAGE)) {
                showModal();
            }
        }

        function showModal() {
            document.getElementById('apiKeyModal').classList.remove('hidden');
        }

        function saveApiKey() {
            const input = document.getElementById('apiKeyInput');
            if (input.value.trim()) {
                localStorage.setItem(API_KEY_STORAGE, input.value.trim());
                document.getElementById('apiKeyModal').classList.add('hidden');
                alert("Key 已保存。请选择左侧目录开始学习。");
            } else {
                alert("请输入有效的 API Key");
            }
        }

        function resetApiKey() {
            localStorage.removeItem(API_KEY_STORAGE);
            location.reload();
        }
    </script>
</body>
</html>
