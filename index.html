<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Style Manager</title>
    <meta name="theme-color" content="#F2F2F7">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --primary: #007AFF;
            --text-main: #000000;
            --text-sub: #8E8E93;
            --danger: #FF3B30;
            --success: #34C759;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --radius-l: 20px;
            --radius-m: 16px;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            font-family: var(--font-stack);
            margin: 0;
            padding: 0;
            padding-bottom: 100px; /* Space for dock */
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 标题区域 */
        .header {
            padding: 60px 20px 20px;
        }
        .header-date {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .header-title {
            font-size: 34px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-l);
            box-shadow: var(--shadow);
            margin: 0 20px 16px;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
        }
        .card:active { transform: scale(0.98); }

        /* 项目列表项 */
        .project-item {
            display: flex;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .project-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        .project-info { flex: 1; }
        .project-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .project-desc {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.4;
        }
        .project-meta {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 6px;
        }

        /* 底部悬浮坞 */
        .floating-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 12px 24px;
            border-radius: 32px;
            display: flex;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        .dock-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .dock-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--primary);
            stroke-width: 2.5;
        }
        .dock-btn:active { background: rgba(0,0,0,0.05); }

        /* 模态框 (Admin Login / Create) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-card {
            background: var(--bg-color);
            width: 85%;
            max-width: 320px;
            border-radius: var(--radius-l);
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .ios-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d1d6;
            background: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .ios-input:focus { border-color: var(--primary); }
        
        .modal-actions { display: flex; gap: 10px; }
        .ios-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel { background: #E5E5EA; color: var(--text-main); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #E5E5EA;
            color: #111111;
            cursor: pointer;
            font-size: 16px;
            line-height: 28px;
            padding: 0;
        }

        /* 管理模式特有 */
        .admin-badge {
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            vertical-align: middle;
            margin-left: 8px;
            display: none;
        }
        .delete-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--danger);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .edit-btn {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            background: #E5E5EA;
            color: #111111;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-size: 14px;
            font-weight: 700;
        }
        .card:hover .delete-btn,
        .card:hover .edit-btn { opacity: 1; pointer-events: auto; }
        body.is-admin .delete-btn,
        body.is-admin .edit-btn { opacity: 1; pointer-events: auto; }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 300;
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .header-actions {
            position: absolute;
            right: 20px;
            top: 20px;
        }
        .header-gear {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: white;
            border: 1px solid rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #111827;
            box-shadow: 0 6px 16px rgba(15,23,42,0.08);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .header-gear:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(15,23,42,0.12); }
        .header-gear svg { width: 20px; height: 20px; }

        .upload-cta {
            margin: 10px 20px 20px;
            padding: 14px 16px;
            border-radius: 14px;
            background: white;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 10px 24px rgba(15,23,42,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .upload-cta-text {
            font-size: 13px;
            color: #6B7280;
            line-height: 1.3;
        }
        .upload-cta-text strong {
            color: #111827;
            font-weight: 700;
            display: block;
            font-size: 14px;
            margin-bottom: 2px;
        }
        .upload-cta-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        /* 面包屑导航 */
        .breadcrumb {
            padding: 0 20px;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-date" id="currentDate">TUESDAY, JANUARY 27</div>
        <h1 class="header-title">
            <span id="headerTitleText">Projects</span>
            <span class="admin-badge" id="adminBadge">ADMIN</span>
        </h1>
        <div class="header-actions">
            <button class="header-gear" onclick="app.toggleAdmin()" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </div>

    <!-- 面包屑 (返回) -->
    <div class="breadcrumb" id="backBtn" onclick="app.goHome()">← Back to Projects</div>

    <!-- 内容区域 -->
    <div id="contentArea"></div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="modal-title">Admin Access</div>
            <input type="password" class="ios-input" id="passwordInput" placeholder="Enter Password">
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.closeModal('loginModal')">Cancel</button>
                <button class="ios-btn btn-primary" onclick="app.login()">Verify</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-card">
            <button class="modal-close" onclick="app.closeModal('settingsModal')">×</button>
            <div class="modal-title">Settings</div>
            <input type="text" class="ios-input" id="apiKeyInput" placeholder="Gemini API Key (optional)">
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.saveApiKey()">Save Key</button>
                <button class="ios-btn btn-danger" onclick="app.logoutAdmin()">Logout</button>
            </div>
        </div>
    </div>

    <!-- Edit Project Modal -->
    <div class="modal-overlay" id="editProjectModal">
        <div class="modal-card">
            <div class="modal-title">Edit Project</div>
            <input type="text" class="ios-input" id="editNameInput" placeholder="Project Name">
            <input type="text" class="ios-input" id="editDescInput" placeholder="Description">
            <input type="text" class="ios-input" id="editIconInput" placeholder="Emoji Icon">
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.closeModal('editProjectModal')">Cancel</button>
                <button class="ios-btn btn-cancel" onclick="app.aiFillProject()">AI Fill</button>
                <button class="ios-btn btn-primary" onclick="app.saveProjectEdits()">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Message</div>
    <input type="file" id="newProjectFile" accept=".html" style="display:none;">
    <input type="file" id="versionFile" accept=".html" style="display:none;">

<script>
const CONFIG = {
    adminPwdKey: "ios_admin_pwd",
    apiKey: "gemini_api_key"
};

const state = {
    isAdmin: false,
    adminPassword: "",
    currentView: "list",
    activeProjectId: null,
    projects: [],
    activeProject: null,
    apiKey: "",
    editingProjectId: null
};

const app = {
    init: function() {
        this.updateDateHeader();
        this.bindFileInputs();
        this.restoreAdmin();
        this.restoreApiKey();
        this.loadProjects();
        this.setupGlobalListeners();
        this.render();
    },

    // ---- API helpers ----
    apiRequest: async function(path, options = {}, admin = false) {
        const opts = { ...options };
        const headers = { ...(opts.headers || {}) };
        if (admin && state.adminPassword) {
            headers['X-Admin-Password'] = state.adminPassword;
        }
        opts.headers = headers;

        const resp = await fetch(path, opts);
        if (resp.status === 401 && admin) {
            this.forceLogout();
            throw new Error('Unauthorized');
        }
        if (!resp.ok) {
            const msg = await resp.text();
            throw new Error(msg || 'Request failed');
        }
        const contentType = resp.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
            return resp.json();
        }
        return {};
    },

    // ---- Auth ----
    restoreAdmin: function() {
        const saved = sessionStorage.getItem(CONFIG.adminPwdKey);
        if (saved) {
            this.verifyAdmin(saved, true);
        }
    },

    verifyAdmin: async function(password, silent = false) {
        try {
            await this.apiRequest('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            state.isAdmin = true;
            state.adminPassword = password;
            sessionStorage.setItem(CONFIG.adminPwdKey, password);
            this.updateAdminUI();
            if (!silent) this.showToast('Admin Enabled');
            this.loadProjects();
        } catch (err) {
            this.forceLogout();
            if (!silent) this.showToast('Admin Failed');
        }
    },

    forceLogout: function() {
        state.isAdmin = false;
        state.adminPassword = '';
        sessionStorage.removeItem(CONFIG.adminPwdKey);
        this.updateAdminUI();
        if (state.currentView === 'detail') {
            this.goHome();
        } else {
            this.render();
        }
    },

    updateAdminUI: function() {
        document.getElementById('adminBadge').style.display = state.isAdmin ? 'inline-block' : 'none';
        document.body.classList.toggle('is-admin', state.isAdmin);
    },

    toggleAdmin: function() {
        if (state.isAdmin) {
            document.getElementById('settingsModal').classList.add('active');
            document.getElementById('apiKeyInput').focus();
        } else {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('passwordInput').focus();
        }
    },

    restoreApiKey: function() {
        const saved = localStorage.getItem(CONFIG.apiKey);
        if (saved) state.apiKey = saved;
        document.getElementById('apiKeyInput').value = state.apiKey || '';
    },

    saveApiKey: function() {
        const key = document.getElementById('apiKeyInput').value.trim();
        if (key) {
            localStorage.setItem(CONFIG.apiKey, key);
            state.apiKey = key;
            this.showToast('API Key Saved');
        } else {
            localStorage.removeItem(CONFIG.apiKey);
            state.apiKey = '';
            this.showToast('API Key Cleared');
        }
    },

    login: function() {
        const pwd = document.getElementById('passwordInput').value;
        if (!pwd) return;
        this.closeModal('loginModal');
        document.getElementById('passwordInput').value = '';
        this.verifyAdmin(pwd);
    },

    logoutAdmin: function() {
        if (!state.isAdmin) return;
        this.forceLogout();
        this.closeModal('settingsModal');
        this.showToast('Logged Out');
    },

    // ---- Data ----
    loadProjects: async function() {
        try {
            const data = await this.apiRequest('/api/projects');
            state.projects = data.projects || [];
            this.render();
        } catch (err) {
            this.showToast('Failed to load');
        }
    },

    // ---- Views ----
    render: function() {
        const container = document.getElementById('contentArea');
        container.innerHTML = '';

        if (state.currentView === 'list') {
            this.renderProjectList(container);
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('headerTitleText').innerText = 'Projects';
        } else if (state.currentView === 'detail') {
            this.renderProjectDetail(container);
            document.getElementById('backBtn').style.display = 'block';
        }
    },

    renderProjectList: function(container) {
        if (state.isAdmin) {
            const cta = document.createElement('div');
            cta.className = 'upload-cta';
            cta.innerHTML = `
                <div class="upload-cta-text">
                    <strong>Upload HTML</strong>
                    Drag & drop or paste HTML (Ctrl+V) anywhere, or click to choose a file.
                </div>
                <button class="upload-cta-btn">Choose File</button>
            `;
            cta.querySelector('button').addEventListener('click', () => this.triggerNewProject());
            container.appendChild(cta);
        }

        if (!state.projects.length) {
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.innerText = 'No projects yet.';
            container.appendChild(empty);
            return;
        }

        state.projects.forEach((proj) => {
            const card = document.createElement('div');
            card.className = 'card';

            const latestDate = proj.latest_version?.created_at || proj.updated_at;
            const dateLabel = latestDate ? new Date(latestDate).toLocaleDateString() : 'No versions';

            const editBtnHTML = state.isAdmin
                ? `<button class="edit-btn" onclick="event.stopPropagation(); app.renameProject('${proj.id}')">✎</button>`
                : '';
            const deleteBtnHTML = state.isAdmin
                ? `<button class="delete-btn" onclick="event.stopPropagation(); app.deleteProject('${proj.id}')">×</button>`
                : '';

            card.innerHTML = `
                <div class="project-item" onclick="app.openProject('${proj.id}')">
                    <div class="project-icon">${this.escapeHtml(proj.icon || '📁')}</div>
                    <div class="project-info">
                        <div class="project-name">${this.escapeHtml(proj.name)}</div>
                        <div class="project-desc">${this.escapeHtml(proj.description || '')}</div>
                        <div class="project-meta">Last updated: ${dateLabel}</div>
                    </div>
                    ${editBtnHTML}
                    ${deleteBtnHTML}
                </div>
            `;
            container.appendChild(card);
        });
    },

    renderProjectDetail: function(container) {
        if (!state.isAdmin) {
            this.goHome();
            return;
        }
        const proj = state.activeProject;
        if (!proj) return this.goHome();

        document.getElementById('headerTitleText').innerText = proj.name;
        if (state.isAdmin) {
            const cta = document.createElement('div');
            cta.className = 'upload-cta';
            cta.innerHTML = `
                <div class="upload-cta-text">
                    <strong>Upload Version</strong>
                    Drag & drop or paste HTML (Ctrl+V) anywhere, or click to choose a file.
                </div>
                <button class="upload-cta-btn">Choose File</button>
            `;
            cta.querySelector('button').addEventListener('click', () => this.triggerVersionUpload());
            container.appendChild(cta);
        }

        const versionsDiv = document.createElement('div');
        const versions = proj.versions || [];
        if (!versions.length) {
            versionsDiv.innerHTML = '<div class="empty-state">No HTML versions uploaded yet.</div>';
        } else {
            versions.forEach((ver) => {
                const vCard = document.createElement('div');
                vCard.className = 'card';
                const dateStr = new Date(ver.created_at).toLocaleString();
                const displayName = ver.display_name || ver.original_filename || 'Version';
                const original = ver.original_filename && ver.original_filename !== displayName
                    ? `Original: ${ver.original_filename}`
                    : '';

                const editBtn = state.isAdmin
                    ? `<button class="edit-btn" onclick="event.stopPropagation(); app.renameVersion('${ver.id}')">✎</button>`
                    : '';
                const deleteBtn = state.isAdmin
                    ? `<button class="delete-btn" onclick="event.stopPropagation(); app.deleteVersion('${ver.id}')">×</button>`
                    : '';

                vCard.innerHTML = `
                    <div class="project-item" onclick="app.previewHtml('${proj.id}', '${ver.id}')">
                        <div class="project-icon" style="background:#34C759; font-size:14px; font-weight:bold;">HTML</div>
                        <div class="project-info">
                            <div class="project-name">${this.escapeHtml(displayName)}</div>
                            <div class="project-desc">Uploaded: ${dateStr}</div>
                            <div class="project-meta">${this.escapeHtml(original)}</div>
                        </div>
                        ${editBtn}
                        ${deleteBtn}
                    </div>
                `;
                versionsDiv.appendChild(vCard);
            });
        }
        container.appendChild(versionsDiv);
    },

    // ---- Navigation ----
    goHome: function() {
        state.currentView = 'list';
        state.activeProjectId = null;
        state.activeProject = null;
        this.render();
    },

    openProject: async function(id) {
        if (!state.isAdmin) {
            window.location.href = `/projects/${id}/latest`;
            return;
        }
        try {
            const data = await this.apiRequest(`/api/projects/${id}`, {}, true);
            state.activeProjectId = id;
            state.activeProject = data;
            state.currentView = 'detail';
            this.render();
        } catch (err) {
            this.showToast('Failed to open');
        }
    },

    // ---- Admin actions ----
    triggerNewProject: function() {
        if (!state.isAdmin) return;
        document.getElementById('newProjectFile').click();
    },

    triggerVersionUpload: function() {
        if (!state.isAdmin) return;
        document.getElementById('versionFile').click();
    },

    createProjectFromFile: async function(file) {
        if (!file) return;
        const form = new FormData();
        form.append('file', file);
        try {
            await this.apiRequest('/api/projects', { method: 'POST', body: form }, true);
            this.showToast('Project Created');
            await this.loadProjects();
        } catch (err) {
            this.showToast('Upload failed');
        }
    },

    addVersionToProject: async function(projId, file) {
        if (!file || !projId) return;
        const form = new FormData();
        form.append('file', file);
        try {
            await this.apiRequest(`/api/projects/${projId}/versions`, { method: 'POST', body: form }, true);
            this.showToast('New Version Uploaded');
            await this.openProject(projId);
        } catch (err) {
            this.showToast('Upload failed');
        }
    },

    renameProject: async function(projId) {
        const proj = state.projects.find((p) => p.id === projId) || state.activeProject;
        if (!proj) return;
        state.editingProjectId = projId;
        document.getElementById('editNameInput').value = proj.name || '';
        document.getElementById('editDescInput').value = proj.description || '';
        document.getElementById('editIconInput').value = proj.icon || '📁';
        document.getElementById('editProjectModal').classList.add('active');
    },

    saveProjectEdits: async function() {
        const projId = state.editingProjectId;
        if (!projId) return;
        const proj = state.projects.find((p) => p.id === projId) || state.activeProject;
        if (!proj) return;

        const nextName = document.getElementById('editNameInput').value.trim();
        const nextDesc = document.getElementById('editDescInput').value.trim();
        const nextIcon = document.getElementById('editIconInput').value.trim();

        const payload = {};
        if (nextName && nextName !== proj.name) payload.name = nextName;
        if (nextDesc && nextDesc !== (proj.description || '')) payload.description = nextDesc;
        if (nextIcon && nextIcon !== (proj.icon || '📁')) payload.icon = nextIcon;
        if (!Object.keys(payload).length) {
            this.closeModal('editProjectModal');
            return;
        }

        try {
            await this.apiRequest(
                `/api/projects/${projId}`,
                {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                },
                true
            );
            this.closeModal('editProjectModal');
            this.showToast('Project Updated');
            await this.loadProjects();
            if (state.activeProjectId === projId) {
                await this.openProject(projId);
            }
        } catch (err) {
            this.showToast('Update failed');
        }
    },

    parseJsonFromText: function(text) {
        if (!text) return null;
        const match = text.match(/\{[\s\S]*\}/);
        if (!match) return null;
        try {
            return JSON.parse(match[0]);
        } catch (err) {
            return null;
        }
    },

    aiFillProject: async function() {
        const projId = state.editingProjectId;
        if (!projId) return;
        if (!state.apiKey) {
            alert('Please set your Gemini API key in Settings.');
            return;
        }

        try {
            const htmlText = await fetch(`/projects/${projId}/latest`).then((r) => r.text());
            const prompt = (
                "You are a product naming assistant. Given HTML content, return a JSON object " +
                'with keys "name", "description", and "icon". Keep the name <= 20 characters and the description <= 120 characters. ' +
                "The icon must be a single emoji. Return JSON only, no extra text.\n\nHTML:\n" +
                htmlText.slice(0, 12000)
            );

            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            const resp = await fetch(
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-goog-api-key": state.apiKey
                    },
                    body: JSON.stringify(payload)
                }
            );
            if (!resp.ok) throw new Error('AI request failed');
            const data = await resp.json();
            const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
            const parsed = this.parseJsonFromText(text);
            if (!parsed) throw new Error('AI response invalid');

            if (parsed.name) document.getElementById('editNameInput').value = String(parsed.name).trim();
            if (parsed.description) document.getElementById('editDescInput').value = String(parsed.description).trim();
            if (parsed.icon) document.getElementById('editIconInput').value = String(parsed.icon).trim();
            this.showToast('AI Filled');
        } catch (err) {
            this.showToast('AI failed');
        }
    },

    renameVersion: async function(versionId) {
        if (!state.activeProject || !state.activeProject.versions) return;
        const ver = state.activeProject.versions.find((v) => v.id === versionId);
        const current = ver ? ver.display_name || ver.original_filename : '';
        const next = prompt('New file name:', current || '');
        if (!next || next === current) return;
        try {
            await this.apiRequest(
                `/api/versions/${versionId}`,
                {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_name: next })
                },
                true
            );
            this.showToast('File Name Updated');
            await this.openProject(state.activeProjectId);
        } catch (err) {
            this.showToast('Update failed');
        }
    },

    deleteProject: async function(projId) {
        if (!confirm('Delete this project and all versions?')) return;
        try {
            await this.apiRequest(`/api/projects/${projId}`, { method: 'DELETE' }, true);
            this.showToast('Project Deleted');
            await this.loadProjects();
        } catch (err) {
            this.showToast('Delete failed');
        }
    },

    deleteVersion: async function(versionId) {
        if (!confirm('Delete this version?')) return;
        try {
            await this.apiRequest(`/api/versions/${versionId}`, { method: 'DELETE' }, true);
            this.showToast('Version Deleted');
            await this.openProject(state.activeProjectId);
        } catch (err) {
            this.showToast('Delete failed');
        }
    },

    // ---- File & preview ----
    previewHtml: function(projId, verId) {
        window.open(`/projects/${projId}/versions/${verId}`, '_blank');
    },

    bindFileInputs: function() {
        const newInput = document.getElementById('newProjectFile');
        const versionInput = document.getElementById('versionFile');

        newInput.addEventListener('change', () => {
            const file = newInput.files[0];
            newInput.value = '';
            if (file) this.createProjectFromFile(file);
        });

        versionInput.addEventListener('change', () => {
            const file = versionInput.files[0];
            versionInput.value = '';
            if (file && state.activeProjectId) this.addVersionToProject(state.activeProjectId, file);
        });
    },

    setupGlobalListeners: function() {
        const passwordInput = document.getElementById('passwordInput');
        passwordInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.isComposing) {
                e.preventDefault();
                this.login();
            }
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const loginOpen = document.getElementById('loginModal').classList.contains('active');
                const settingsOpen = document.getElementById('settingsModal').classList.contains('active');
                const editOpen = document.getElementById('editProjectModal').classList.contains('active');
                if (loginOpen || settingsOpen || editOpen) {
                    this.closeModal('loginModal');
                    this.closeModal('settingsModal');
                    this.closeModal('editProjectModal');
                    return;
                }
                if (state.currentView === 'detail') {
                    this.goHome();
                }
            }
        });

        document.addEventListener('paste', (e) => {
            if (!state.isAdmin) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            const html = e.clipboardData.getData('text/html');
            const text = html || e.clipboardData.getData('text');
            const lower = (text || '').toLowerCase();
            const isHtml =
                lower.includes('<!doctype html') ||
                lower.includes('<html') ||
                lower.includes('<body') ||
                lower.includes('<head');

            if (!isHtml) return;
            e.preventDefault();

            if (state.currentView === 'detail' && state.activeProjectId) {
                if (confirm('HTML detected. Create new version?')) {
                    const blob = new Blob([text], { type: 'text/html' });
                    const file = new File([blob], 'pasted.html', { type: 'text/html' });
                    this.addVersionToProject(state.activeProjectId, file);
                }
                return;
            }

            if (state.currentView === 'list') {
                if (confirm('HTML detected. Create new project?')) {
                    const blob = new Blob([text], { type: 'text/html' });
                    const file = new File([blob], 'pasted.html', { type: 'text/html' });
                    this.createProjectFromFile(file);
                }
            }
        });

        // Allow dropping HTML anywhere on the page.
        document.addEventListener('dragover', (e) => {
            if (!state.isAdmin) return;
            e.preventDefault();
        });
        document.addEventListener('drop', (e) => {
            if (!state.isAdmin) return;
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (!file) return;
            if (state.currentView === 'detail' && state.activeProjectId) {
                this.addVersionToProject(state.activeProjectId, file);
            } else if (state.currentView === 'list') {
                this.createProjectFromFile(file);
            }
        });
    },

    // ---- UI helpers ----
    closeModal: function(id) {
        document.getElementById(id).classList.remove('active');
    },

    showToast: function(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    },

    updateDateHeader: function() {
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options).toUpperCase();
    },

    escapeHtml: function(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
};

window.addEventListener('DOMContentLoaded', () => {
    app.init();
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    }
});
</script>
