<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Style Manager</title>
    <style>
        :root {
            --bg-color: #F2F2F7;
            --card-bg: #FFFFFF;
            --primary: #007AFF;
            --text-main: #000000;
            --text-sub: #8E8E93;
            --danger: #FF3B30;
            --success: #34C759;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --radius-l: 20px;
            --radius-m: 16px;
            --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg-color);
            font-family: var(--font-stack);
            margin: 0;
            padding: 0;
            padding-bottom: 100px; /* Space for dock */
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* 标题区域 */
        .header {
            padding: 60px 20px 20px;
        }
        .header-date {
            font-size: 14px;
            color: var(--text-sub);
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .header-title {
            font-size: 34px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        /* 卡片通用样式 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius-l);
            box-shadow: var(--shadow);
            margin: 0 20px 16px;
            overflow: hidden;
            transition: transform 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            position: relative;
        }
        .card:active { transform: scale(0.98); }

        /* 项目列表项 */
        .project-item {
            display: flex;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .project-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #007AFF, #5AC8FA);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 16px;
            flex-shrink: 0;
        }
        .project-info { flex: 1; }
        .project-name {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .project-desc {
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.4;
        }
        .project-meta {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 6px;
        }

        /* 底部悬浮坞 */
        .floating-dock {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 12px 24px;
            border-radius: 32px;
            display: flex;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
            border: 0.5px solid rgba(255,255,255,0.3);
        }
        .dock-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }
        .dock-btn svg {
            width: 24px;
            height: 24px;
            stroke: var(--primary);
            stroke-width: 2.5;
        }
        .dock-btn:active { background: rgba(0,0,0,0.05); }

        /* 模态框 (Admin Login / Create) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-card {
            background: var(--bg-color);
            width: 85%;
            max-width: 320px;
            border-radius: var(--radius-l);
            padding: 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .ios-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #d1d1d6;
            background: white;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
        }
        .ios-input:focus { border-color: var(--primary); }
        
        .modal-actions { display: flex; gap: 10px; }
        .ios-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel { background: #E5E5EA; color: var(--text-main); }
        .btn-primary { background: var(--primary); color: white; }

        /* 管理模式特有 */
        .admin-badge {
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 100px;
            font-size: 10px;
            font-weight: 700;
            vertical-align: middle;
            margin-left: 8px;
            display: none;
        }
        .delete-btn {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--danger);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .edit-btn {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            background: #E5E5EA;
            color: #111111;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            font-size: 14px;
            font-weight: 700;
        }
        .card:hover .delete-btn,
        .card:hover .edit-btn { opacity: 1; pointer-events: auto; }
        body.is-admin .delete-btn,
        body.is-admin .edit-btn { opacity: 1; pointer-events: auto; }

        /* Toast 通知 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 300;
            backdrop-filter: blur(10px);
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* 拖拽区域 */
        .drop-zone {
            border: 2px dashed #C7C7CC;
            border-radius: var(--radius-m);
            padding: 40px;
            text-align: center;
            color: var(--text-sub);
            margin: 20px;
            transition: all 0.2s;
            display: none; /* 仅在管理详情页显示 */
        }
        .drop-zone.dragover { border-color: var(--primary); background: rgba(0,122,255,0.05); color: var(--primary); }

        /* 面包屑导航 */
        .breadcrumb {
            padding: 0 20px;
            margin-bottom: 20px;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            display: none;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-sub);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-date" id="currentDate">TUESDAY, JANUARY 27</div>
        <h1 class="header-title">
            <span id="headerTitleText">Projects</span>
            <span class="admin-badge" id="adminBadge">ADMIN</span>
        </h1>
    </div>

    <!-- 面包屑 (返回) -->
    <div class="breadcrumb" id="backBtn" onclick="app.goHome()">← Back to Projects</div>

    <!-- 内容区域 -->
    <div id="contentArea"></div>

    <!-- 底部 Dock -->
    <div class="floating-dock">
        <button class="dock-btn" onclick="app.goHome()" title="Home">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </button>
        <button class="dock-btn" onclick="app.toggleAdmin()" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
        <button class="dock-btn" id="addBtn" onclick="app.triggerNewProject()" style="display:none;" title="Add Project">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="modal-title">Admin Access</div>
            <input type="password" class="ios-input" id="passwordInput" placeholder="Enter Password">
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.closeModal('loginModal')">Cancel</button>
                <button class="ios-btn btn-primary" onclick="app.login()">Verify</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">Message</div>
    <input type="file" id="newProjectFile" accept=".html" style="display:none;">
    <input type="file" id="versionFile" accept=".html" style="display:none;">

<script>
const CONFIG = {
    adminPwdKey: "ios_admin_pwd"
};

const state = {
    isAdmin: false,
    adminPassword: "",
    currentView: "list",
    activeProjectId: null,
    projects: [],
    activeProject: null
};

const app = {
    init: function() {
        this.updateDateHeader();
        this.bindFileInputs();
        this.restoreAdmin();
        this.loadProjects();
        this.setupGlobalListeners();
        this.render();
    },

    // ---- API helpers ----
    apiRequest: async function(path, options = {}, admin = false) {
        const opts = { ...options };
        const headers = { ...(opts.headers || {}) };
        if (admin && state.adminPassword) {
            headers['X-Admin-Password'] = state.adminPassword;
        }
        opts.headers = headers;

        const resp = await fetch(path, opts);
        if (resp.status === 401 && admin) {
            this.forceLogout();
            throw new Error('Unauthorized');
        }
        if (!resp.ok) {
            const msg = await resp.text();
            throw new Error(msg || 'Request failed');
        }
        const contentType = resp.headers.get('content-type') || '';
        if (contentType.includes('application/json')) {
            return resp.json();
        }
        return {};
    },

    // ---- Auth ----
    restoreAdmin: function() {
        const saved = sessionStorage.getItem(CONFIG.adminPwdKey);
        if (saved) {
            this.verifyAdmin(saved, true);
        }
    },

    verifyAdmin: async function(password, silent = false) {
        try {
            await this.apiRequest('/api/admin/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            state.isAdmin = true;
            state.adminPassword = password;
            sessionStorage.setItem(CONFIG.adminPwdKey, password);
            this.updateAdminUI();
            if (!silent) this.showToast('Admin Enabled');
            this.loadProjects();
        } catch (err) {
            this.forceLogout();
            if (!silent) this.showToast('Admin Failed');
        }
    },

    forceLogout: function() {
        state.isAdmin = false;
        state.adminPassword = '';
        sessionStorage.removeItem(CONFIG.adminPwdKey);
        this.updateAdminUI();
        if (state.currentView === 'detail') {
            this.goHome();
        } else {
            this.render();
        }
    },

    updateAdminUI: function() {
        document.getElementById('adminBadge').style.display = state.isAdmin ? 'inline-block' : 'none';
        document.getElementById('addBtn').style.display = state.isAdmin ? 'block' : 'none';
        document.body.classList.toggle('is-admin', state.isAdmin);
    },

    toggleAdmin: function() {
        if (state.isAdmin) {
            if (confirm('Logout admin?')) {
                this.forceLogout();
                this.showToast('Logged Out');
            }
            return;
        }
        document.getElementById('loginModal').classList.add('active');
        document.getElementById('passwordInput').focus();
    },

    login: function() {
        const pwd = document.getElementById('passwordInput').value;
        if (!pwd) return;
        this.closeModal('loginModal');
        document.getElementById('passwordInput').value = '';
        this.verifyAdmin(pwd);
    },

    // ---- Data ----
    loadProjects: async function() {
        try {
            const data = await this.apiRequest('/api/projects');
            state.projects = data.projects || [];
            this.render();
        } catch (err) {
            this.showToast('Failed to load');
        }
    },

    // ---- Views ----
    render: function() {
        const container = document.getElementById('contentArea');
        container.innerHTML = '';

        if (state.currentView === 'list') {
            this.renderProjectList(container);
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('headerTitleText').innerText = 'Projects';
        } else if (state.currentView === 'detail') {
            this.renderProjectDetail(container);
            document.getElementById('backBtn').style.display = 'block';
        }
    },

    renderProjectList: function(container) {
        if (state.isAdmin) {
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.innerHTML = '<div style="font-size:40px;margin-bottom:10px;">📦</div><div style="font-weight:600">Drop HTML to create new project</div><div style="font-size:12px;margin-top:5px;">Or tap to choose file</div>';
            dropZone.style.display = 'block';
            dropZone.addEventListener('click', () => this.triggerNewProject());
            this.bindDropZone(dropZone, (file) => this.createProjectFromFile(file));
            container.appendChild(dropZone);
        }

        if (!state.projects.length) {
            const empty = document.createElement('div');
            empty.className = 'empty-state';
            empty.innerText = 'No projects yet.';
            container.appendChild(empty);
            return;
        }

        state.projects.forEach((proj) => {
            const card = document.createElement('div');
            card.className = 'card';

            const latestDate = proj.latest_version?.created_at || proj.updated_at;
            const dateLabel = latestDate ? new Date(latestDate).toLocaleDateString() : 'No versions';

            const editBtnHTML = state.isAdmin
                ? `<button class="edit-btn" onclick="event.stopPropagation(); app.renameProject('${proj.id}')">✎</button>`
                : '';
            const deleteBtnHTML = state.isAdmin
                ? `<button class="delete-btn" onclick="event.stopPropagation(); app.deleteProject('${proj.id}')">×</button>`
                : '';

            card.innerHTML = `
                <div class="project-item" onclick="app.openProject('${proj.id}')">
                    <div class="project-icon">${this.escapeHtml(proj.icon || '📁')}</div>
                    <div class="project-info">
                        <div class="project-name">${this.escapeHtml(proj.name)}</div>
                        <div class="project-desc">${this.escapeHtml(proj.description || '')}</div>
                        <div class="project-meta">Last updated: ${dateLabel}</div>
                    </div>
                    ${editBtnHTML}
                    ${deleteBtnHTML}
                </div>
            `;
            container.appendChild(card);
        });
    },

    renderProjectDetail: function(container) {
        if (!state.isAdmin) {
            this.goHome();
            return;
        }
        const proj = state.activeProject;
        if (!proj) return this.goHome();

        document.getElementById('headerTitleText').innerText = proj.name;

        const dropZone = document.createElement('div');
        dropZone.className = 'drop-zone';
        dropZone.innerHTML = '<div style="font-size:40px;margin-bottom:10px;">☁️</div><div style="font-weight:600">Drop HTML to add version</div><div style="font-size:12px;margin-top:5px;">Or tap to choose file</div>';
        dropZone.style.display = 'block';
        dropZone.addEventListener('click', () => this.triggerVersionUpload());
        this.bindDropZone(dropZone, (file) => this.addVersionToProject(state.activeProjectId, file));
        container.appendChild(dropZone);

        const versionsDiv = document.createElement('div');
        const versions = proj.versions || [];
        if (!versions.length) {
            versionsDiv.innerHTML = '<div class="empty-state">No HTML versions uploaded yet.</div>';
        } else {
            versions.forEach((ver) => {
                const vCard = document.createElement('div');
                vCard.className = 'card';
                const dateStr = new Date(ver.created_at).toLocaleString();
                const displayName = ver.display_name || ver.original_filename || 'Version';
                const original = ver.original_filename && ver.original_filename !== displayName
                    ? `Original: ${ver.original_filename}`
                    : '';

                const editBtn = state.isAdmin
                    ? `<button class="edit-btn" onclick="event.stopPropagation(); app.renameVersion('${ver.id}')">✎</button>`
                    : '';
                const deleteBtn = state.isAdmin
                    ? `<button class="delete-btn" onclick="event.stopPropagation(); app.deleteVersion('${ver.id}')">×</button>`
                    : '';

                vCard.innerHTML = `
                    <div class="project-item" onclick="app.previewHtml('${proj.id}', '${ver.id}')">
                        <div class="project-icon" style="background:#34C759; font-size:14px; font-weight:bold;">HTML</div>
                        <div class="project-info">
                            <div class="project-name">${this.escapeHtml(displayName)}</div>
                            <div class="project-desc">Uploaded: ${dateStr}</div>
                            <div class="project-meta">${this.escapeHtml(original)}</div>
                        </div>
                        ${editBtn}
                        ${deleteBtn}
                    </div>
                `;
                versionsDiv.appendChild(vCard);
            });
        }
        container.appendChild(versionsDiv);
    },

    // ---- Navigation ----
    goHome: function() {
        state.currentView = 'list';
        state.activeProjectId = null;
        state.activeProject = null;
        this.render();
    },

    openProject: async function(id) {
        if (!state.isAdmin) {
            window.location.href = `/projects/${id}/latest`;
            return;
        }
        try {
            const data = await this.apiRequest(`/api/projects/${id}`, {}, true);
            state.activeProjectId = id;
            state.activeProject = data;
            state.currentView = 'detail';
            this.render();
        } catch (err) {
            this.showToast('Failed to open');
        }
    },

    // ---- Admin actions ----
    triggerNewProject: function() {
        if (!state.isAdmin) return;
        document.getElementById('newProjectFile').click();
    },

    triggerVersionUpload: function() {
        if (!state.isAdmin) return;
        document.getElementById('versionFile').click();
    },

    createProjectFromFile: async function(file) {
        if (!file) return;
        const form = new FormData();
        form.append('file', file);
        try {
            await this.apiRequest('/api/projects', { method: 'POST', body: form }, true);
            this.showToast('Project Created');
            await this.loadProjects();
        } catch (err) {
            this.showToast('Upload failed');
        }
    },

    addVersionToProject: async function(projId, file) {
        if (!file || !projId) return;
        const form = new FormData();
        form.append('file', file);
        try {
            await this.apiRequest(`/api/projects/${projId}/versions`, { method: 'POST', body: form }, true);
            this.showToast('New Version Uploaded');
            await this.openProject(projId);
        } catch (err) {
            this.showToast('Upload failed');
        }
    },

    renameProject: async function(projId) {
        const proj = state.projects.find((p) => p.id === projId) || state.activeProject;
        const current = proj ? proj.name : '';
        const next = prompt('New project name:', current || '');
        if (!next || next === current) return;
        try {
            await this.apiRequest(
                `/api/projects/${projId}`,
                {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: next })
                },
                true
            );
            this.showToast('Project Updated');
            await this.loadProjects();
            if (state.activeProjectId === projId) {
                await this.openProject(projId);
            }
        } catch (err) {
            this.showToast('Update failed');
        }
    },

    renameVersion: async function(versionId) {
        if (!state.activeProject || !state.activeProject.versions) return;
        const ver = state.activeProject.versions.find((v) => v.id === versionId);
        const current = ver ? ver.display_name || ver.original_filename : '';
        const next = prompt('New file name:', current || '');
        if (!next || next === current) return;
        try {
            await this.apiRequest(
                `/api/versions/${versionId}`,
                {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ display_name: next })
                },
                true
            );
            this.showToast('File Name Updated');
            await this.openProject(state.activeProjectId);
        } catch (err) {
            this.showToast('Update failed');
        }
    },

    deleteProject: async function(projId) {
        if (!confirm('Delete this project and all versions?')) return;
        try {
            await this.apiRequest(`/api/projects/${projId}`, { method: 'DELETE' }, true);
            this.showToast('Project Deleted');
            await this.loadProjects();
        } catch (err) {
            this.showToast('Delete failed');
        }
    },

    deleteVersion: async function(versionId) {
        if (!confirm('Delete this version?')) return;
        try {
            await this.apiRequest(`/api/versions/${versionId}`, { method: 'DELETE' }, true);
            this.showToast('Version Deleted');
            await this.openProject(state.activeProjectId);
        } catch (err) {
            this.showToast('Delete failed');
        }
    },

    // ---- File & preview ----
    previewHtml: function(projId, verId) {
        window.open(`/projects/${projId}/versions/${verId}`, '_blank');
    },

    bindFileInputs: function() {
        const newInput = document.getElementById('newProjectFile');
        const versionInput = document.getElementById('versionFile');

        newInput.addEventListener('change', () => {
            const file = newInput.files[0];
            newInput.value = '';
            if (file) this.createProjectFromFile(file);
        });

        versionInput.addEventListener('change', () => {
            const file = versionInput.files[0];
            versionInput.value = '';
            if (file && state.activeProjectId) this.addVersionToProject(state.activeProjectId, file);
        });
    },

    bindDropZone: function(zone, onFile) {
        zone.addEventListener('dragover', (e) => {
            e.preventDefault();
            zone.classList.add('dragover');
        });
        zone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
        });
        zone.addEventListener('drop', (e) => {
            e.preventDefault();
            zone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) onFile(file);
        });
    },

    setupGlobalListeners: function() {
        document.addEventListener('paste', (e) => {
            if (!state.isAdmin || state.currentView !== 'detail' || !state.activeProjectId) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            const text = e.clipboardData.getData('text');
            if (text && (text.includes('<!DOCTYPE html>') || text.includes('<html') || text.includes('<body>'))) {
                e.preventDefault();
                if (confirm('HTML detected. Create new version?')) {
                    const blob = new Blob([text], { type: 'text/html' });
                    const file = new File([blob], 'pasted.html', { type: 'text/html' });
                    this.addVersionToProject(state.activeProjectId, file);
                }
            }
        });
    },

    // ---- UI helpers ----
    closeModal: function(id) {
        document.getElementById(id).classList.remove('active');
    },

    showToast: function(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    },

    updateDateHeader: function() {
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options).toUpperCase();
    },

    escapeHtml: function(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }
};

window.addEventListener('DOMContentLoaded', () => {
    app.init();
});
</script>
</body>
