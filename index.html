<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HTML Manager</title>
    <meta name="theme-color" content="#F2F2F7">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>

    <div class="header">
        <div class="header-date" id="currentDate">TUESDAY, JANUARY 27</div>
        <h1 class="header-title">
            <span id="headerTitleText">Projects</span>
            <span class="admin-badge" id="adminBadge">ADMIN</span>
        </h1>
        <div class="header-actions">
            <button class="header-gear" onclick="app.toggleAdmin()" title="Settings">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </div>

    <div class="breadcrumb" id="backBtn" onclick="app.goHome()">← Back to Projects</div>
    <div id="contentArea"></div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <div class="modal-title">GitHub Admin Token</div>
            <input type="password" class="ios-input" id="passwordInput" placeholder="Enter ghp_token">
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.closeModal('loginModal')">Cancel</button>
                <button class="ios-btn btn-primary" onclick="app.login()">Verify</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-card">
            <button class="modal-close" onclick="app.closeModal('settingsModal')">×</button>
            <div class="modal-title">Settings</div>
            <input type="text" class="ios-input" id="ghOwnerInput" placeholder="GitHub Owner (required)">
            <input type="text" class="ios-input" id="ghRepoInput" placeholder="GitHub Repo (required)">
            <input type="text" class="ios-input" id="ghBranchInput" placeholder="GitHub Branch (default: content)">
            <input type="text" class="ios-input" id="ghRootInput" placeholder="Storage Root (default: html-projects)">
            <input type="text" class="ios-input" id="apiKeyInput" placeholder="Gemini API Key (optional)">
            <button class="install-btn" id="installBtn" style="display:none;">Install App</button>
            <button class="install-btn" onclick="app.downloadBackup()">Download Repo Backup</button>
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.saveApiKey()">Save Settings</button>
                <button class="ios-btn btn-danger" onclick="app.logoutAdmin()">Logout</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editProjectModal">
        <div class="modal-card">
            <div class="modal-title">Edit Project</div>
            <input type="text" class="ios-input" id="editNameInput" placeholder="Project Name">
            <input type="text" class="ios-input" id="editDescInput" placeholder="Description">
            <input type="text" class="ios-input" id="editIconInput" placeholder="Emoji Icon">
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.closeModal('editProjectModal')">Cancel</button>
                <button class="ios-btn btn-cancel" onclick="app.aiFillProject()">AI Fill</button>
                <button class="ios-btn btn-primary" onclick="app.saveProjectEdits()">Save</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="htmlEditorModal">
        <div class="modal-card editor-modal-card">
            <div class="editor-header">
                <div>
                    <div class="modal-title">Edit HTML</div>
                    <div class="editor-file-name" id="editorFileName">index.html</div>
                </div>
                <button class="editor-close" onclick="app.closeHtmlEditor()">×</button>
            </div>
            <div id="aceContainer">
                <div id="aceEditor"></div>
            </div>
            <div class="modal-actions">
                <button class="ios-btn btn-cancel" onclick="app.closeHtmlEditor()">Cancel</button>
                <button class="ios-btn btn-cancel" onclick="app.downloadEditingHtml()">Download</button>
                <button class="ios-btn btn-primary" onclick="app.saveHtmlEdits()">Save</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Message</div>
    <input type="file" id="newProjectFile" accept=".html" style="display:none;">
    <input type="file" id="versionFile" accept=".html" style="display:none;">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.42.0/ace.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="/modules/context.js" defer></script>
<script src="/modules/core-module.js" defer></script>
<script src="/modules/github-module.js" defer></script>
<script src="/modules/auth-module.js" defer></script>
<script src="/modules/view-module.js" defer></script>
<script src="/modules/content-module.js" defer></script>
<script src="/modules/events-module.js" defer></script>
<script src="/app.js" defer></script>
</body>
</html>
